<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Flow Architect | Daily App</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Tone.js -->
    <script src="https://unpkg.com/tone"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #030712; color: white; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .aura-blue { box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); border-color: rgba(59, 130, 246, 0.5); }
        .aura-purple { box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); border-color: rgba(168, 85, 247, 0.5); }
        .aura-orange { box-shadow: 0 0 30px rgba(249, 115, 22, 0.4); border-color: rgba(249, 115, 22, 0.5); }
        
        .grid-bg {
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .pulse-line {
            stroke-dasharray: 10;
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: -20; }
        }

        .agent-node { cursor: grab; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .agent-node:active { cursor: grabbing; transform: scale(1.05); }
    </style>
</head>
<body class="grid-bg min-h-screen flex items-center justify-center">
    <div id="root"></div>

    <script>
        const { useState, useEffect, useRef, useMemo } = React;

        const AGENTS = [
            { id: 'aura', name: 'Aura', role: 'Research', color: 'blue', x: 100, y: 150, icon: 'Search', note: 'C4' },
            { id: 'spark', name: 'Spark', role: 'Creative', color: 'purple', x: 400, y: 100, icon: 'Zap', note: 'E4' },
            { id: 'vibe', name: 'Vibe', role: 'Analysis', color: 'orange', x: 250, y: 350, icon: 'BarChart2', note: 'G4' }
        ];

        const App = () => {
            const [agents, setAgents] = useState(AGENTS);
            const [draggingId, setDraggingId] = useState(null);
            const [activeId, setActiveId] = useState(null);
            const synth = useRef(null);

            useEffect(() => {
                synth.current = new Tone.PolySynth(Tone.Synth).toDestination();
                lucide.createIcons();
            }, []);

            const handleMouseDown = (id, e) => {
                setDraggingId(id);
                setActiveId(id);
                // Play sound
                const agent = agents.find(a => a.id === id);
                if (synth.current) {
                    Tone.start();
                    synth.current.triggerAttackRelease(agent.note, "8n");
                }
            };

            const handleMouseMove = (e) => {
                if (!draggingId) return;
                const canvas = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - canvas.left - 40;
                const y = e.clientY - canvas.top - 40;
                
                setAgents(prev => prev.map(a => a.id === draggingId ? { ...a, x, y } : a));
            };

            const handleMouseUp = () => setDraggingId(null);

            return React.createElement('div', { className: 'relative w-screen h-screen flex flex-col items-center justify-center p-8' },
                // Header
                React.createElement('div', { className: 'absolute top-10 left-10 z-20' },
                    React.createElement('h1', { className: 'text-3xl font-bold tracking-tight text-white mb-2' }, 'Aura Flow Architect'),
                    React.createElement('p', { className: 'text-slate-400 max-w-md' }, 'Experience the rhythm of collective intelligence. Drag agents to reposition the spatial field.')
                ),

                // Canvas
                React.createElement('div', { 
                    className: 'relative w-full h-full max-w-6xl max-h-[700px] glass rounded-3xl overflow-hidden',
                    onMouseMove: handleMouseMove,
                    onMouseUp: handleMouseUp,
                    onMouseLeave: handleMouseUp
                },
                    // SVG Connections
                    React.createElement('svg', { className: 'absolute inset-0 w-full h-full pointer-events-none' },
                        agents.map((a, i) => {
                            const next = agents[(i + 1) % agents.length];
                            return React.createElement('line', {
                                key: `line-${a.id}-${next.id}`,
                                x1: a.x + 64, y1: a.y + 64,
                                x2: next.x + 64, y2: next.y + 64,
                                stroke: `rgba(255, 255, 255, 0.15)`,
                                strokeWidth: '2',
                                className: 'pulse-line'
                            });
                        })
                    ),

                    // Nodes
                    agents.map(agent => (
                        React.createElement('div', {
                            key: agent.id,
                            onMouseDown: (e) => handleMouseDown(agent.id, e),
                            className: `absolute z-10 p-6 rounded-2xl glass agent-node flex flex-col items-center justify-center gap-3 w-32 aura-${agent.color} ${activeId === agent.id ? 'scale-105' : ''}`,
                            style: { left: agent.x, top: agent.y, transition: draggingId === agent.id ? 'none' : 'transform 0.2s' }
                        },
                            React.createElement('div', { className: `p-3 rounded-xl bg-${agent.color}-500/20 text-${agent.color}-400` },
                                React.createElement('i', { 'data-lucide': agent.icon, className: 'w-6 h-6' })
                            ),
                            React.createElement('div', { className: 'text-center' },
                                React.createElement('div', { className: 'font-semibold text-sm' }, agent.name),
                                React.createElement('div', { className: 'text-[10px] text-slate-500 uppercase tracking-widest' }, agent.role)
                            )
                        )
                    ))
                ),

                // Footer Info
                React.createElement('div', { className: 'absolute bottom-10 right-10 flex gap-6 text-xs mono text-slate-500' },
                    React.createElement('div', null, 'LATENCY: 12ms'),
                    React.createElement('div', null, 'PROTOCOL: AURA-WS-V2'),
                    React.createElement('div', null, 'STATE: SYNCED')
                ),

                // Toast/Instruction
                React.createElement('div', { className: 'absolute bottom-10 left-10 glass px-4 py-2 rounded-full text-xs text-slate-400 flex items-center gap-2' },
                    React.createElement('span', { className: 'w-2 h-2 rounded-full bg-green-500 animate-pulse' }),
                    'Click agents to trigger vibration and sound'
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));

        // Re-init icons after React render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
