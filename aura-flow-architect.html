<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Flow Architect | HAMAtoChord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background-color: #050505;
            color: #fff;
        }
        canvas {
            display: block;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.5), 0 0 20px rgba(255, 105, 180, 0.3);
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <!-- UI Overlay -->
    <div class="fixed top-0 left-0 w-full p-6 flex justify-between items-start pointer-events-none">
        <div class="pointer-events-auto">
            <h1 class="text-3xl font-bold tracking-tighter glow-text text-pink-400">Aura Flow Architect</h1>
            <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Procedural Flow Field Visualizer v1.0</p>
        </div>
        <div class="flex gap-4 pointer-events-auto">
            <button id="audio-toggle" class="glass p-3 rounded-full hover:bg-white/10 transition-all group" title="Toggle Audio">
                <i data-lucide="volume-x" id="vol-icon" class="w-6 h-6 text-pink-300 group-hover:scale-110 transition-transform"></i>
            </button>
            <button id="share-x" class="glass px-6 py-3 rounded-full font-semibold hover:bg-white/10 transition-all flex items-center gap-2 group">
                <i data-lucide="twitter" class="w-5 h-5 group-hover:rotate-12 transition-transform"></i>
                <span>Post to X</span>
            </button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full p-8 pointer-events-none">
        <div class="glass max-w-md p-6 rounded-3xl pointer-events-auto">
            <h2 class="text-lg font-semibold mb-2 flex items-center gap-2">
                <i data-lucide="info" class="w-5 h-5 text-pink-400"></i>
                How to Interact
            </h2>
            <p class="text-sm text-gray-300 leading-relaxed mb-4">
                Move your mouse to influence the flow of particles. Click and drag to rotate the view. The ambient synthesizer responds to the movement speed of your cursor.
            </p>
            <div class="flex gap-4">
                <button id="randomize" class="bg-pink-600 hover:bg-pink-500 text-white px-4 py-2 rounded-xl text-sm font-bold transition-all shadow-lg shadow-pink-900/20">
                    Randomize Flow
                </button>
                <button id="fullscreen" class="glass hover:bg-white/10 px-4 py-2 rounded-xl text-sm font-bold transition-all">
                    Fullscreen
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Three.js Logic ---
        let scene, camera, renderer, particles, particleSystem;
        const count = 15000;
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        let speed = 0.05;

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('container').appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 100;

                const r = 0.5 + Math.random() * 0.5;
                const g = 0.2 + Math.random() * 0.3;
                const b = 0.8 + Math.random() * 0.2;
                colors[i * 3] = r;
                colors[i * 3 + 1] = g;
                colors[i * 3 + 2] = b;

                sizes[i] = Math.random() * 2;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const material = new THREE.PointsMaterial({
                size: 0.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('mousemove', onMouseMove, false);
        }

        function onMouseMove(event) {
            mouseX = (event.clientX - window.innerWidth / 2) / 100;
            mouseY = (event.clientY - window.innerHeight / 2) / 100;
            
            // Audio interaction
            if (audioStarted) {
                const vol = Math.sqrt(mouseX*mouseX + mouseY*mouseY) * 0.1;
                filter.frequency.rampTo(200 + vol * 2000, 0.1);
                reverb.wet.value = Math.min(0.8, vol);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;

            particleSystem.rotation.y += 0.001 + targetX * 0.01;
            particleSystem.rotation.x += 0.001 + targetY * 0.01;

            const positions = particleSystem.geometry.attributes.position.array;
            for (let i = 0; i < count; i++) {
                const ix = i * 3;
                const iy = i * 3 + 1;
                const iz = i * 3 + 2;

                // Simple flow field effect
                positions[ix] += Math.sin(positions[iy] * 0.05 + Date.now() * 0.001) * 0.1;
                positions[iy] += Math.cos(positions[ix] * 0.05 + Date.now() * 0.001) * 0.1;
                
                // Wrap around
                if (positions[ix] > 60) positions[ix] = -60;
                if (positions[ix] < -60) positions[ix] = 60;
                if (positions[iy] > 60) positions[iy] = -60;
                if (positions[iy] < -60) positions[iy] = 60;
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // --- Tone.js Logic ---
        let audioStarted = false;
        const synth = new Tone.PolySynth(Tone.Synth).toDestination();
        const filter = new Tone.Filter(800, "lowpass").toDestination();
        const reverb = new Tone.Reverb(4).toDestination();
        synth.connect(filter);
        filter.connect(reverb);

        synth.set({
            oscillator: { type: "triangle" },
            envelope: { attack: 2, decay: 1, sustain: 0.5, release: 4 }
        });

        async function startAudio() {
            if (audioStarted) {
                Tone.Transport.stop();
                audioStarted = false;
                document.getElementById('vol-icon').innerHTML = lucide.createIcons({
                    name: 'volume-x'
                });
                return;
            }
            await Tone.start();
            audioStarted = true;
            document.getElementById('vol-icon').innerHTML = lucide.createIcons({
                name: 'volume-2'
            });

            // Ambient loop
            const notes = ["C3", "G3", "Bb3", "D4", "F4", "A4"];
            let idx = 0;
            Tone.Transport.scheduleRepeat((time) => {
                const note = notes[Math.floor(Math.random() * notes.length)];
                synth.triggerAttackRelease(note, "2n", time, 0.1);
            }, "2n");
            Tone.Transport.start();
        }

        // --- UI Logic ---
        document.getElementById('audio-toggle').addEventListener('click', () => {
            startAudio();
            const icon = document.getElementById('vol-icon');
            if (audioStarted) {
                icon.setAttribute('data-lucide', 'volume-2');
            } else {
                icon.setAttribute('data-lucide', 'volume-x');
            }
            lucide.createIcons();
        });

        document.getElementById('randomize').addEventListener('click', () => {
            const positions = particleSystem.geometry.attributes.position.array;
            for (let i = 0; i < count; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 100;
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;
            
            // Randomize colors too
            const colors = particleSystem.geometry.attributes.color.array;
            const hue = Math.random();
            for (let i = 0; i < count; i++) {
                const c = new THREE.Color().setHSL(hue + (Math.random() * 0.1), 0.7, 0.6);
                colors[i * 3] = c.r;
                colors[i * 3 + 1] = c.g;
                colors[i * 3 + 2] = c.b;
            }
            particleSystem.geometry.attributes.color.needsUpdate = true;
        });

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        document.getElementById('share-x').addEventListener('click', () => {
            const text = encodeURIComponent("Aura Flow Architect: Procedural Flow Field Visualizer 🌌✨\nCreated by @HAMAtoChord\n#DailyApp #WEB制作 #Threejs");
            const url = encodeURIComponent(window.location.href);
            window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
        });

        // Initialize everything
        initThree();
        animate();
        lucide.createIcons();
    </script>
</body>
</html>
