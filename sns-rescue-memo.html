<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNSもしもメモ (SNS Rescue Memo)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=JetBrains+Mono&display=swap');
        :root {
            --safety-orange: #ff9800;
            --oshama-pink: #ff4081;
            --bg-dark: #1a1a2e;
        }
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #252545 0%, #1a1a2e 100%);
            color: #ffffff;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(255, 64, 129, 0.3);
        }
        .btn-rescue {
            background: linear-gradient(45deg, var(--safety-orange), var(--oshama-pink));
            transition: all 0.3s ease;
        }
        .btn-rescue:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.5);
        }
    </style>
</head>
<body class="p-6 md:p-12 min-h-screen flex flex-col items-center">
    
    <header class="text-center mb-10 max-w-xl">
        <div class="inline-block p-4 glass mb-4 border-orange-500/50">
            <i data-lucide="shield-alert" class="w-12 h-12 text-orange-500 mx-auto mb-2"></i>
            <h1 class="text-3xl font-bold tracking-tight">SNSもしもメモ</h1>
            <p class="text-xs text-orange-400 font-mono mt-1 uppercase tracking-widest">SNS Rescue Memo v1.0</p>
        </div>
        <p class="text-slate-300 text-sm leading-relaxed">
            「凍結」や「不具合」は突然やってくる。大切なフォロワーさんへの伝言、サブ垢情報をブラウザにだけ保存。サーバーには一切送信されません。
        </p>
    </header>

    <main class="w-full max-w-2xl space-y-6">
        
        <!-- Memo Area -->
        <div class="glass p-8 neon-border">
            <div class="flex items-center gap-2 mb-6 text-pink-400">
                <i data-lucide="message-square" class="w-5 h-5"></i>
                <h2 class="font-bold">フォロワーさんへの伝言</h2>
            </div>
            <textarea id="rescueMemo" class="w-full h-40 bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-slate-200 focus:outline-none focus:border-pink-500 transition" placeholder="例：凍結されたら @example_sub で活動します。ここで待っていてください！"></textarea>
        </div>

        <!-- Sub Account Info -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass p-6">
                <div class="flex items-center gap-2 mb-4 text-orange-400">
                    <i data-lucide="user-plus" class="w-5 h-5"></i>
                    <h3 class="font-bold">サブアカウントID</h3>
                </div>
                <input id="subAccount" type="text" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-orange-500 outline-none" placeholder="@your_sub_id">
            </div>
            <div class="glass p-6">
                <div class="flex items-center gap-2 mb-4 text-blue-400">
                    <i data-lucide="link" class="w-5 h-5"></i>
                    <h3 class="font-bold">他SNS / 避難所URL</h3>
                </div>
                <input id="otherUrl" type="text" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg p-3 text-slate-200 focus:border-blue-500 outline-none" placeholder="https://note.com/...">
            </div>
        </div>

        <!-- Action Button -->
        <button onclick="saveRescueData()" class="w-full py-5 btn-rescue rounded-2xl font-bold text-lg shadow-lg flex items-center justify-center gap-3">
            <i data-lucide="save" class="w-6 h-6"></i>
            ブラウザに避難準備を保存する
        </button>

        <!-- Status -->
        <div id="statusMsg" class="text-center text-sm text-slate-500 opacity-0 transition-opacity duration-500">
            Saved to LocalStorage! 🔒
        </div>

    </main>

    <footer class="mt-16 text-slate-500 text-xs text-center">
        <p>※このデータは、お使いのブラウザ内（LocalStorage）にのみ保存されます。</p>
        <p class="mt-2">&copy; 2026 OShama Rescue Project. #凍結祭り</p>
    </footer>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Load data on start
        window.onload = () => {
            document.getElementById('rescueMemo').value = localStorage.getItem('rescue_memo') || '';
            document.getElementById('subAccount').value = localStorage.getItem('rescue_sub') || '';
            document.getElementById('otherUrl').value = localStorage.getItem('rescue_url') || '';
        };

        // Save to LocalStorage
        function saveRescueData() {
            const memo = document.getElementById('rescueMemo').value;
            const sub = document.getElementById('subAccount').value;
            const url = document.getElementById('otherUrl').value;

            localStorage.setItem('rescue_memo', memo);
            localStorage.setItem('rescue_sub', sub);
            localStorage.setItem('rescue_url', url);

            const status = document.getElementById('statusMsg');
            status.classList.remove('opacity-0');
            setTimeout(() => status.classList.add('opacity-0'), 2000);
            
            // Log for GA4
            gtag('event', 'rescue_save', {
                'event_category': 'action',
                'event_label': 'save_data'
            });
        }
    </script>
</body>
</html>
