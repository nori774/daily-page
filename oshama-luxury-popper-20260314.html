<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OShama Luxury Popper | ホワイトデー特別版</title>
    <!-- Google Tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #fef2f2 0%, #fff1f2 50%, #f5f3ff 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .bubble {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .bubble:hover {
            transform: scale(1.1);
        }
        .pop-animation {
            animation: pop 0.4s ease-out forwards;
        }
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header Section -->
    <div class="fixed top-8 left-0 right-0 z-10 flex flex-col items-center pointer-events-none">
        <div class="glass px-6 py-3 rounded-full shadow-lg flex items-center space-x-4 pointer-events-auto">
            <div class="text-pink-500 font-bold">
                <span class="text-sm opacity-60">OShama Score</span>
                <div id="score" class="text-2xl">0</div>
            </div>
            <div class="h-8 w-px bg-pink-200"></div>
            <div class="text-purple-500 font-bold">
                <span class="text-sm opacity-60">High Class</span>
                <div id="highScore" class="text-2xl">0</div>
            </div>
        </div>
    </div>

    <!-- Main Playground -->
    <div id="playground" class="relative w-full h-[70vh] max-w-2xl overflow-hidden rounded-3xl mt-12">
        <!-- Bubbles will be injected here -->
    </div>

    <!-- Message Display -->
    <div id="messageContainer" class="fixed bottom-12 left-4 right-4 text-center pointer-events-none transition-all duration-500 opacity-0 translate-y-4">
        <div class="glass inline-block px-8 py-4 rounded-2xl shadow-xl max-w-md">
            <p id="quote" class="text-gray-700 text-lg font-medium leading-relaxed"></p>
            <p class="text-pink-400 text-sm mt-2 font-bold">— OShama Wisdom</p>
        </div>
    </div>

    <!-- Start Overlay -->
    <div id="overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-white/60 backdrop-blur-md transition-opacity duration-500">
        <div class="text-center p-8 max-w-sm">
            <h1 class="text-4xl font-bold text-gray-800 mb-4">Luxury Popper</h1>
            <p class="text-gray-600 mb-8 leading-relaxed">
                ホワイトデーの夜は、宝石を弾いて<br>
                最高におシャマな気分を味わいましょう。
            </p>
            <button id="startBtn" class="bg-gradient-to-r from-pink-400 to-purple-400 text-white px-10 py-4 rounded-full font-bold shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-300">
                Party Start ✨
            </button>
        </div>
    </div>

    <script>
        const quotes = [
            "ダイヤモンドは女の子の親友だけど、マカロンはソウルメイトね。",
            "お返しは三倍返し？いえ、センスは無限大返しよ。",
            "甘いだけの恋なんて、お砂糖の入っていない紅茶くらい物足りないわ。",
            "本当の贅沢は、何もしない時間の中に隠れているの。",
            "マシュマロみたいにふわふわな言葉より、確かな宝石を一つ。",
            "大人になるっていうのは、苦いコーヒーの美味しさを知ることじゃないかしら？",
            "ドレスアップは自分のためにするもの。誰かの視線なんてスパイスに過ぎないわ。",
            "ホワイトデーの魔法は、日付が変わっても解けないようにかけておいたの。",
            "自分へのご褒美を忘れるなんて、おシャマ失格よ？",
            "完璧すぎるギフトより、少しの隙がある方が愛らしいものよ。"
        ];

        const icons = ['gem', 'heart', 'star', 'sparkles', 'gift', 'coffee', 'palette'];
        const colors = [
            'from-pink-300 to-rose-300',
            'from-purple-300 to-indigo-300',
            'from-yellow-200 to-orange-200',
            'from-blue-300 to-cyan-300',
            'from-emerald-300 to-teal-300'
        ];

        let score = 0;
        let highScore = localStorage.getItem('oshama_high_score') || 0;
        document.getElementById('highScore').innerText = highScore;

        const playground = document.getElementById('playground');
        const scoreEl = document.getElementById('score');
        const quoteEl = document.getElementById('quote');
        const messageContainer = document.getElementById('messageContainer');

        function createBubble() {
            const bubble = document.createElement('div');
            const iconName = icons[Math.floor(Math.random() * icons.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            const size = Math.floor(Math.random() * 40) + 60; // 60-100px
            const x = Math.random() * (playground.clientWidth - size);
            const y = Math.random() * (playground.clientHeight - size);

            bubble.className = `bubble floating absolute flex items-center justify-center rounded-full shadow-lg glass bg-gradient-to-br ${color}`;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${x}px`;
            bubble.style.top = `${y}px`;
            bubble.style.animationDelay = `${Math.random() * 2}s`;
            
            const icon = document.createElement('i');
            icon.setAttribute('data-lucide', iconName);
            icon.className = 'text-white w-8 h-8 drop-shadow-md';
            bubble.appendChild(icon);
            
            bubble.onclick = () => popBubble(bubble);
            playground.appendChild(bubble);
            lucide.createIcons();

            // Auto-remove if too many
            if (playground.children.length > 12) {
                playground.removeChild(playground.firstChild);
            }
        }

        function popBubble(el) {
            el.classList.remove('floating');
            el.classList.add('pop-animation');
            
            score += 10;
            scoreEl.innerText = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('oshama_high_score', highScore);
                document.getElementById('highScore').innerText = highScore;
            }

            showQuote();

            setTimeout(() => {
                if (el.parentNode) {
                    el.remove();
                    createBubble();
                }
            }, 400);
        }

        let messageTimeout;
        function showQuote() {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            quoteEl.innerText = randomQuote;
            
            messageContainer.classList.remove('opacity-0', 'translate-y-4');
            messageContainer.classList.add('opacity-100', 'translate-y-0');

            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                messageContainer.classList.remove('opacity-100', 'translate-y-0');
                messageContainer.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        }

        document.getElementById('startBtn').onclick = () => {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                for(let i = 0; i < 6; i++) {
                    setTimeout(createBubble, i * 300);
                }
            }, 500);
        };

        lucide.createIcons();
    </script>
</body>
</html>
