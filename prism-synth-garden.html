<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Synth Garden - OShama Daily App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.26/Tone.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF69B4;
            --secondary: #FFB6C1;
            --accent: #FF1493;
            --bg: #FFF0F5;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--bg);
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.7);
            padding: 15px 25px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 2px solid var(--secondary);
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: #555;
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 245, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 0.5s;
        }

        #start-button {
            padding: 20px 40px;
            font-size: 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(255, 20, 147, 0.3);
            transition: transform 0.2s;
        }

        #start-button:hover {
            transform: scale(1.05);
        }

        #back-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            background: white;
            color: var(--accent);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid var(--secondary);
        }
    </style>
</head>
<body>

<div id="start-overlay" onclick="startApp()">
    <div id="start-button">Enter the Prism Garden ✨</div>
    <p style="margin-top: 20px; color: #FF1493;">Click to start audio</p>
</div>

<div id="ui-layer">
    <h1>Prism Synth Garden</h1>
    <p>Move mouse to create light trails. Click to play shimmering notes. 🌸💎</p>
</div>

<a href="index.html" id="back-btn">← Gallery</a>

<script>
    let synth;
    let particles = [];
    let reverb;
    let delay;
    let started = false;

    function setup() {
        createCanvas(windowWidth, windowHeight);
        colorMode(HSB, 360, 100, 100, 1);
        
        // Audio Setup
        reverb = new Tone.Reverb(4).toDestination();
        delay = new Tone.FeedbackDelay("8n", 0.5).connect(reverb);
        synth = new Tone.PolySynth(Tone.Synth).connect(delay);
        synth.set({
            oscillator: { type: "sine" },
            envelope: { attack: 0.1, release: 1 }
        });
    }

    async function startApp() {
        await Tone.start();
        document.getElementById('start-overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('start-overlay').style.display = 'none';
        }, 500);
        started = true;
    }

    function draw() {
        background(330, 10, 100, 0.1); // Soft pink bg with trail effect

        // Create particles on mouse move
        if (started && (mouseX !== pmouseX || mouseY !== pmouseY)) {
            for (let i = 0; i < 2; i++) {
                particles.push(new Particle(mouseX, mouseY));
            }
        }

        // Update and draw particles
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].display();
            if (particles[i].isDead()) {
                particles.splice(i, 1);
            }
        }
    }

    function mousePressed() {
        if (!started) return;
        
        // Pentatonic Scale in C Major
        const scale = ["C4", "D4", "E4", "G4", "A4", "C5", "D5", "E5", "G5", "A5"];
        const noteIndex = floor(map(mouseX, 0, width, 0, scale.length));
        const note = scale[constrain(noteIndex, 0, scale.length - 1)];
        
        synth.triggerAttackRelease(note, "4n");
        
        // Burst effect
        for (let i = 0; i < 20; i++) {
            particles.push(new Particle(mouseX, mouseY, true));
        }
    }

    class Particle {
        constructor(x, y, isBurst = false) {
            this.pos = createVector(x, y);
            this.vel = p5.Vector.random2D().mult(isBurst ? random(2, 5) : random(0.5, 2));
            this.acc = createVector(0, 0.05);
            this.lifespan = 255;
            this.hue = random(300, 360); // Pink to Purple range
            this.size = isBurst ? random(8, 15) : random(3, 8);
            this.angle = random(TWO_PI);
            this.rotation = random(-0.1, 0.1);
        }

        update() {
            this.vel.add(this.acc);
            this.pos.add(this.vel);
            this.lifespan -= 4;
            this.angle += this.rotation;
        }

        display() {
            push();
            translate(this.pos.x, this.pos.y);
            rotate(this.angle);
            noStroke();
            fill(this.hue, 60, 100, this.lifespan / 255);
            
            // Draw a diamond/prism shape
            beginShape();
            vertex(0, -this.size);
            vertex(this.size/2, 0);
            vertex(0, this.size);
            vertex(-this.size/2, 0);
            endShape(CLOSE);
            
            // Glow effect
            drawingContext.shadowBlur = 10;
            drawingContext.shadowColor = color(this.hue, 60, 100).toString();
            pop();
        }

        isDead() {
            return this.lifespan < 0;
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
