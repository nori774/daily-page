<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OShama Pi-Ribbon | 3.14 White Day & Pi Day Special</title>
    <!-- Google Fonts: Inter & Outfit for premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        :root {
            --oshama-white: #ffffff;
            --oshama-pink: #ffcada;
            --oshama-blue: #cde4ff;
            --oshama-text: #1a1a1a;
        }
        body {
            margin: 0;
            overflow: hidden;
            background: #fdfdfd;
            font-family: 'Inter', sans-serif;
            color: var(--oshama-text);
        }
        canvas {
            display: block;
        }
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .pi-badge {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating {
            animation: float 4s ease-in-out infinite;
        }
        /* Custom scrollbar for small UI elements */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <!-- Background Canvas -->
    <canvas id="ribbonCanvas" class="fixed inset-0 z-0"></canvas>

    <!-- UI Overlay -->
    <main class="relative z-10 w-full max-w-lg p-8 mx-4 glass rounded-3xl floating">
        <header class="mb-8 text-center">
            <div class="flex justify-center mb-4">
                <div class="p-3 bg-white rounded-full shadow-sm text-pink-400">
                    <i data-lucide="infinity" class="w-8 h-8"></i>
                </div>
            </div>
            <h1 class="text-3xl font-light tracking-tight text-gray-800 font-outfit">
                OShama <span class="font-semibold text-pink-400">Pi-Ribbon</span>
            </h1>
            <p class="mt-2 text-sm text-gray-500 font-inter">
                ホワイトデー(3.14)に舞い降りる、無限の愛の数値。
            </p>
        </header>

        <section class="space-y-6">
            <div class="p-4 bg-white/50 rounded-2xl border border-white/80">
                <p class="text-sm leading-relaxed text-gray-600">
                    <span class="font-semibold text-pink-400">Ren:</span> 「円周率の無限性と、ホワイトデーの純真さを掛け合わせたインターフェースを構築しました。リボンは円周率の各桁に呼応して、その色と揺らぎを変化させます。マウスを動かして、あなただけの3.14を描いてみてください。」
                </p>
            </div>

            <div class="flex items-center justify-between p-4 glass rounded-2xl">
                <div class="flex items-center space-x-3">
                    <i data-lucide="activity" class="w-5 h-5 text-blue-400"></i>
                    <span class="text-xs font-semibold tracking-widest text-gray-400 uppercase">Pi Modulation</span>
                </div>
                <div id="piDisplay" class="text-lg font-bold text-gray-700 pi-badge">
                    3.1415...
                </div>
            </div>

            <div class="text-center">
                <p class="text-[10px] text-gray-400 uppercase tracking-[0.2em] mb-4">Interactive Ribbon Physics</p>
                <div class="flex justify-center space-x-4">
                    <button id="clearBtn" class="flex items-center px-6 py-2 text-sm font-medium text-gray-600 transition-all bg-white rounded-full shadow-sm hover:scale-105 active:scale-95 border border-gray-100">
                        <i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i>
                        Reset
                    </button>
                </div>
            </div>
        </section>

        <footer class="mt-12 text-center">
            <p class="text-[10px] text-gray-300">© 2026 OShama Daily | Precision Engineering for the Soul</p>
        </footer>
    </main>

    <!-- Interaction Hint -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-20 pointer-events-none opacity-50 transition-opacity" id="hint">
        <p class="text-xs tracking-widest text-gray-400 uppercase">Move your mouse to flow</p>
    </div>

    <script>
        // Lucide Icons initialization
        lucide.createIcons();

        // Canvas Setup
        const canvas = document.getElementById('ribbonCanvas');
        const ctx = canvas.getContext('2d');
        const piDisplay = document.getElementById('piDisplay');
        const hint = document.getElementById('hint');

        let width, height;
        const piDigits = "31415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679";
        let piIndex = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Physics Ribbon
        const points = [];
        const maxPoints = 60;
        let mouse = { x: width / 2, y: height / 2, moved: false };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.moved = true;
            hint.style.opacity = '0';
        });

        class Point {
            constructor(x, y, digit) {
                this.x = x;
                this.y = y;
                this.digit = parseInt(digit);
                this.life = 1.0;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
            }

            update() {
                this.life -= 0.015;
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        function animate() {
            // Fade effect for trails
            ctx.fillStyle = 'rgba(253, 253, 253, 0.15)';
            ctx.fillRect(0, 0, width, height);

            if (mouse.moved) {
                const currentDigit = piDigits[piIndex % piDigits.length];
                points.unshift(new Point(mouse.x, mouse.y, currentDigit));
                piIndex++;
                
                // Update UI Display
                const start = Math.max(0, piIndex - 4);
                piDisplay.innerText = piDigits.substring(start, piIndex + 2).split('').join('.');

                if (points.length > maxPoints) {
                    points.pop();
                }
            } else {
                // Idle movement
                const time = Date.now() * 0.001;
                const idleX = width / 2 + Math.cos(time) * 200;
                const idleY = height / 2 + Math.sin(time * 0.8) * 150;
                const currentDigit = piDigits[piIndex % piDigits.length];
                points.unshift(new Point(idleX, idleY, currentDigit));
                piIndex++;
                if (points.length > maxPoints) points.pop();
            }

            // Draw Ribbon
            if (points.length > 1) {
                for (let i = 0; i < points.length - 1; i++) {
                    const p1 = points[i];
                    const p2 = points[i+1];
                    
                    p1.update();

                    // Pi-based properties
                    const thickness = (p1.digit + 1) * 2.5 * p1.life;
                    const hue = 210 + (p1.digit * 15); // Blue to Pink range
                    const alpha = p1.life * 0.6;

                    ctx.beginPath();
                    ctx.strokeStyle = `hsla(${hue}, 100%, 85%, ${alpha})`;
                    ctx.lineWidth = thickness;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();

                    // Optional "sweets" particles (circles) on digits like 3 or 1
                    if (p1.digit === 3 || p1.digit === 1 || p1.digit === 4) {
                        ctx.beginPath();
                        ctx.fillStyle = `hsla(${hue + 20}, 100%, 90%, ${alpha * 0.5})`;
                        ctx.arc(p1.x, p1.y, thickness * 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        animate();

        // Clear Button
        document.getElementById('clearBtn').addEventListener('click', () => {
            points.length = 0;
            piIndex = 0;
            piDisplay.innerText = "3.1415...";
            gtag('event', 'reset_ribbon', { 'event_category': 'interaction' });
        });

        // Initialize background with some points
        for(let i=0; i<maxPoints; i++) {
             points.push(new Point(width/2, height/2, piDigits[i%10]));
        }
    </script>
</body>
</html>
