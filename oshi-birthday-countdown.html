<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推しバースデー・カウントダウン ＆ お祝いプランナー</title>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e9 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .pop-pink {
            color: #ff4d7d;
        }
        .bg-pop-pink {
            background-color: #ff4d7d;
        }
        .border-pop-pink {
            border-color: #ff4d7d;
        }
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(255, 77, 125, 0.1), 0 10px 10px -5px rgba(255, 77, 125, 0.04);
        }
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        .animate-sparkle {
            animation: sparkle 2s infinite;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <div class="inline-block p-3 rounded-full bg-white shadow-sm mb-4 animate-sparkle">
                <i data-lucide="sparkles" class="pop-pink w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">推しバースデー</h1>
            <p class="text-gray-500">特別な日を、もっと特別に。お祝いプランナー 🎂✨</p>
        </header>

        <!-- Add Oshi Section -->
        <section class="glass rounded-3xl p-6 mb-8 shadow-sm">
            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <i data-lucide="plus-circle" class="pop-pink w-5 h-5"></i>
                推しを登録する
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">お名前（愛称）</label>
                    <input type="text" id="oshiName" placeholder="例：なつちゃん" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">誕生日</label>
                    <input type="date" id="oshiBirthday" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition-all">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-600 mb-1">お祝いプラン・メモ</label>
                    <textarea id="oshiPlan" placeholder="例：ケーキを買う、祭壇を作る、SNSでお祝い投稿！" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition-all h-24"></textarea>
                </div>
            </div>
            <button onclick="addOshi()" class="mt-6 w-full bg-pop-pink text-white font-bold py-3 rounded-xl shadow-lg hover:opacity-90 transition-all flex items-center justify-center gap-2">
                <i data-lucide="heart" class="w-5 h-5"></i>
                推しをリストに追加！
            </button>
        </section>

        <!-- Oshi List Section -->
        <div id="oshiList" class="space-y-6">
            <!-- Cards will be injected here -->
        </div>

        <!-- Footer -->
        <footer class="text-center mt-12 text-gray-400 text-sm">
            <p>&copy; 2026 OShama App Studio. 全ての推し活を応援します。</p>
        </footer>
    </div>

    <script>
        // Lucide Icons Initialization
        lucide.createIcons();

        // LocalStorage logic
        let oshiData = JSON.parse(localStorage.getItem('oshiData')) || [];

        function saveToLocal() {
            localStorage.setItem('oshiData', JSON.stringify(oshiData));
        }

        function addOshi() {
            const name = document.getElementById('oshiName').value;
            const birthday = document.getElementById('oshiBirthday').value;
            const plan = document.getElementById('oshiPlan').value;

            if (!name || !birthday) {
                alert('名前と誕生日を入力してね！');
                return;
            }

            const newOshi = {
                id: Date.now(),
                name,
                birthday,
                plan
            };

            oshiData.push(newOshi);
            saveToLocal();
            renderOshi();
            
            // Clear inputs
            document.getElementById('oshiName').value = '';
            document.getElementById('oshiBirthday').value = '';
            document.getElementById('oshiPlan').value = '';
        }

        function deleteOshi(id) {
            oshiData = oshiData.filter(o => o.id !== id);
            saveToLocal();
            renderOshi();
        }

        function calculateCountdown(birthdayStr) {
            const now = new Date();
            const bday = new Date(birthdayStr);
            const thisYearBday = new Date(now.getFullYear(), bday.getMonth(), bday.getDate());
            
            let nextBday = thisYearBday;
            if (now > thisYearBday) {
                nextBday = new Date(now.getFullYear() + 1, bday.getMonth(), bday.getDate());
            }

            const diff = nextBday - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            return { days, hours, minutes, isToday: days === 0 && now.getMonth() === bday.getMonth() && now.getDate() === bday.getDate() };
        }

        function renderOshi() {
            const list = document.getElementById('oshiList');
            list.innerHTML = '';

            oshiData.sort((a, b) => {
                const cA = calculateCountdown(a.birthday).days;
                const cB = calculateCountdown(b.birthday).days;
                return cA - cB;
            });

            oshiData.forEach(oshi => {
                const countdown = calculateCountdown(oshi.birthday);
                const card = document.createElement('div');
                card.className = 'glass rounded-3xl p-6 shadow-sm card-hover relative overflow-hidden';
                
                let countdownUI = `
                    <div class="flex items-end gap-2 mb-4">
                        <span class="text-4xl font-bold pop-pink">${countdown.days}</span>
                        <span class="text-gray-500 mb-1">日</span>
                        <span class="text-2xl font-bold text-gray-700">${countdown.hours}</span>
                        <span class="text-gray-500 mb-1">時間</span>
                    </div>
                `;

                if (countdown.isToday) {
                    countdownUI = `
                        <div class="mb-4 inline-block bg-pop-pink text-white px-4 py-2 rounded-full font-bold animate-bounce">
                            🎉 HAPPY BIRTHDAY! 🎉
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-2xl font-bold text-gray-800">${oshi.name}</h3>
                            <p class="text-sm text-gray-400 flex items-center gap-1">
                                <i data-lucide="calendar" class="w-3 h-3"></i>
                                ${oshi.birthday.replace(/-/g, '/')} 生まれ
                            </p>
                        </div>
                        <button onclick="deleteOshi(${oshi.id})" class="text-gray-300 hover:text-red-400 transition-colors">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    ${countdownUI}

                    <div class="bg-white/50 rounded-2xl p-4 border border-pink-100">
                        <p class="text-xs font-bold text-pink-400 uppercase tracking-widest mb-2 flex items-center gap-1">
                            <i data-lucide="pen-tool" class="w-3 h-3"></i>
                            Celebration Plan
                        </p>
                        <p class="text-sm text-gray-600 leading-relaxed">${oshi.plan || 'プランはまだありません。'}</p>
                    </div>

                    <div class="absolute -bottom-4 -right-4 opacity-5 transform rotate-12">
                        <i data-lucide="cake" class="w-32 h-32"></i>
                    </div>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        // Initial render
        renderOshi();

        // Refresh countdown every minute
        setInterval(renderOshi, 60000);
    </script>
</body>
</html>
