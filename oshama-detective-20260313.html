<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【おしゃま探偵】探しもの事件簿 - DailyApp</title>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fce7f3 0%, #fae8ff 100%);
            min-height: 100vh;
            color: #1f2937;
            letter-spacing: 0.01em;
            line-height: 1.6;
        }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .accent-pink { color: #ec4899; }
        .bg-accent-pink { background-color: #ec4899; }
        .btn-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3); }
        .list-enter { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-md mx-auto">
        <!-- Header -->
        <header class="text-center mb-8 list-enter">
            <div class="inline-block p-3 bg-white rounded-full shadow-sm mb-4">
                <i data-lucide="search" class="w-8 h-8 accent-pink"></i>
            </div>
            <h1 class="text-3xl font-bold mb-2">【おしゃま探偵】</h1>
            <p class="text-gray-600">探しもの事件簿 〜 迷宮入りを防ぐ魔法の手帖 〜</p>
        </header>

        <!-- Search Bar -->
        <div class="glass rounded-2xl p-4 mb-6 shadow-sm list-enter">
            <div class="relative">
                <i data-lucide="zoom-in" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="証拠品（アイテム）を捜索..." 
                    class="w-full pl-10 pr-4 py-3 bg-white/50 border-none rounded-xl focus:ring-2 focus:ring-pink-400 outline-none transition-all">
            </div>
        </div>

        <!-- Add Item Form -->
        <section class="glass rounded-2xl p-6 mb-8 shadow-md list-enter">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i data-lucide="plus-circle" class="w-5 h-5 accent-pink"></i>
                新規事件の受理
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-500 mb-1 ml-1">証拠品名</label>
                    <input type="text" id="itemName" placeholder="例：スペアキー、通帳" 
                        class="w-full px-4 py-3 bg-white/50 rounded-xl border-none focus:ring-2 focus:ring-pink-400 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm text-gray-500 mb-1 ml-1">隠し場所（保管場所）</label>
                    <input type="text" id="itemLocation" placeholder="例：リビング右の引き出し" 
                        class="w-full px-4 py-3 bg-white/50 rounded-xl border-none focus:ring-2 focus:ring-pink-400 outline-none transition-all">
                </div>
                <button id="addBtn" class="w-full bg-accent-pink text-white font-semibold py-3 rounded-xl btn-hover flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i>
                    事件簿に記録する
                </button>
            </div>
        </section>

        <!-- List Section -->
        <section>
            <h2 class="text-lg font-semibold mb-4 flex items-center justify-between ml-1">
                <span class="flex items-center gap-2">
                    <i data-lucide="clipboard-list" class="w-5 h-5 accent-pink"></i>
                    捜査進行中の案件
                </span>
                <span id="itemCount" class="text-sm bg-white/50 px-3 py-1 rounded-full text-gray-500">0件</span>
            </h2>
            <div id="itemList" class="space-y-4">
                <!-- Items will be injected here -->
            </div>
        </section>

        <!-- Footer Note -->
        <footer class="mt-12 text-center text-sm text-gray-500 list-enter">
            <p>※データはあなたの端末（ブラウザ）にのみ保存されます。</p>
            <p class="mt-2">今日も素晴らしい一日になりますように。</p>
        </footer>
    </div>

    <script>
        // State Management
        let items = JSON.parse(localStorage.getItem('oshama_items') || '[]');

        // UI Elements
        const itemList = document.getElementById('itemList');
        const itemCount = document.getElementById('itemCount');
        const searchInput = document.getElementById('searchInput');
        const addBtn = document.getElementById('addBtn');
        const itemName = document.getElementById('itemName');
        const itemLocation = document.getElementById('itemLocation');

        // Functions
        const renderItems = (filter = '') => {
            itemList.innerHTML = '';
            const filteredItems = items.filter(item => 
                item.name.toLowerCase().includes(filter.toLowerCase()) || 
                item.location.toLowerCase().includes(filter.toLowerCase())
            );

            itemCount.textContent = `${filteredItems.length}件`;

            if (filteredItems.length === 0) {
                itemList.innerHTML = `
                    <div class="text-center py-12 text-gray-400 bg-white/30 rounded-2xl border border-dashed border-gray-300">
                        <i data-lucide="ghost" class="w-12 h-12 mx-auto mb-3 opacity-20"></i>
                        <p>迷宮入りの案件はありません。</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            filteredItems.sort((a, b) => b.id - a.id).forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = 'glass rounded-2xl p-4 shadow-sm flex justify-between items-center list-enter';
                itemEl.innerHTML = `
                    <div>
                        <h3 class="font-bold text-lg">${item.name}</h3>
                        <p class="text-gray-500 flex items-center gap-1 text-sm mt-1">
                            <i data-lucide="map-pin" class="w-3 h-3"></i>
                            ${item.location}
                        </p>
                    </div>
                    <button onclick="resolveItem(${item.id})" class="p-3 rounded-full hover:bg-green-100 text-green-600 transition-colors" title="解決！">
                        <i data-lucide="check-check" class="w-6 h-6"></i>
                    </button>
                `;
                itemList.appendChild(itemEl);
            });
            lucide.createIcons();
        };

        const addItem = () => {
            if (!itemName.value.trim() || !itemLocation.value.trim()) {
                alert('証拠品名と場所を入力してくださいませ。');
                return;
            }

            const newItem = {
                id: Date.now(),
                name: itemName.value.trim(),
                location: itemLocation.value.trim()
            };

            items.push(newItem);
            saveAndRender();
            
            // Reset fields
            itemName.value = '';
            itemLocation.value = '';
            itemName.focus();
        };

        const resolveItem = (id) => {
            items = items.filter(item => item.id !== id);
            saveAndRender();
        };

        const saveAndRender = () => {
            localStorage.setItem('oshama_items', JSON.stringify(items));
            renderItems(searchInput.value);
        };

        // Event Listeners
        addBtn.addEventListener('click', addItem);
        searchInput.addEventListener('input', (e) => renderItems(e.target.value));
        
        // Initial Render
        renderItems();
        lucide.createIcons();
    </script>
</body>
</html>
