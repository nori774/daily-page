<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDP-RC | ホワイトデー・花粉指数・為替連動型お返し計算機</title>
    <!-- Google Fonts: Outfit, Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --primary-accent: #ff4d94; /* Pop Pink */
            --secondary-accent: #60a5fa; /* Blue for Financial */
            --pollen-accent: #fbbf24; /* Yellow for Pollen */
            --glass-bg: rgba(255, 255, 255, 0.7);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', 'Hiragino Sans', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 77, 148, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(96, 165, 250, 0.05) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            line-height: 1.6;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 3px rgba(255, 77, 148, 0.1);
        }

        .slider-container {
            margin-bottom: 1.5rem;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--primary-accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 77, 148, 0.3);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            border: none;
            background: var(--text-main);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            transform: scale(1.02);
            background: #000;
        }

        button:active {
            transform: scale(0.98);
        }

        .result-panel {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.8);
            border: 1px dashed var(--border-color);
            display: none;
        }

        .result-panel.active {
            display: block;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 0.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-accent);
            font-family: 'Outfit', sans-serif;
        }

        .result-advice {
            font-size: 0.875rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            font-style: italic;
        }

        .human-comment {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .glass-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="glass-card">
    <h1>WDP-RC</h1>
    <p class="subtitle">ホワイトデー・指数連動型お返し計算機 v2026.3.14</p>

    <div class="input-group">
        <label for="gift-value">バレンタインにもらった推定額 (JPY)</label>
        <input type="number" id="gift-value" placeholder="例: 3000" value="3000">
    </div>

    <div class="slider-container">
        <div class="slider-label">
            <label>今日の都内花粉飛散レベル</label>
            <span id="pollen-val" style="font-weight: 700; color: var(--pollen-accent);">非常に多い</span>
        </div>
        <input type="range" id="pollen-range" min="0" max="100" value="95">
    </div>

    <div class="input-group">
        <label for="market-sentiment">現在の為替・市場マインド</label>
        <select id="market-sentiment">
            <option value="1.2">強気 (Bullish / 円安傾向)</option>
            <option value="1.0" selected>中立 (Neutral / 4中銀待ち)</option>
            <option value="0.8">弱気 (Bearish / 警戒モード)</option>
        </select>
    </div>

    <button onclick="calculateReturn()">適正お返し額を算出</button>

    <div id="result" class="result-panel">
        <p class="result-title">推奨リターン・バリュー</p>
        <p id="return-value" class="result-value">¥0</p>
        <div id="advice" class="result-advice"></div>
    </div>

    <div class="human-comment" id="human-comment">
        …えっと、現在の花粉状況を考えると、味覚より「誠意」のインフレが起きていますね。
    </div>
</div>

<script>
    const pollenLevels = [
        { threshold: 0, text: "なし", advice: "味覚が鋭いので、高級スイーツ一択です。" },
        { threshold: 20, text: "少ない", advice: "まだ余裕があります。定番のクッキーで攻めましょう。" },
        { threshold: 40, text: "やや多い", advice: "喉の痛み（ニンバス株）に配慮して、マヌカハニーも添えて。" },
        { threshold: 70, text: "多い", advice: "味より見た目。インスタ映え重視でいきましょう。" },
        { threshold: 90, text: "非常に多い", advice: "鼻詰まりで味がしません。高級ティッシュとお菓子の抱き合わせが最適解です。" }
    ];

    function calculateReturn() {
        const giftValue = parseFloat(document.getElementById('gift-value').value) || 0;
        const pollenLevel = parseInt(document.getElementById('pollen-range').value);
        const marketMultiplier = parseFloat(document.getElementById('market-sentiment').value);

        // 基本の3倍返しルール
        let baseReturn = giftValue * 3;

        // 花粉による調整 (花粉が多いと「お見舞い」要素が加算されるが、味覚減退により単価は抑えられる)
        // 花粉指数 0-100
        const pollenAdjustment = 1 + (pollenLevel / 200); // 最大1.5倍の「誠意」が必要

        const finalValue = Math.round(baseReturn * marketMultiplier * pollenAdjustment);

        document.getElementById('return-value').innerText = `¥${finalValue.toLocaleString()}`;
        
        let selectedLevel = pollenLevels[0];
        for (let level of pollenLevels) {
            if (pollenLevel >= level.threshold) {
                selectedLevel = level;
            }
        }

        document.getElementById('advice').innerText = `【AI判定】${selectedLevel.advice} (現在のマーケット係数: ${marketMultiplier})`;
        document.getElementById('result').classList.add('active');

        const comments = [
            "…計算中。あ、今のドル円の動き、少しお返しに影響してますね。",
            "…よし。これが『震災15年目の絆』と『ホワイトデー』の均衡点です。",
            "…おっと。花粉が多すぎて、私のセンサーも少し霞んでいます。",
            "…結論が出ました。正直、ティッシュの方が喜ばれるかもしれません。"
        ];
        document.getElementById('human-comment').innerText = comments[Math.floor(Math.random() * comments.length)];
    }

    document.getElementById('pollen-range').addEventListener('input', (e) => {
        const val = e.target.value;
        let text = "なし";
        for (let level of pollenLevels) {
            if (val >= level.threshold) {
                text = level.text;
            }
        }
        document.getElementById('pollen-val').innerText = text;
    });
</script>

</body>
</html>
