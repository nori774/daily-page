<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サイレント・ホワイトデー・強奪ダイヤ - 2026春の改正版</title>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        :root {
            --primary: #ff85a1;
            --secondary: #ffc2d1;
            --accent: #4a90e2;
            --bg: #fff5f7;
            --text: #4a4a4a;
            --glass: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 133, 161, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(74, 144, 226, 0.1) 0%, transparent 20%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(255, 133, 161, 0.2);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .status-panel {
            background: #fff;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timer {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
        }

        .stealth-meter {
            flex-grow: 1;
            margin: 0 15px;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .stealth-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336);
            transition: width 0.1s;
        }

        .game-area {
            position: relative;
            height: 250px;
            background: #fff;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--secondary);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .guard {
            font-size: 4rem;
            transition: transform 0.3s;
            z-index: 2;
        }

        .guard.watching {
            transform: scale(1.2) rotate(10deg);
        }

        .target-item {
            font-size: 3rem;
            margin-top: 20px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
        }

        .target-item:active {
            transform: scale(0.9);
        }

        .instructions {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.5);
            padding: 10px;
            border-radius: 8px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 133, 161, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 133, 161, 0.5);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            z-index: 10;
            display: none;
        }

        .overlay h2 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .sakura {
            position: fixed;
            top: -10%;
            user-select: none;
            pointer-events: none;
            z-index: -1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        /* 鉄道ダイヤ改正風の表 */
        .timetable {
            font-size: 0.7rem;
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .timetable th, .timetable td {
            border: 1px solid #ddd;
            padding: 4px;
        }

        .timetable th {
            background: #f8f8f8;
        }

        .highlight {
            background: #fff0f3;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>サイレント・ホワイトデー強奪<br>2026春のダイヤ改正版</h1>
        <p class="subtitle">本日改正：静寂の中でお返しを「設置」せよ</p>

        <div class="status-panel">
            <div class="timer" id="time-display">12:00:00</div>
            <div class="stealth-meter">
                <div class="stealth-bar" id="noise-level"></div>
            </div>
            <div id="score">Score: 0</div>
        </div>

        <div class="game-area" id="game-area">
            <div class="guard" id="guard">😴</div>
            <div class="target-item" id="target">🍬</div>
            <div class="overlay" id="message-overlay">
                <h2 id="result-title">MISSION FAILED</h2>
                <p id="result-text">騒音により駅員に検知されました</p>
                <button class="btn" onclick="resetGame()">再試行</button>
            </div>
        </div>

        <div class="instructions">
            【遊び方】<br>
            1. 「強奪開始」を押すとゲーム開始<br>
            2. 駅員が寝ている間に飴をタップしてお返しを設置<br>
            3. <strong>マイク感度注意！</strong> 大きな音を出すと即座に検知されます<br>
            4. 2026年改正ダイヤに基づき、定期的に「急行」が発生します
        </div>

        <button class="btn" id="start-btn" onclick="startGame()">強奪開始 (マイク許可が必要)</button>

        <table class="timetable">
            <thead>
                <tr>
                    <th>時刻</th>
                    <th>種別</th>
                    <th>行先</th>
                    <th>備考</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>14:00</td>
                    <td>普通</td>
                    <td>本命デスク</td>
                    <td>静寂必須</td>
                </tr>
                <tr class="highlight">
                    <td>14:15</td>
                    <td>特急</td>
                    <td>義理一括</td>
                    <td>ダイヤ改正につき増発</td>
                </tr>
                <tr>
                    <td>14:30</td>
                    <td>快速</td>
                    <td>自分用</td>
                    <td>隠れて食べる</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        let isPlaying = false;
        let score = 0;
        let noiseLevel = 0;
        let audioContext;
        let analyser;
        let microphone;
        let javascriptNode;
        let guardState = 'sleeping'; // sleeping, waking, watching
        let gameTimer;

        const guardEmojis = {
            sleeping: '😴',
            waking: '🤔',
            watching: '👁️'
        };

        const targetEmojis = ['🍬', '🍫', '🍪', '🍰', '🍡', '🍦'];

        function createSakura() {
            const petal = document.createElement('div');
            petal.innerHTML = '🌸';
            petal.className = 'sakura';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.fontSize = Math.random() * 20 + 10 + 'px';
            petal.style.animationDuration = Math.random() * 3 + 2 + 's';
            petal.style.opacity = Math.random();
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 5000);
        }

        setInterval(createSakura, 300);

        async function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                microphone.connect(analyser);
                
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                function checkNoise() {
                    if (!isPlaying) return;
                    analyser.getByteFrequencyData(dataArray);
                    let values = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        values += dataArray[i];
                    }
                    noiseLevel = (values / bufferLength);
                    document.getElementById('noise-level').style.width = Math.min(noiseLevel * 2, 100) + '%';

                    if (noiseLevel > 40) {
                        gameOver('騒音検知！お返しがバレました。');
                    }
                    requestAnimationFrame(checkNoise);
                }
                checkNoise();
            } catch (err) {
                console.error('Audio initialization failed', err);
                alert('マイクが使用できません。静音チャレンジは無効化されますが、視覚のみでプレイ可能です。');
            }
        }

        function startGame() {
            if (isPlaying) return;
            isPlaying = true;
            score = 0;
            document.getElementById('score').innerText = 'Score: ' + score;
            document.getElementById('start-btn').disabled = true;
            document.getElementById('message-overlay').style.display = 'none';
            
            if (!audioContext) initAudio();
            
            gameLoop();
            updateTime();
        }

        function gameLoop() {
            if (!isPlaying) return;

            const nextAction = Math.random() * 2000 + 1000;
            
            setTimeout(() => {
                if (!isPlaying) return;
                
                // 駅員の挙動
                document.getElementById('guard').innerText = guardEmojis.waking;
                document.getElementById('guard').classList.add('watching');
                
                setTimeout(() => {
                    if (!isPlaying) return;
                    document.getElementById('guard').innerText = guardEmojis.watching;
                    guardState = 'watching';
                    
                    setTimeout(() => {
                        if (!isPlaying) return;
                        document.getElementById('guard').innerText = guardEmojis.sleeping;
                        document.getElementById('guard').classList.remove('watching');
                        guardState = 'sleeping';
                        gameLoop();
                    }, 1000 + Math.random() * 1000);
                }, 500);
            }, nextAction);
        }

        document.getElementById('target').addEventListener('click', () => {
            if (!isPlaying) return;
            
            if (guardState === 'watching') {
                gameOver('駅員に見つかりました！');
            } else {
                score++;
                document.getElementById('score').innerText = 'Score: ' + score;
                document.getElementById('target').innerText = targetEmojis[Math.floor(Math.random() * targetEmojis.length)];
                
                // 成功エフェクト
                document.getElementById('target').style.transform = 'scale(1.5)';
                setTimeout(() => {
                    document.getElementById('target').style.transform = 'scale(1)';
                }, 100);
            }
        });

        function gameOver(reason) {
            isPlaying = false;
            document.getElementById('result-title').innerText = 'MISSION FAILED';
            document.getElementById('result-text').innerText = reason;
            document.getElementById('message-overlay').style.display = 'flex';
            document.getElementById('start-btn').disabled = false;
        }

        function resetGame() {
            document.getElementById('message-overlay').style.display = 'none';
            startGame();
        }

        function updateTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                          now.getMinutes().toString().padStart(2, '0') + ':' + 
                          now.getSeconds().toString().padStart(2, '0');
            document.getElementById('time-display').innerText = timeStr;
            if (isPlaying) setTimeout(updateTime, 1000);
        }
    </script>
</body>
</html>
