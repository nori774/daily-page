<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMAtoChord Daily App Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF69B4;
            --secondary: #FFB6C1;
            --accent: #FF1493;
            --bg: linear-gradient(135deg, #FFE4E1, #FFB6C1, #FF69B4);
        }
        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: var(--bg);
            background-attachment: fixed;
            margin: 0;
            padding: 40px 20px;
            color: #333;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: var(--accent);
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
        }
        .app-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .app-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid var(--secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .app-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
            border-color: var(--primary);
        }
        .app-date {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
        }
        .app-name {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💖 HAMAtoChord Daily App Gallery</h1>
        <div class="app-list" id="app-list">
            <!-- New apps will be added here -->
            <a href="nap-swarm-agency.html" class="app-card">
                <div class="app-date">2026-03-11</div>
                <div class="app-name">ひるねエージェント・スウォーム</div>
            </a>
        </div>
        <div class="footer">
            <p>Created by <a href="https://x.com/HAMAtoChord" target="_blank">@HAMAtoChord</a></p>
        </div>
    </div>
</body>
</html>
