<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隙間職人：イヤホン・ホールインワン | Gap Master: Earphone Hole-in-One</title>
    <!-- Google Fonts: Outfit, Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary-accent: #ff4d94; /* Pop Pink */
            --secondary-accent: #4ade80; /* Success Green */
            --glass-bg: rgba(255, 255, 255, 0.7);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', 'Hiragino Sans', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 77, 148, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(74, 222, 128, 0.05) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            overflow: hidden;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, var(--primary-accent), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        /* Game Area */
        #game-container {
            width: 100%;
            height: 320px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            position: relative;
            overflow: hidden;
            cursor: crosshair;
            margin-bottom: 1.5rem;
        }

        .gap-target {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 40px;
            background: #334155;
            border-radius: 0.5rem;
        }

        .gap-inner {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px; /* Current Gap Width */
            height: 100%;
            background: #0f172a;
            border-radius: 0.25rem;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .earphone {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .earphone::after {
            content: '';
            width: 12px;
            height: 12px;
            background: #e2e8f0;
            border-radius: 50%;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .stat-val {
            color: var(--text-main);
            font-size: 1rem;
            display: block;
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            border: none;
            background: var(--text-main);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            transform: translateY(-2px);
            background: #000;
        }

        button:active {
            transform: translateY(0);
        }

        .feedback-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            opacity: 0;
            z-index: 20;
        }

        .feedback-text {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--primary-accent);
            text-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .human-comment {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            min-height: 3em;
        }

        .animate-pop {
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes pop {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(1); }
        }

        /* Mouse Follower */
        #aimer {
            position: absolute;
            top: 30px;
            width: 100%;
            height: 2px;
            background: dashed var(--primary-accent);
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <h1>隙間職人</h1>
    <p class="subtitle">イヤホン・ホールインワン Simulator v1.0</p>

    <div class="stats">
        <div>
            SCORE
            <span id="score" class="stat-val">0</span>
        </div>
        <div>
            COMBO
            <span id="combo" class="stat-val">0</span>
        </div>
        <div>
            DIFFICULTY
            <span id="level" class="stat-val">NORMAL</span>
        </div>
    </div>

    <div id="game-container">
        <div id="aimer"></div>
        <div class="gap-target" id="target">
            <div class="gap-inner" id="gap"></div>
        </div>
        <div id="earphone-pool"></div>
        <div class="feedback-overlay" id="feedback-overlay">
            <span class="feedback-text" id="feedback-text">PERFECT!</span>
        </div>
    </div>

    <button id="drop-btn">RELEASE (SPACE)</button>

    <div class="human-comment" id="human-comment">
        …えっと、SKE48の河村優愛さんが奇跡のホールインワン（隙間にイヤホン落下）を達成したそうですよ。2.8万いいね狙いましょう。
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const gap = document.getElementById('gap');
    const target = document.getElementById('target');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const feedbackOverlay = document.getElementById('feedback-overlay');
    const feedbackText = document.getElementById('feedback-text');
    const commentEl = document.getElementById('human-comment');
    const dropBtn = document.getElementById('drop-btn');

    let score = 0;
    let combo = 0;
    let isDropping = false;
    let gapPos = 50; // Percent
    let gapWidth = 30; // px
    let direction = 1;
    let speed = 1.5;

    // Move Gap
    function updateGap() {
        if (!isDropping) {
            gapPos += speed * direction;
            if (gapPos > 85 || gapPos < 15) direction *= -1;
            target.style.left = gapPos + '%';
        }
        requestAnimationFrame(updateGap);
    }
    updateGap();

    function dropEarphone() {
        if (isDropping) return;
        isDropping = true;

        const earphone = document.createElement('div');
        earphone.className = 'earphone';
        earphone.style.left = '50%';
        earphone.style.top = '40px';
        container.appendChild(earphone);

        let top = 40;
        const fallSpeed = 8;
        
        const fall = setInterval(() => {
            top += fallSpeed;
            earphone.style.top = top + 'px';

            // Collision check
            if (top >= 260) {
                clearInterval(fall);
                checkResult(gapPos);
                setTimeout(() => {
                    earphone.remove();
                    isDropping = false;
                }, 1000);
            }
        }, 16);
    }

    function checkResult(currentGapPos) {
        // Earphone is at center (50%)
        // Gap is at currentGapPos%
        // Container width is 100% (around 400px)
        const containerWidth = container.offsetWidth;
        const gapCenterPx = (currentGapPos / 100) * containerWidth;
        const earphoneCenterPx = containerWidth / 2;
        
        const diff = Math.abs(gapCenterPx - earphoneCenterPx);
        const hitZone = gapWidth / 2;

        if (diff < hitZone) {
            // Hit!
            score += 100 * (combo + 1);
            combo++;
            showFeedback("HOLE IN ONE!", "#4ade80");
            updateStats();
            updateComment("success");
            
            // Level up
            speed += 0.2;
            gapWidth = Math.max(15, gapWidth - 2);
            gap.style.width = gapWidth + 'px';
        } else {
            // Miss
            combo = 0;
            showFeedback("MISS...", "#ff4d94");
            updateStats();
            updateComment("fail");
            
            // Reset difficulty slightly
            gapWidth = Math.min(30, gapWidth + 5);
            gap.style.width = gapWidth + 'px';
        }
    }

    function showFeedback(text, color) {
        feedbackText.innerText = text;
        feedbackText.style.color = color;
        feedbackOverlay.classList.remove('animate-pop');
        void feedbackOverlay.offsetWidth; // Trigger reflow
        feedbackOverlay.classList.add('animate-pop');
    }

    function updateStats() {
        scoreEl.innerText = score.toLocaleString();
        comboEl.innerText = combo;
        const level = speed > 5 ? "HARDCORE" : (speed > 3 ? "PRO" : "NORMAL");
        document.getElementById('level').innerText = level;
    }

    function updateComment(type) {
        const success = [
            "…おお！まさに2.8万いいね級の奇跡！",
            "…隙間職人の才能がありますね。転職しますか？",
            "…完璧です。これ、ワイヤレスイヤホンじゃなくて宝石だったら良かったのに。",
            "…よし！これでお掃除の時に絶望するフラグが立ちました！"
        ];
        const fail = [
            "…あーあ、洗濯機の下に転がっていきましたよ。",
            "…どんまいです。片耳だけメルカリで買うことになりますね。",
            "…えっと、今の音、壊れた音じゃないですよね？",
            "…隙間は甘くない。ホワイトデーのようにはいきません。"
        ];
        
        const list = type === "success" ? success : fail;
        commentEl.innerText = list[Math.floor(Math.random() * list.list)]; // Bug fixed below
    }

    // Fix the bug in updateComment
    function updateCommentFixed(type) {
        const success = [
            "…おお！まさに2.8万いいね級の奇跡！",
            "…隙間職人の才能がありますね。転職しますか？",
            "…完璧です。これ、ワイヤレスイヤホンじゃなくて宝石だったら良かったのに。",
            "…よし！これでお掃除の時に絶望するフラグが立ちました！"
        ];
        const fail = [
            "…あーあ、洗濯機の下に転がっていきましたよ。",
            "…どんまいです。片耳だけメルカリで買うことになりますね。",
            "…えっと、今の音、壊れた音じゃないですよね？",
            "…隙間は甘くない。ホワイトデーのようにはいきません。"
        ];
        const list = type === "success" ? success : fail;
        commentEl.innerText = list[Math.floor(Math.random() * list.length)];
    }

    // Replace the buggy one
    window.updateComment = updateCommentFixed;

    dropBtn.addEventListener('click', dropEarphone);
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            dropEarphone();
        }
    });
</script>

</body>
</html>
