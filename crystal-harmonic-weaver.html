<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Harmonic Weaver | OShama</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF69B4;
            --accent: #FF1493;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a1a;
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            color: white;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }
        .ui-overlay h1 {
            margin: 0;
            font-size: 2.5rem;
            background: linear-gradient(to right, #FF69B4, #FFB6C1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
        }
        .ui-overlay p {
            margin: 5px 0;
            opacity: 0.8;
            font-size: 1rem;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 15px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s;
            pointer-events: auto;
        }
        .btn:hover {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
        }
        #start-overlay div {
            text-align: center;
        }
        #start-overlay h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--primary);
        }
    </style>
</head>
<body>

<div id="start-overlay">
    <div>
        <h2>Crystal Harmonic Weaver</h2>
        <p>Click to Start Resonance</p>
    </div>
</div>

<div class="ui-overlay">
    <h1>Crystal Harmonic Weaver</h1>
    <p>機能和声とクリスタルの共鳴 ✨</p>
    <p id="chord-display">Function: -</p>
</div>

<div class="controls">
    <button class="btn" onclick="playChord('I')">I (Tonic)</button>
    <button class="btn" onclick="playChord('IV')">IV (Subdominant)</button>
    <button class="btn" onclick="playChord('V')">V (Dominant)</button>
    <button class="btn" onclick="playChord('vi')">vi (Relative Minor)</button>
</div>

<div id="canvas-container"></div>

<script>
    let scene, camera, renderer, crystal, particles;
    let isStarted = false;

    // Tone.js Setup
    const synth = new Tone.PolySynth(Tone.Synth).toDestination();
    synth.set({
        oscillator: { type: "triangle" },
        envelope: { attack: 0.1, decay: 0.2, sustain: 0.5, release: 1 }
    });
    const reverb = new Tone.Reverb(2).toDestination();
    synth.connect(reverb);

    const chords = {
        'I': ['C4', 'E4', 'G4', 'B4'],
        'IV': ['F4', 'A4', 'C5', 'E5'],
        'V': ['G4', 'B4', 'D5', 'F5'],
        'vi': ['A4', 'C5', 'E5', 'G5']
    };

    const colors = {
        'I': 0x00ffff,
        'IV': 0xff00ff,
        'V': 0xffff00,
        'vi': 0x00ff00
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1, 100);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        // Crystal
        const geometry = new THREE.IcosahedronGeometry(1, 0);
        const material = new THREE.MeshPhongMaterial({
            color: 0xff69b4,
            shininess: 100,
            transparent: true,
            opacity: 0.8,
            wireframe: false
        });
        crystal = new THREE.Mesh(geometry, material);
        scene.add(crystal);

        // Wireframe overlay
        const wireframe = new THREE.WireframeGeometry(geometry);
        const line = new THREE.LineSegments(wireframe);
        line.material.color.setHex(0xffffff);
        line.material.transparent = true;
        line.material.opacity = 0.5;
        crystal.add(line);

        // Particles
        const partGeo = new THREE.BufferGeometry();
        const partCount = 1000;
        const posArray = new Float32Array(partCount * 3);
        for(let i=0; i < partCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 20;
        }
        partGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const partMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff });
        particles = new THREE.Points(partGeo, partMat);
        scene.add(particles);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        crystal.rotation.x += 0.01;
        crystal.rotation.y += 0.01;
        particles.rotation.y += 0.001;
        renderer.render(scene, camera);
    }

    async function playChord(func) {
        if(!isStarted) return;
        
        await Tone.start();
        const now = Tone.now();
        synth.triggerAttackRelease(chords[func], "2n", now);
        
        // Visual feedback
        crystal.material.color.setHex(colors[func] || 0xff69b4);
        crystal.scale.set(1.5, 1.5, 1.5);
        setTimeout(() => crystal.scale.set(1, 1, 1), 200);
        
        document.getElementById('chord-display').innerText = `Function: ${func} (Resonating...)`;
    }

    document.getElementById('start-overlay').addEventListener('click', () => {
        isStarted = true;
        document.getElementById('start-overlay').style.display = 'none';
        Tone.start();
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
