<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 性格診断×音楽コード | HAMAtoChord</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --pink-light: #FFE4E1;
            --pink-medium: #FFB6C1;
            --pink-deep: #FF69B4;
            --pink-vivid: #FF1493;
            --white: #FFFFFF;
            --shadow: 0 8px 32px rgba(255, 20, 147, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, var(--pink-light), var(--pink-medium), var(--pink-deep));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 2px solid var(--white);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--pink-vivid);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 2rem;
        }

        .quiz-box {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .question {
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #444;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        button {
            padding: 0.8rem 1rem;
            border: 2px solid var(--pink-medium);
            background: var(--white);
            color: var(--pink-vivid);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: inherit;
        }

        button:hover {
            background: var(--pink-medium);
            color: var(--white);
            transform: scale(1.05);
        }

        button.active {
            background: var(--pink-vivid);
            color: var(--white);
            border-color: var(--pink-vivid);
        }

        .action-btn {
            margin-top: 1rem;
            background: var(--pink-vivid);
            color: var(--white);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.4);
        }

        .result-box {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .result-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--pink-vivid);
            margin: 1rem 0;
        }

        .chord-display {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(to bottom, var(--pink-vivid), var(--pink-deep));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 1rem 0;
            letter-spacing: -1px;
        }

        .description {
            line-height: 1.6;
            margin-bottom: 1.5rem;
            color: #555;
        }

        .play-btn {
            background: #333;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #888;
        }

        footer a {
            color: var(--pink-vivid);
            text-decoration: none;
            font-weight: 700;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--pink-vivid);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div id="quiz-screen">
            <h1>AI 性格診断×音楽コード</h1>
            <p class="subtitle">あなたを象徴する究極の響きをAIが特定します</p>
            
            <div class="progress-bar">
                <div id="progress" class="progress-fill"></div>
            </div>

            <div class="quiz-box">
                <div id="question-container">
                    <p class="question" id="q-text">質問を読み込んでいます...</p>
                    <div class="options" id="options"></div>
                </div>
            </div>
        </div>

        <div id="result-screen" class="result-box">
            <h1>診断結果</h1>
            <p class="subtitle">あなたのパーソナル・コードは...</p>
            
            <div class="result-title" id="res-name">情熱的な開拓者</div>
            <div class="chord-display" id="res-chord">Cmaj7(9)</div>
            
            <button class="play-btn" onclick="playResultChord()">▶</button>
            
            <p class="description" id="res-desc">
                あなたは明るく、未来志向なエネルギーに満ちています。
                その響きは、どこまでも広がる空のような透明感と、
                確かな前進を感じさせる力強さを持っています。
            </p>

            <button onclick="location.reload()">もう一度診断する</button>
            
            <div style="margin-top: 1rem;">
                <button class="action-btn" onclick="shareOnX()">Xでシェアする</button>
            </div>
        </div>

        <footer>
            © 2026 <a href="https://x.com/HAMAtoChord" target="_blank">@HAMAtoChord</a> | 2026.03.11 Special
        </footer>
    </div>

    <script>
        const questions = [
            {
                q: "今の気分はどっちに近い？",
                options: [
                    { text: "エネルギッシュ！", score: "bright" },
                    { text: "落ち着いている", score: "dark" }
                ]
            },
            {
                q: "好きな景色は？",
                options: [
                    { text: "都会の夜景", score: "tension" },
                    { text: "静かな森", score: "pure" }
                ]
            },
            {
                q: "創作において大事なのは？",
                options: [
                    { text: "直感と感性", score: "major" },
                    { text: "論理と理論", score: "minor" }
                ]
            }
        ];

        const results = {
            "bright-tension-major": {
                name: "革新的なクリエイター",
                chord: "Emaj7(9, #11)",
                desc: "あなたの感性は鋭く、常に新しい「響き」を求めています。リディアンスケールの浮遊感と、#11の心地よい緊張感は、あなたの独創性を象徴しています。",
                freqs: [164.81, 246.94, 311.13, 369.99, 440.00, 466.16] // E2, B2, D#3, F#3, A3, A#3 (Approx)
            },
            "bright-pure-major": {
                name: "純真なメロディメーカー",
                chord: "Cmaj9",
                desc: "あなたは周りを明るく照らす太陽のような存在。Cmaj9の澄み切った響きは、あなたの誠実さと、美しいものへの純粋な憧れを表しています。",
                freqs: [130.81, 196.00, 261.63, 329.63, 392.00, 493.88, 587.33]
            },
            "dark-tension-minor": {
                name: "深淵の哲学者",
                chord: "Am9(11)",
                desc: "思慮深く、物事の本質を見抜く力があります。Am9の哀愁漂う響きの中に、11thの知的なアクセントが加わる、非常に深みのある性格です。",
                freqs: [110.00, 164.81, 220.00, 261.63, 329.63, 392.00, 440.00, 523.25]
            },
            "dark-pure-minor": {
                name: "静寂の観測者",
                chord: "F#m7",
                desc: "派手な喧騒よりも、静かな調和を好みます。F#m7の落ち着いた響きは、あなたの謙虚さと、内面に秘めた芯の強さを象徴しています。",
                freqs: [92.50, 138.59, 185.00, 220.00, 277.18, 329.63]
            }
            // Add more fallback logic later
        };

        let currentQ = 0;
        let userScores = [];

        function initQuiz() {
            showQuestion();
            initCanvas();
        }

        function showQuestion() {
            const q = questions[currentQ];
            document.getElementById('q-text').innerText = q.q;
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(opt.score);
                optionsDiv.appendChild(btn);
            });

            document.getElementById('progress').style.width = `${(currentQ / questions.length) * 100}%`;
        }

        function selectOption(score) {
            userScores.push(score);
            currentQ++;
            if (currentQ < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            // Simplified matching
            const key = userScores.join('-');
            const result = results[key] || results["bright-pure-major"];
            
            document.getElementById('res-name').innerText = result.name;
            document.getElementById('res-chord').innerText = result.chord;
            document.getElementById('res-desc').innerText = result.desc;
            
            window.resultData = result;

            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#FF69B4', '#FFB6C1', '#FF1493', '#FFFFFF']
            });
        }

        function shareOnX() {
            const text = `AIが診断した私のパーソナルコードは【${window.resultData.chord}】でした！\n性格タイプ：${window.resultData.name}\n\n#HAMAtoChord #音楽MBTI #WebApp`;
            const url = window.location.href;
            window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
        }

        // --- Web Audio ---
        let audioCtx;
        function playResultChord() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const freqs = window.resultData.freqs;
            const now = audioCtx.currentTime;

            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = i === 0 ? 'triangle' : 'sine';
                osc.frequency.setValueAtTime(f, now);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.1, now + 0.1 + (i * 0.05));
                gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(now);
                osc.stop(now + 3);
            });
        }

        // --- Background Canvas ---
        function initCanvas() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.onresize = resize;
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 5 + 1;
                    this.speedX = Math.random() * 1 - 0.5;
                    this.speedY = Math.random() * 1 - 0.5;
                    this.color = `rgba(255, ${Math.random() * 100 + 100}, ${Math.random() * 100 + 150}, 0.3)`;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x > canvas.width) this.x = 0;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.y > canvas.height) this.y = 0;
                    if (this.y < 0) this.y = canvas.height;
                }
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
