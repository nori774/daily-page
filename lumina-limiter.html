<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Limiter | C-Drive Space Reclaimer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #FF2D55;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a1a1a, #0a0a0a);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
        }
        .btn-primary {
            background: var(--accent);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(255, 45, 85, 0.4);
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            position: absolute;
            width: 100%;
            top: 0;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 1.5s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .item-card {
            transition: all 0.2s ease;
        }
        .item-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-3xl mx-auto space-y-8">
        <!-- Header -->
        <header class="text-center space-y-2 py-12">
            <h1 class="text-4xl md:text-6xl font-bold tracking-tight bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
                Lumina Limiter
            </h1>
            <p class="text-gray-400 text-lg md:text-xl font-light">「その創造力に、空き容量を。」</p>
        </header>

        <!-- Main Card -->
        <main id="app" class="glass p-6 md:p-10 relative overflow-hidden">
            <div id="scan-overlay" class="hidden absolute inset-0 bg-black/40 z-10 flex flex-col items-center justify-center space-y-4">
                <div class="scan-line"></div>
                <p class="text-accent font-semibold tracking-widest uppercase animate-pulse">Scanning Creative Bloat...</p>
            </div>

            <!-- Initial State -->
            <div id="initial-state" class="text-center space-y-6">
                <div class="flex justify-center">
                    <div class="w-24 h-24 rounded-full bg-accent/10 flex items-center justify-center">
                        <i data-lucide="hard-drive" class="w-12 h-12 text-accent"></i>
                    </div>
                </div>
                <div class="space-y-2">
                    <h2 class="text-2xl font-semibold">Cドライブの限界を突破する</h2>
                    <p class="text-gray-400">肥大化したAIモデルやVSTプラグインを特定し、<br class="hidden md:block">シンボリックリンクで安全に外部ドライブへ「解放」します。</p>
                </div>
                <button onclick="startScan()" class="btn-primary px-8 py-4 rounded-full font-bold text-lg inline-flex items-center gap-2">
                    <i data-lucide="search" class="w-5 h-5"></i> 創造力をスキャン
                </button>
            </div>

            <!-- Result State (Hidden Initially) -->
            <div id="result-state" class="hidden space-y-8 animate-in fade-in duration-700">
                <div class="space-y-4">
                    <div class="flex justify-between items-end">
                        <h3 class="text-xl font-semibold">Cドライブの現状</h3>
                        <span id="storage-text" class="text-accent font-bold">12GB / 512GB 空き</span>
                    </div>
                    <div class="progress-bar">
                        <div id="storage-bar" class="progress-fill" style="width: 97.6%;"></div>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-lg font-medium text-gray-300 flex items-center gap-2">
                        <i data-lucide="zap" class="w-4 h-4 text-accent"></i> 解放候補のファイル
                    </h3>
                    <div class="space-y-3" id="item-list">
                        <!-- Items will be injected here -->
                    </div>
                </div>

                <div id="summary" class="hidden p-6 bg-white/5 rounded-2xl border border-white/10 text-center space-y-4">
                    <h3 class="text-2xl font-bold text-accent">解放完了！</h3>
                    <p class="text-gray-300">合計 <span id="regained-size" class="text-white font-bold">0</span> GB の空き容量を確保しました。<br>これで新しい作品に集中できます。</p>
                    <button onclick="shareOnX()" class="bg-white text-black px-6 py-3 rounded-full font-bold inline-flex items-center gap-2 hover:bg-gray-200 transition-colors">
                        <i data-lucide="twitter" class="w-5 h-5"></i> Xに成果を報告する
                    </button>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="text-center text-gray-500 text-sm py-8 border-t border-white/5">
            <p>© 2026 OShama Digital Garden | Created by AI for Creators</p>
        </footer>
    </div>

    <script>
        lucide.createIcons();

        const items = [
            { id: 1, name: 'Flux.1-dev-fp8.safetensors', type: 'AI Model', size: 17.2, path: 'C:\\Models\\Checkpoints', status: 'ready' },
            { id: 2, name: 'Omnisphere_Data', type: 'VST Library', size: 64.5, path: 'C:\\ProgramData\\Spectrasonics', status: 'ready' },
            { id: 3, name: 'Stable-Diffusion-WebUI-v1.9', type: 'AI App', size: 12.8, path: 'C:\\AI\\sd-webui', status: 'ready' },
            { id: 4, name: 'Kontakt_Factory_Selection', type: 'NI Library', size: 23.1, path: 'C:\\Users\\Public\\Documents', status: 'ready' }
        ];

        let totalRegained = 0;
        let initialFree = 12;
        let totalCapacity = 512;

        function startScan() {
            document.getElementById('initial-state').classList.add('hidden');
            document.getElementById('scan-overlay').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('scan-overlay').classList.add('hidden');
                document.getElementById('result-state').classList.remove('hidden');
                renderItems();
            }, 2000);
        }

        function renderItems() {
            const list = document.getElementById('item-list');
            list.innerHTML = items.map(item => `
                <div class="item-card p-4 rounded-xl border border-white/10 flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center">
                            <i data-lucide="${item.type === 'AI Model' ? 'box' : 'music'}" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <div>
                            <div class="font-medium text-white group-hover:text-accent transition-colors">${item.name}</div>
                            <div class="text-xs text-gray-500">${item.type} • ${item.size} GB</div>
                        </div>
                    </div>
                    <button onclick="liberate(${item.id})" id="btn-${item.id}" 
                        class="px-4 py-2 rounded-lg border border-accent/30 text-accent text-sm font-semibold hover:bg-accent hover:text-white transition-all">
                        解放
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function liberate(id) {
            const item = items.find(i => i.id === id);
            const btn = document.getElementById(`btn-${id}`);
            
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>';
            btn.disabled = true;
            lucide.createIcons();

            setTimeout(() => {
                btn.innerHTML = '解放済み';
                btn.classList.remove('text-accent', 'border-accent/30', 'hover:bg-accent');
                btn.classList.add('text-gray-500', 'border-white/5', 'bg-white/5');
                
                totalRegained += item.size;
                updateStorage();
                
                if (items.every(i => document.getElementById(`btn-${i.id}`).innerText === '解放済み')) {
                    document.getElementById('summary').classList.remove('hidden');
                    document.getElementById('regained-size').innerText = totalRegained.toFixed(1);
                }
            }, 1000);
        }

        function updateStorage() {
            const currentFree = initialFree + totalRegained;
            const usedPercent = ((totalCapacity - currentFree) / totalCapacity) * 100;
            
            document.getElementById('storage-text').innerText = `${currentFree.toFixed(1)}GB / ${totalCapacity}GB 空き`;
            document.getElementById('storage-bar').style.width = `${usedPercent}%`;
        }

        function shareOnX() {
            const text = `Lumina Limiter で Cドライブの創造力を解放しました！\n\n「その創造力に、空き容量を。」\n合計 ${totalRegained.toFixed(1)}GB の空き容量を確保しました。\n\n${window.location.href}\n#DailyApp #WEB制作 #CDriveLiberation`;
            const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
