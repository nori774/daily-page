<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Chord Harmonizer - 2026.03.11</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.26/Tone.js"></script>
    <style>
        :root {
            --primary: #FF69B4;
            --secondary: #FFB6C1;
            --accent: #FF1493;
            --dark: #1a1a2e;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--dark);
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            color: white;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
        }

        p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            pointer-events: auto;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            color: var(--primary);
            transform: scale(1.1);
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
        }

        #start-overlay h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .hint {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            opacity: 0.6;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="startApp()">
        <h2>Star Chord Harmonizer</h2>
        <p>Click to Start & Harmonize the Universe</p>
    </div>

    <div id="ui-layer">
        <h1>Star Chord Harmonizer</h1>
        <p>2026.03.11 - Click empty space to create stars</p>
    </div>

    <div class="hint">Click stars to play chords! Drag to move them.</div>

    <div id="controls">
        <button class="btn" onclick="clearStars()">✨ Clear All</button>
        <button class="btn" onclick="randomHarmony()">🎵 Random Harmony</button>
    </div>

    <script>
        let stars = [];
        let synth;
        let started = false;

        const CHORDS = [
            { name: 'C Maj', notes: ['C4', 'E4', 'G4', 'C5'], color: '#FF69B4' },
            { name: 'G Maj', notes: ['G3', 'B3', 'D4', 'G4'], color: '#FFB6C1' },
            { name: 'A Min', notes: ['A3', 'C4', 'E4', 'A4'], color: '#E6E6FA' },
            { name: 'F Maj', notes: ['F3', 'A3', 'C4', 'F4'], color: '#87CEEB' },
            { name: 'D Min', notes: ['D3', 'F3', 'A3', 'D4'], color: '#98FB98' },
            { name: 'E Min', notes: ['E3', 'G3', 'B3', 'E4'], color: '#FFD700' }
        ];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            
            // Setup Synth
            synth = new Tone.PolySynth(Tone.Synth).toDestination();
            synth.set({
                oscillator: { type: 'triangle' },
                envelope: {
                    attack: 0.1,
                    decay: 0.2,
                    sustain: 0.5,
                    release: 0.8
                }
            });
        }

        function draw() {
            background(26, 26, 46);
            
            // Background Twinkle
            for(let i = 0; i < 50; i++) {
                let x = noise(i, frameCount * 0.01) * width;
                let y = noise(i + 100, frameCount * 0.01) * height;
                let s = noise(i + 200, frameCount * 0.02) * 3;
                fill(255, 255, 255, 100);
                noStroke();
                ellipse(x, y, s);
            }

            // Draw Stars
            stars.forEach(star => {
                star.update();
                star.display();
            });
        }

        class Star {
            constructor(x, y, chord) {
                this.x = x;
                this.y = y;
                this.chord = chord;
                this.size = 20;
                this.targetSize = 20;
                this.pulse = 0;
                this.hue = chord.color;
                this.dragging = false;
            }

            update() {
                this.size = lerp(this.size, this.targetSize, 0.1);
                this.pulse += 0.05;
                if (this.dragging) {
                    this.x = mouseX;
                    this.y = mouseY;
                }
            }

            display() {
                push();
                translate(this.x, this.y);
                
                // Glow
                let glowSize = this.size * 2 + sin(this.pulse) * 5;
                fill(this.hue + '44'); // Add transparency
                noStroke();
                ellipse(0, 0, glowSize);
                
                // Star Body
                fill(this.hue);
                noStroke();
                this.drawStar(0, 0, this.size / 2, this.size, 5);
                
                // Label
                fill(255);
                textAlign(CENTER);
                textSize(12);
                text(this.chord.name, 0, this.size + 15);
                pop();
            }

            drawStar(x, y, radius1, radius2, npoints) {
                let angle = TWO_PI / npoints;
                let halfAngle = angle / 2.0;
                beginShape();
                for (let a = 0; a < TWO_PI; a += angle) {
                    let sx = x + cos(a) * radius2;
                    let sy = y + sin(a) * radius2;
                    vertex(sx, sy);
                    sx = x + cos(a + halfAngle) * radius1;
                    sy = y + sin(a + halfAngle) * radius1;
                    vertex(sx, sy);
                }
                endShape(CLOSE);
            }

            play() {
                if (Tone.context.state !== 'running') return;
                this.targetSize = 40;
                setTimeout(() => this.targetSize = 20, 200);
                synth.triggerAttackRelease(this.chord.notes, '2n');
            }

            isClicked(mx, my) {
                let d = dist(mx, my, this.x, this.y);
                return d < this.size * 1.5;
            }
        }

        function mousePressed() {
            if (!started) return;
            if (mouseY > height - 80) return; // Controls area

            let clickedStar = null;
            for (let star of stars) {
                if (star.isClicked(mouseX, mouseY)) {
                    clickedStar = star;
                    break;
                }
            }

            if (clickedStar) {
                clickedStar.play();
                clickedStar.dragging = true;
            } else {
                let chord = random(CHORDS);
                let newStar = new Star(mouseX, mouseY, chord);
                stars.push(newStar);
                newStar.play();
            }
        }

        function mouseReleased() {
            stars.forEach(s => s.dragging = false);
        }

        function startApp() {
            Tone.start();
            document.getElementById('start-overlay').style.display = 'none';
            started = true;
        }

        function clearStars() {
            stars = [];
        }

        function randomHarmony() {
            if (!started) return;
            for(let i = 0; i < 5; i++) {
                setTimeout(() => {
                    let chord = random(CHORDS);
                    let star = new Star(random(width), random(height), chord);
                    stars.push(star);
                    star.play();
                }, i * 300);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
