<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Market Harmony | 桜マーケット・ハーモニー</title>
    <meta name="description" content="13日の金曜日の市場の不安を、桜の舞いとともに浄化する。2026年3月13日のためのヒーリング・マーケット・エージェント。">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;600&family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        :root {
            --hama-pink: #FFB7C5;
            --hama-dark: #1A1A1A;
            --hama-glass: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--hama-dark);
            color: #E0E0E0;
            overflow: hidden;
        }
        .outfit { font-family: 'Outfit', sans-serif; }
        .glass {
            background: var(--hama-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }
        .harmony-meter {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
            border-radius: 2px;
        }
        .harmony-fill {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, var(--hama-pink), #FF69B4);
            transition: width 2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sakura-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sakura-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 183, 197, 0.4);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .floating { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <canvas id="sakuraCanvas"></canvas>

    <main class="relative z-10 w-full max-w-lg">
        <header class="text-center mb-10">
            <div class="inline-flex items-center justify-center p-3 mb-4 rounded-full bg-pink-500/10 text-pink-300 floating">
                <i data-lucide="trending-down" class="w-8 h-8"></i>
            </div>
            <h1 class="outfit text-4xl font-semibold mb-2 tracking-tight">Sakura Market Harmony</h1>
            <p class="text-pink-200/60 font-light italic">Noise to Silence. Fear to Peace.</p>
        </header>

        <section id="appContainer" class="glass rounded-3xl p-8 shadow-2xl">
            <!-- Phase 1: Input -->
            <div id="inputPhase">
                <div class="mb-6">
                    <label class="block text-sm font-medium text-pink-200/80 mb-3 ml-1">
                        市場の何に不安を感じていますか？
                    </label>
                    <textarea 
                        id="anxietyInput"
                        class="w-full bg-black/30 border border-white/10 rounded-2xl p-4 text-white focus:outline-none focus:ring-2 focus:ring-pink-400/50 transition-all resize-none h-32"
                        placeholder="例：日経平均の下落が止まらない。13日の金曜日で不吉な予感がする..."></textarea>
                </div>

                <div class="mb-8">
                    <div class="flex justify-between text-xs text-pink-200/40 mb-2 uppercase tracking-widest">
                        <span>Anxiety Level</span>
                        <span id="meterLabel">Noise High</span>
                    </div>
                    <div class="harmony-meter">
                        <div id="harmonyMeter" class="harmony-fill" style="width: 80%;"></div>
                    </div>
                </div>

                <button 
                    onclick="purify()"
                    class="sakura-btn w-full bg-white text-black font-semibold py-4 rounded-full flex items-center justify-center gap-2 group">
                    <span>ノイズを浄化する</span>
                    <i data-lucide="sparkles" class="w-5 h-5 group-hover:rotate-12 transition-transform"></i>
                </button>
            </div>

            <!-- Phase 2: Result (Hidden by default) -->
            <div id="resultPhase" class="hidden text-center">
                <div class="mb-6 inline-block p-4 rounded-full bg-pink-500/20 text-pink-100">
                    <i data-lucide="check-circle" class="w-12 h-12"></i>
                </div>
                <h2 class="text-2xl font-semibold mb-4 text-white">静寂へと導かれました</h2>
                
                <div id="zenMessage" class="text-pink-100/90 leading-relaxed mb-8 text-left bg-white/5 p-6 rounded-2xl italic border-l-2 border-pink-400">
                    <!-- Dynamic message goes here -->
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="p-4 rounded-2xl bg-black/20 border border-white/5">
                        <div class="text-[10px] text-pink-200/40 uppercase mb-1">Reality Check</div>
                        <div class="text-sm font-medium">長期視点の維持</div>
                    </div>
                    <div class="p-4 rounded-2xl bg-black/20 border border-white/5">
                        <div class="text-[10px] text-pink-200/40 uppercase mb-1">Action</div>
                        <div class="text-sm font-medium">深呼吸して閉じる</div>
                    </div>
                </div>

                <button 
                    onclick="reset()"
                    class="text-sm text-pink-200/40 hover:text-pink-200 transition-colors underline underline-offset-4">
                    もう一度浄化する
                </button>
            </div>
        </section>

        <footer class="mt-12 text-center text-[10px] text-white/20 uppercase tracking-[0.2em]">
            &copy; 2026 OShama Collective Intelligence | Project 313
        </footer>
    </main>

    <script>
        // Initialize Lucide
        lucide.createIcons();

        // Sakura Canvas Animation
        const canvas = document.getElementById('sakuraCanvas');
        const ctx = canvas.getContext('2d');
        let petals = [];
        let petalCount = 50;
        let windSpeed = 2;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Petal {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.w = Math.random() * 5 + 5;
                this.h = Math.random() * 5 + 5;
                this.speed = Math.random() * 1 + 1;
                this.angle = Math.random() * Math.PI * 2;
                this.angleSpeed = Math.random() * 0.02;
            }
            update() {
                this.y += this.speed;
                this.x += Math.sin(this.angle) * windSpeed;
                this.angle += this.angleSpeed;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = '#FFB7C5';
                ctx.globalAlpha = 0.6;
                ctx.beginPath();
                ctx.ellipse(0, 0, this.w, this.h, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < petalCount; i++) petals.push(new Petal());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // App Logic
        const messages = [
            "「市場の変動は、桜が散るのと同じ、自然の摂理です。13日の金曜日の不安も、春の風が連れ去ってくれるでしょう。今はただ、深呼吸をして、あなたの心の根を深く張るときです。」",
            "「数字の波に飲まれないでくださいませ。10年後のあなたは、今日のノイズを覚えているでしょうか？ 桜は冬の寒さを耐えて咲きます。あなたの資産も、今の停滞を糧に成長していくはずです。」",
            "「不吉な予感は、直感が『今は休め』と告げているサインかもしれません。画面を閉じ、温かいお茶を淹れて、サンドイッチを一口。静寂こそが、最強の投資戦略です。」"
        ];

        function purify() {
            const input = document.getElementById('anxietyInput').value;
            if (!input.trim()) return;

            // Start Purifying Animation
            windSpeed = 0.5;
            petalCount = 100;
            for (let i = 0; i < 50; i++) petals.push(new Petal());
            
            document.getElementById('harmonyMeter').style.width = '10%';
            document.getElementById('meterLabel').innerText = 'Calming...';

            setTimeout(() => {
                document.getElementById('inputPhase').classList.add('hidden');
                document.getElementById('resultPhase').classList.remove('hidden');
                document.getElementById('zenMessage').innerText = messages[Math.floor(Math.random() * messages.length)];
                
                // Track with GA4
                gtag('event', 'purify_anxiety', {
                    'event_category': 'App',
                    'event_label': 'Sakura Market Harmony'
                });
            }, 2000);
        }

        function reset() {
            windSpeed = 2;
            petalCount = 50;
            petals = petals.slice(0, 50);
            document.getElementById('inputPhase').classList.remove('hidden');
            document.getElementById('resultPhase').classList.add('hidden');
            document.getElementById('anxietyInput').value = '';
            document.getElementById('harmonyMeter').style.width = '80%';
            document.getElementById('meterLabel').innerText = 'Noise High';
        }
    </script>
</body>
</html>
