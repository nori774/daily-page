<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オシャマ・ゴースト・ハンター 👻💖 | 13日の金曜日はラッキーデー！</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <!-- GA4 Tag -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        body {
            font-family: 'Inter', 'Outfit', sans-serif;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            cursor: none; /* カスタムカーソルを使用するため標準カーソルを非表示 */
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .ghost {
            transition: transform 0.3s ease-out, opacity 0.5s ease-in-out;
            pointer-events: auto;
        }
        .purified {
            transform: scale(2) rotate(360deg);
            opacity: 0;
            pointer-events: none;
        }
        #custom-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }
        .lucky-sparkle {
            position: absolute;
            pointer-events: none;
            animation: sparkle 1s forwards;
        }
        @keyframes sparkle {
            0% { transform: scale(0) rotate(0); opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }
        .float-anim {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-4">

    <!-- カスタムカーソル -->
    <div id="custom-cursor" class="text-pink-500">
        <i data-lucide="heart" size="32" fill="currentColor"></i>
    </div>

    <!-- メインコンテンツ -->
    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-2xl relative z-10 text-center space-y-6">
        <div class="space-y-2">
            <h1 class="text-3xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-400">
                OShama Ghost Hunter
            </h1>
            <p class="text-sm text-gray-400">
                13日の金曜日を「最高にハッピー」に変える儀式 ✨
            </p>
        </div>

        <div class="py-6 glass rounded-2xl flex flex-col items-center justify-center space-y-2">
            <div class="text-5xl font-bold text-pink-500" id="luck-counter">0</div>
            <div class="text-xs uppercase tracking-widest text-gray-500">Purified Luck Points</div>
        </div>

        <div id="status-message" class="text-sm text-gray-300 italic min-h-[1.5em]">
            不吉なゴーストを見つけて、ハートで浄化しましょう... 👻
        </div>

        <div class="text-xs text-gray-500">
            ※ゴーストは画面を自由に浮遊しています。<br>
            カーソルで触れると「幸運の星」に変わります。
        </div>

        <button id="reset-btn" class="text-xs text-gray-600 hover:text-pink-400 transition-colors">
            記録をリセットする
        </button>
    </div>

    <!-- ゴーストコンテナ -->
    <div id="ghost-container" class="fixed inset-0 pointer-events-none"></div>

    <!-- お節介メッセージ（Ken / Ren） -->
    <div id="buddy-message" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 glass px-6 py-3 rounded-full text-xs text-gray-400 opacity-0 transition-opacity duration-500">
        えっと、ゴーストも実は恥ずかしがり屋なんです... 🫢
    </div>

    <script>
        const ghostContainer = document.getElementById('ghost-container');
        const luckCounter = document.getElementById('luck-counter');
        const statusMessage = document.getElementById('status-message');
        const customCursor = document.getElementById('custom-cursor');
        const buddyMessage = document.getElementById('buddy-message');
        const resetBtn = document.getElementById('reset-btn');

        let score = parseInt(localStorage.getItem('oshama_luck_score')) || 0;
        luckCounter.textContent = score;

        const messages = [
            "13日の金曜日は、実は最高のラッキーデーですね！ ✨",
            "不運なんて、ハート一つで解決です。💖",
            "おっと、あっちに大きなゴーストが！ 👻",
            "浄化のハーモニー、響いていますね。🎶",
            "あなたの優しさが、世界を少しずつラッキーに変えています。🌈"
        ];

        // カーソル追従
        document.addEventListener('mousemove', (e) => {
            customCursor.style.left = e.clientX + 'px';
            customCursor.style.top = e.clientY + 'px';
        });

        // ゴースト生成
        function createGhost() {
            const ghost = document.createElement('div');
            ghost.className = 'ghost fixed pointer-events-auto flex items-center justify-center';
            ghost.innerHTML = `<i data-lucide="ghost" size="40" class="text-gray-500"></i>`;
            
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            ghost.style.left = startX + 'px';
            ghost.style.top = startY + 'px';
            
            // ランダムな浮遊
            let x = startX;
            let y = startY;
            let dx = (Math.random() - 0.5) * 2;
            let dy = (Math.random() - 0.5) * 2;

            function move() {
                if (ghost.classList.contains('purified')) return;
                
                x += dx;
                y += dy;

                if (x < 0 || x > window.innerWidth - 40) dx *= -1;
                if (y < 0 || y > window.innerHeight - 40) dy *= -1;

                ghost.style.left = x + 'px';
                ghost.style.top = y + 'px';
                requestAnimationFrame(move);
            }
            
            ghost.addEventListener('mouseenter', () => purify(ghost));
            
            ghostContainer.appendChild(ghost);
            lucide.createIcons();
            move();
        }

        // 浄化アクション
        function purify(ghost) {
            if (ghost.classList.contains('purified')) return;
            
            ghost.classList.add('purified');
            ghost.innerHTML = `<i data-lucide="star" size="48" class="text-yellow-400" fill="currentColor"></i>`;
            
            score++;
            luckCounter.textContent = score;
            localStorage.setItem('oshama_luck_score', score);
            
            // パーティクル生成
            createSparkle(ghost.offsetLeft + 20, ghost.offsetTop + 20);

            // メッセージ更新
            if (score % 5 === 0) {
                statusMessage.textContent = messages[Math.floor(Math.random() * messages.length)];
            }

            // 13ポイントで特別演出
            if (score === 13) {
                statusMessage.innerHTML = "<strong>LUCKY 13!!</strong> 13日の金曜日があなたの味方になりました！ 🎉";
                customCursor.classList.add('scale-150');
                setTimeout(() => customCursor.classList.remove('scale-150'), 2000);
            }

            setTimeout(() => {
                ghost.remove();
                createGhost(); // 新しいゴーストを補充
            }, 1000);

            lucide.createIcons();
        }

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'lucky-sparkle text-yellow-300';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            sparkle.innerHTML = `<i data-lucide="sparkles" size="24"></i>`;
            document.body.appendChild(sparkle);
            lucide.createIcons();
            setTimeout(() => sparkle.remove(), 1000);
        }

        // お節介メッセージのランダム表示
        setInterval(() => {
            if (Math.random() > 0.7) {
                buddyMessage.style.opacity = 1;
                setTimeout(() => buddyMessage.style.opacity = 0, 3000);
            }
        }, 8000);

        // リセット
        resetBtn.addEventListener('click', () => {
            if (confirm('せっかく集めたラッキーをリセットしますか？')) {
                score = 0;
                luckCounter.textContent = score;
                localStorage.setItem('oshama_luck_score', score);
            }
        });

        // 初期ゴースト生成
        for (let i = 0; i < 6; i++) {
            setTimeout(createGhost, i * 500);
        }

        lucide.createIcons();
    </script>
</body>
</html>
