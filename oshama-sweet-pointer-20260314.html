<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OShama Sweet-Pointer | ホワイトデーの執着心</title>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            overflow: hidden;
            background: radial-gradient(circle at center, #fff5f7 0%, #ffffff 100%);
        }
        .sweet-item {
            position: absolute;
            pointer-events: none;
            transition: transform 0.1s ease-out;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 182, 193, 0.3);
        }
        .pi-badge {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center">

    <!-- メインコンテンツ -->
    <div class="relative z-10 text-center px-6">
        <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full glass-panel mb-8 animate-bounce shadow-sm">
            <div class="w-2 h-2 rounded-full bg-pink-400"></div>
            <span class="text-xs font-semibold text-pink-600 tracking-wider">WHITE DAY × PI DAY (3.14)</span>
        </div>

        <h1 class="text-5xl md:text-7xl font-bold text-gray-900 mb-6 tracking-tight">
            Sweet <span class="text-pink-500">Pointer</span>
        </h1>
        
        <p class="text-gray-500 text-lg mb-12 max-w-md mx-auto leading-relaxed">
            お返しを待つマシュマロたちが、<br>
            あなたのカーソルを執拗に追いかけます。
        </p>

        <div class="flex flex-wrap justify-center gap-4">
            <div class="glass-panel px-6 py-4 rounded-3xl text-sm text-gray-600 flex items-center gap-3">
                <i data-lucide="info" class="w-4 h-4 text-pink-400"></i>
                <span>マウスを動かして視線を感じてください</span>
            </div>
        </div>
    </div>

    <!-- 背景の「しょうもない」仕掛け層 -->
    <div id="canvas-container" class="absolute inset-0 z-0"></div>

    <!-- フッター -->
    <footer class="absolute bottom-8 left-0 w-full text-center z-20">
        <p class="text-[10px] text-gray-400 tracking-[0.2em] uppercase">
            &copy; 2026 OShama Agency | Debugged by Ren
        </p>
    </footer>

    <script>
        // Lucideアイコンの初期化
        lucide.createIcons();

        const container = document.getElementById('canvas-container');
        const items = [];
        const itemCount = 40; // 執着するスイーツの数
        const sweetIcons = ['cookie', 'candy', 'heart', 'star', 'gift', 'smile'];
        const colors = ['text-pink-300', 'text-blue-200', 'text-yellow-200', 'text-purple-200', 'text-pink-200'];

        // スイーツの生成
        for (let i = 0; i < itemCount; i++) {
            const div = document.createElement('div');
            div.className = `sweet-item ${colors[Math.floor(Math.random() * colors.length)]}`;
            
            const iconName = sweetIcons[Math.floor(Math.random() * sweetIcons.length)];
            const size = Math.floor(Math.random() * 20) + 20; // 20px - 40px
            
            div.innerHTML = `<i data-lucide="${iconName}" style="width: ${size}px; height: ${size}px;"></i>`;
            
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            
            gsap.set(div, { x, y, opacity: 0.6 });
            container.appendChild(div);
            items.push({ el: div, x, y });
        }
        
        lucide.createIcons(); // 新しく追加した要素のアイコンを生成

        // マウス移動に反応するロジック
        window.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            items.forEach(item => {
                // スイーツからマウスまでの角度を計算
                const dx = mouseX - item.x;
                const dy = mouseY - item.y;
                const angle = Math.atan2(dy, dx) * (180 / Math.PI);

                // 向きを変える（執着）
                gsap.to(item.el, {
                    rotation: angle + 90, // アイコンの向きを調整
                    duration: 0.5,
                    ease: "power2.out"
                });

                // 少しだけ近づく（誘惑）
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 300) {
                    const moveX = (dx / dist) * 20;
                    const moveY = (dy / dist) * 20;
                    gsap.to(item.el, {
                        x: item.x + moveX,
                        y: item.y + moveY,
                        duration: 1,
                        ease: "power1.out"
                    });
                } else {
                    gsap.to(item.el, {
                        x: item.x,
                        y: item.y,
                        duration: 1.5,
                        ease: "power1.inOut"
                    });
                }
            });
        });

        // 画面リサイズ対応
        window.addEventListener('resize', () => {
            items.forEach(item => {
                item.x = Math.random() * window.innerWidth;
                item.y = Math.random() * window.innerHeight;
                gsap.to(item.el, { x: item.x, y: item.y, duration: 1 });
            });
        });

        // 浮遊アニメーション
        items.forEach(item => {
            gsap.to(item.el, {
                y: "+=20",
                duration: 2 + Math.random() * 2,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });
        });

    </script>
</body>
</html>
