<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OShama Ghost Slap | 13日の悪霊退散ビンタ</title>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --accent: #ff2d55;
            --ghost-color: rgba(200, 220, 255, 0.4);
        }
        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #ghost-container {
            perspective: 1000px;
        }
        .ghost {
            filter: drop-shadow(0 0 20px var(--ghost-color));
            transition: transform 0.1s ease-out;
        }
        .particle {
            position: absolute;
            pointer-events: none;
            font-weight: bold;
            z-index: 50;
        }
        .ofuda {
            width: 80px;
            height: 160px;
            background: #fff;
            color: #ff2d55;
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            font-weight: 900;
            border: 4px double #ff2d55;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: absolute;
            pointer-events: none;
            z-index: 100;
            transform-origin: center;
            border-radius: 4px;
        }
        .scary-glitch {
            animation: glitch 0.2s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col items-center justify-between p-6 overflow-hidden">

    <!-- Header -->
    <header class="w-full flex justify-between items-center z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-white/10 rounded-full flex items-center justify-center">
                <i data-lucide="ghost" class="w-5 h-5 text-white/60"></i>
            </div>
            <span class="text-sm tracking-widest uppercase opacity-40 font-light">OShama Ghost Slap</span>
        </div>
        <div class="glass px-4 py-1 rounded-full text-[10px] tracking-tighter opacity-60">
            FRIDAY THE 13TH SPECIAL [49]
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full flex flex-col items-center justify-center relative" id="ghost-container">
        
        <!-- Score / Feedback -->
        <div class="absolute top-10 text-center pointer-events-none">
            <h1 id="exorcism-count" class="text-6xl font-bold opacity-10 tracking-tighter">0</h1>
            <p class="text-xs uppercase tracking-widest opacity-30">Evil Spirits Exorcised</p>
        </div>

        <!-- The Ghost -->
        <div id="ghost" class="ghost cursor-none select-none">
            <svg width="240" height="240" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 90C20 90 20 50 20 40C20 23.4315 33.4315 10 50 10C66.5685 10 80 23.4315 80 40C80 50 80 90 80 90L70 80L60 90L50 80L40 90L30 80L20 90Z" fill="url(#ghost-gradient)" />
                <circle cx="35" cy="35" r="4" fill="#0a0a0c" class="eye-l" />
                <circle cx="65" cy="35" r="4" fill="#0a0a0c" class="eye-r" />
                <path d="M40 50C40 50 45 55 50 55C55 55 60 50 60 50" stroke="#0a0a0c" stroke-width="2" stroke-linecap="round" class="mouth" />
                <defs>
                    <linearGradient id="ghost-gradient" x1="50" y1="10" x2="50" y2="90" gradientUnits="userSpaceOnUse">
                        <stop stop-color="white" stop-opacity="0.8"/>
                        <stop offset="1" stop-color="#c8dcff" stop-opacity="0.4"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <!-- Ofuda (Talisman) -->
        <div id="ofuda" class="ofuda opacity-0">
            <div class="text-xs font-bold leading-tight">悪霊<br>退散</div>
        </div>

        <!-- Instruction -->
        <div class="absolute bottom-10 text-center pointer-events-none transition-opacity duration-500" id="instruction">
            <p class="text-xs opacity-40 animate-pulse">SWIPE TO SLAP THE CURSE</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full flex flex-col items-center gap-4 z-50">
        <div class="glass p-4 rounded-2xl w-full max-w-sm text-center">
            <p class="text-[11px] opacity-60 leading-relaxed mb-1">
                「13日の金曜日」の不運をビンタで叩き出せ。<br>
                最高に豪華なエフェクトで厄払いを。
            </p>
        </div>
        <div class="flex gap-4 mb-2">
            <a href="index.html" class="text-[10px] uppercase tracking-widest opacity-30 hover:opacity-100 transition-opacity">Back to Nexus</a>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        const ghost = document.getElementById('ghost');
        const ofuda = document.getElementById('ofuda');
        const container = document.body;
        const countDisplay = document.getElementById('exorcism-count');
        const instruction = document.getElementById('instruction');

        let count = 0;
        let lastX = 0;
        let lastY = 0;
        let isSlapping = false;

        // Floating animation
        gsap.to(ghost, {
            y: -20,
            duration: 2,
            repeat: -1,
            yoyo: true,
            ease: "power1.inOut"
        });

        // Mouse/Touch movement
        container.addEventListener('pointermove', (e) => {
            const x = e.clientX;
            const y = e.clientY;

            // Move Ofuda
            gsap.set(ofuda, { x: x - 40, y: y - 80, opacity: 1 });

            // Rotation based on movement speed
            const dx = x - lastX;
            const rotation = dx * 2;
            gsap.to(ofuda, { rotation: rotation, duration: 0.1 });

            // Collision check
            const ghostRect = ghost.getBoundingClientRect();
            if (
                x > ghostRect.left && x < ghostRect.right &&
                y > ghostRect.top && y < ghostRect.bottom &&
                Math.abs(dx) > 15 && !isSlapping
            ) {
                slap(x, y, dx);
            }

            lastX = x;
            lastY = y;
        });

        function slap(x, y, dx) {
            isSlapping = true;
            count++;
            countDisplay.innerText = count;
            instruction.style.opacity = '0';

            // Ghost reaction
            gsap.to(ghost, {
                x: dx * 1.5,
                rotation: dx > 0 ? 30 : -30,
                duration: 0.1,
                yoyo: true,
                repeat: 1,
                onComplete: () => { isSlapping = false; }
            });

            // Particles
            createParticles(x, y);
            
            // Text burst
            createBurstText(x, y);

            // Audio-like feedback (Haptic if mobile)
            if (window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }
        }

        function createParticles(x, y) {
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'particle w-1 h-1 bg-white rounded-full';
                document.body.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 100;
                
                gsap.set(p, { x: x, y: y, scale: Math.random() * 2 });
                gsap.to(p, {
                    x: x + Math.cos(angle) * dist,
                    y: y + Math.sin(angle) * dist,
                    opacity: 0,
                    duration: 0.6,
                    ease: "power2.out",
                    onComplete: () => p.remove()
                });
            }
        }

        function createBurstText(x, y) {
            const words = ["悪霊退散", "厄払い", "LUCKY!", "777", "GONE"];
            const text = words[Math.floor(Math.random() * words.length)];
            const div = document.createElement('div');
            div.className = 'particle text-2xl font-black text-white pointer-events-none';
            div.innerText = text;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.textShadow = "0 0 10px rgba(255,255,255,0.8)";
            document.body.appendChild(div);

            gsap.to(div, {
                y: y - 100,
                scale: 2,
                opacity: 0,
                duration: 0.8,
                ease: "back.out(2)",
                onComplete: () => div.remove()
            });
        }
    </script>
</body>
</html>
