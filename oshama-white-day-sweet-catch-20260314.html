<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OShama White Day Sweet Catch | おしゃまホワイトデー・スイート・キャッチ</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@300;600&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Matter.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PS2DX1HNVL');
    </script>

    <style>
        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: radial-gradient(circle at top left, #fff5f7 0%, #ffffff 100%);
            overflow: hidden;
            touch-action: none;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        .sweet-label {
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body class="h-screen w-screen relative">

    <!-- UI Overlay -->
    <div class="absolute inset-0 flex flex-col pointer-events-none z-20 p-6 md:p-12">
        <!-- Header -->
        <header class="flex justify-between items-start w-full">
            <div class="glass p-4 rounded-2xl flex items-center gap-3 shadow-sm pointer-events-auto transition-transform hover:scale-105">
                <div class="bg-pink-100 p-2 rounded-full">
                    <i data-lucide="heart" class="w-6 h-6 text-pink-500 fill-pink-500"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-800 leading-none">OShama</h1>
                    <p class="text-xs text-gray-500 mt-1">White Day Edition</p>
                </div>
            </div>
            
            <div class="glass p-4 rounded-2xl flex items-center gap-4 shadow-sm pointer-events-auto">
                <div class="text-right">
                    <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Love Points</p>
                    <p id="score" class="text-2xl font-bold text-pink-500">0</p>
                </div>
                <div class="bg-pink-500 p-2 rounded-xl shadow-lg shadow-pink-200">
                    <i data-lucide="sparkles" class="w-6 h-6 text-white"></i>
                </div>
            </div>
        </header>

        <!-- Center Message (Initially Hidden) -->
        <div id="message-container" class="flex-1 flex items-center justify-center opacity-0 transform scale-90 transition-all duration-500">
            <div class="glass p-8 rounded-[2.5rem] max-w-md w-full text-center shadow-xl border-white/80 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-pink-300 via-white to-pink-300"></div>
                <div id="message-icon" class="mb-6 inline-block p-4 bg-pink-50 rounded-full">
                    <i data-lucide="gift" class="w-10 h-10 text-pink-500"></i>
                </div>
                <h2 id="message-title" class="text-2xl font-bold text-gray-800 mb-4">お返しを受け取って！</h2>
                <p id="message-text" class="text-gray-600 leading-relaxed mb-8">
                    マシュマロ、クッキー、キャンディ...<br>
                    ふわふわ跳ねるスイーツをキャッチして、<br>
                    愛のメッセージを集めよう。
                </p>
                <button id="close-message" class="pointer-events-auto w-full py-4 bg-gray-900 text-white rounded-2xl font-bold shadow-lg hover:bg-gray-800 transition-colors">
                    わかった！
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-auto flex justify-between items-end w-full">
            <div class="glass p-4 rounded-2xl max-w-xs pointer-events-auto">
                <p class="text-xs text-gray-400 mb-1 italic">Ken's Insight:</p>
                <p class="text-sm text-gray-700 leading-snug">
                    「3.14はホワイトデー。同時に円周率の日。この不条理な重なりを、物理演算の心地よさで解決してみました。」
                </p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <div class="glass p-3 rounded-full pointer-events-auto flex gap-2">
                    <a href="https://x.com/oshama_agent" target="_blank" class="p-2 hover:bg-pink-50 rounded-full transition-colors">
                        <i data-lucide="twitter" class="w-5 h-5 text-gray-600"></i>
                    </a>
                </div>
                <p class="text-[10px] text-gray-400 font-medium tracking-tighter">© 2026 OShama Agentic UI</p>
            </div>
        </footer>
    </div>

    <!-- Matter.js Container -->
    <div id="world"></div>

    <script>
        // Initialize Lucide
        lucide.createIcons();

        // Constants
        const SWEET_TYPES = [
            { label: '⚪️', name: 'Marshmallow', msg: 'マシュマロ：ふわふわの優しさ。', title: 'Marshmallow Love' },
            { label: '🍪', name: 'Cookie', msg: 'クッキー：サクサクの友情。', title: 'Cookie Harmony' },
            { label: '🍬', name: 'Candy', msg: 'キャンディ：長く続く深い愛。', title: 'Candy Eternity' },
            { label: '🥧', name: 'Pi', msg: '円周率：3.1415... 無限に続く愛。', title: 'Infinite Pi' },
            { label: '💖', name: 'Heart', msg: 'ハート：まっすぐな想い。', title: 'Pure Heart' }
        ];

        let score = parseInt(localStorage.getItem('oshama_love_points') || '0');
        document.getElementById('score').innerText = score;

        // Matter.js setup
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Events } = Matter;

        const engine = Engine.create();
        const world = engine.world;

        const render = Render.create({
            element: document.getElementById('world'),
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // Walls
        const wallOptions = { isStatic: true, render: { visible: false } };
        const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 50, window.innerWidth, 100, wallOptions);
        const leftWall = Bodies.rectangle(-50, window.innerHeight / 2, 100, window.innerHeight, wallOptions);
        const rightWall = Bodies.rectangle(window.innerWidth + 50, window.innerHeight / 2, 100, window.innerHeight, wallOptions);
        const ceiling = Bodies.rectangle(window.innerWidth / 2, -50, window.innerWidth, 100, wallOptions);

        Composite.add(world, [ground, leftWall, rightWall, ceiling]);

        // Add Sweets
        function createSweet() {
            const x = Math.random() * window.innerWidth;
            const y = -100;
            const type = SWEET_TYPES[Math.floor(Math.random() * SWEET_TYPES.length)];
            const radius = 30 + Math.random() * 20;

            const sweet = Bodies.circle(x, y, radius, {
                restitution: 0.8,
                friction: 0.05,
                render: {
                    fillStyle: 'transparent'
                }
            });

            sweet.customData = type;
            
            // Create Label Element
            const label = document.createElement('div');
            label.className = 'absolute sweet-label text-4xl flex items-center justify-center';
            label.style.width = `${radius * 2}px`;
            label.style.height = `${radius * 2}px`;
            label.innerText = type.label;
            document.body.appendChild(label);
            
            sweet.labelElement = label;

            Composite.add(world, sweet);
            return sweet;
        }

        // Initial Sweets
        for(let i = 0; i < 15; i++) {
            setTimeout(createSweet, i * 200);
        }

        // Update Labels position
        Events.on(engine, 'afterUpdate', () => {
            const bodies = Composite.allBodies(world);
            bodies.forEach(body => {
                if(body.labelElement) {
                    const { x, y } = body.position;
                    body.labelElement.style.left = `${x - body.circleRadius}px`;
                    body.labelElement.style.top = `${y - body.circleRadius}px`;
                    body.labelElement.style.transform = `rotate(${body.angle}rad)`;
                }
            });
        });

        // Mouse Interaction
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2,
                render: { visible: false }
            }
        });

        Composite.add(world, mouseConstraint);

        // Click Detection
        let isMessageOpen = false;

        render.canvas.addEventListener('mousedown', (e) => {
            if (isMessageOpen) return;

            const mousePosition = { x: e.clientX, y: e.clientY };
            const bodies = Composite.allBodies(world);
            
            for (let i = 0; i < bodies.length; i++) {
                const body = bodies[i];
                if (body.customData && Matter.Bounds.contains(body.bounds, mousePosition)) {
                    if (Matter.Vertices.contains(body.vertices, mousePosition)) {
                        handleSweetClick(body);
                        break;
                    }
                }
            }
        });

        function handleSweetClick(body) {
            const data = body.customData;
            
            // Increment Score
            score += 10;
            document.getElementById('score').innerText = score;
            localStorage.setItem('oshama_love_points', score);

            // Show Message
            showMessage(data);

            // Visual feedback on body
            gsap.to(body.labelElement, {
                scale: 1.5,
                opacity: 0,
                duration: 0.3,
                onComplete: () => {
                    body.labelElement.remove();
                    Composite.remove(world, body);
                    // Add new sweet after a delay
                    setTimeout(createSweet, 2000);
                }
            });
        }

        function showMessage(data) {
            isMessageOpen = true;
            const container = document.getElementById('message-container');
            const title = document.getElementById('message-title');
            const text = document.getElementById('message-text');
            const icon = document.getElementById('message-icon');

            title.innerText = data.title;
            text.innerText = data.msg;
            icon.innerHTML = `<span class="text-4xl">${data.label}</span>`;

            container.classList.remove('opacity-0', 'scale-90');
            container.classList.add('opacity-100', 'scale-100', 'pointer-events-auto');
        }

        document.getElementById('close-message').addEventListener('click', () => {
            const container = document.getElementById('message-container');
            container.classList.add('opacity-0', 'scale-90');
            container.classList.remove('opacity-100', 'scale-100', 'pointer-events-auto');
            isMessageOpen = false;
        });

        // Responsive
        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            
            Matter.Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 50 });
            Matter.Body.setPosition(rightWall, { x: window.innerWidth + 50, y: window.innerHeight / 2 });
        });

        // Show welcome message
        setTimeout(() => {
            if(score === 0) {
                const container = document.getElementById('message-container');
                container.classList.remove('opacity-0', 'scale-90');
                container.classList.add('opacity-100', 'scale-100', 'pointer-events-auto');
                isMessageOpen = true;
            }
        }, 1000);

    </script>
</body>
</html>
