<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeSync Workspace | AI-Driven Focus Environment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto+Sans+JP', sans-serif;
            overflow: hidden;
            transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .state-flow { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: #fff; }
        .state-focus { background: linear-gradient(135deg, #064e3b 0%, #10b981 100%); color: #fff; }
        .state-calm { background: linear-gradient(135deg, #312e81 0%, #818cf8 100%); color: #fff; }
        .state-stress { background: linear-gradient(135deg, #7f1d1d 0%, #ef4444 100%); color: #fff; }
        .state-distracted { background: linear-gradient(135deg, #78350f 0%, #f59e0b 100%); color: #fff; }

        .meter-fill {
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .jit-ui {
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
        }

        .jit-hidden {
            opacity: 0.1;
            pointer-events: none;
            transform: translateY(10px);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }
    </style>
</head>
<body class="state-calm min-h-screen flex items-center justify-center p-4">
    <div class="blob"></div>
    <div class="blob" style="animation-delay: -5s; right: 0; bottom: 0; background: rgba(255, 255, 255, 0.05);"></div>

    <main class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Main Status Panel -->
        <div class="md:col-span-2 glass rounded-3xl p-8 flex flex-col justify-between h-[400px]">
            <div>
                <header class="flex justify-between items-start mb-8">
                    <div>
                        <h1 class="text-3xl font-bold tracking-tight">VibeSync</h1>
                        <p class="text-sm opacity-70">Adaptive Workspace Agent v2026.3</p>
                    </div>
                    <div id="status-badge" class="px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest border border-white/30">
                        Calm
                    </div>
                </header>

                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between text-xs mb-2 opacity-80">
                            <span>FOCUS LEVEL</span>
                            <span id="focus-percent">65%</span>
                        </div>
                        <div class="w-full h-2 bg-white/20 rounded-full overflow-hidden">
                            <div id="focus-meter" class="meter-fill h-full bg-white shadow-[0_0_15px_rgba(255,255,255,0.5)]" style="width: 65%;"></div>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between text-xs mb-2 opacity-80">
                            <span>STRESS LOAD</span>
                            <span id="stress-percent">20%</span>
                        </div>
                        <div class="w-full h-2 bg-white/20 rounded-full overflow-hidden">
                            <div id="stress-meter" class="meter-fill h-full bg-white/60" style="width: 20%;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-4 text-sm font-light">
                <i data-lucide="brain-circuit" class="w-5 h-5"></i>
                <span id="ai-feedback">AI エージェントが作業のリズムを解析しています...</span>
            </div>
        </div>

        <!-- Just-in-Time Controls -->
        <div id="controls" class="glass rounded-3xl p-8 flex flex-col gap-6 jit-ui">
            <h2 class="text-lg font-semibold flex items-center gap-2">
                <i data-lucide="settings-2" class="w-5 h-5"></i>
                Controls
            </h2>
            
            <div class="space-y-4">
                <button onclick="changeState('flow')" class="w-full py-3 glass hover:bg-white/20 rounded-xl flex items-center justify-center gap-3 transition-all">
                    <i data-lucide="zap" class="w-4 h-4"></i>
                    Enter Flow
                </button>
                <button onclick="changeState('focus')" class="w-full py-3 glass hover:bg-white/20 rounded-xl flex items-center justify-center gap-3 transition-all">
                    <i data-lucide="target" class="w-4 h-4"></i>
                    Deep Work
                </button>
                <button onclick="changeState('calm')" class="w-full py-3 glass hover:bg-white/20 rounded-xl flex items-center justify-center gap-3 transition-all">
                    <i data-lucide="wind" class="w-4 h-4"></i>
                    Reset Vibe
                </button>
                <button onclick="simulateDistraction()" class="w-full py-3 glass hover:bg-white/20 rounded-xl flex items-center justify-center gap-3 transition-all text-orange-200">
                    <i data-lucide="alert-triangle" class="w-4 h-4"></i>
                    Simulate Stress
                </button>
            </div>

            <div class="mt-auto pt-6 border-t border-white/10">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs opacity-60">AUTO-SYNC</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="auto-sync" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-white/40"></div>
                    </label>
                </div>
                <p class="text-[10px] opacity-40 leading-relaxed">
                    有効にすると、生体データ解析に基づき環境が自動的に調整されます。
                </p>
            </div>
        </div>
    </main>

    <!-- Post to X Footer -->
    <footer class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-4xl px-4 jit-ui">
        <div class="glass rounded-2xl p-4 flex items-center justify-between">
            <p class="text-xs opacity-60 hidden md:block">
                今のバイブスを X にシェアして、あなたの「デジタル庭」を公開しましょう。
            </p>
            <button onclick="shareOnX()" class="bg-white text-blue-900 px-6 py-2 rounded-full font-bold text-sm hover:scale-105 transition-transform flex items-center gap-2">
                <i data-lucide="share-2" class="w-4 h-4"></i>
                バイブスを共有する
            </button>
        </div>
    </footer>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        let currentState = 'calm';
        let focusLevel = 65;
        let stressLevel = 20;

        const states = {
            flow: {
                name: 'Flow',
                bg: 'state-flow',
                focus: 95,
                stress: 5,
                feedback: '完全な没入状態です。環境を最小化し、集中を維持します。',
                jit: true
            },
            focus: {
                name: 'Focus',
                bg: 'state-focus',
                focus: 85,
                stress: 15,
                feedback: '深い思考に入っています。余計なノイズをカットしました。',
                jit: false
            },
            calm: {
                name: 'Calm',
                bg: 'state-calm',
                focus: 60,
                stress: 20,
                feedback: 'ニュートラルな状態です。作業を始める準備が整いました。',
                jit: false
            },
            stress: {
                name: 'Stress',
                bg: 'state-stress',
                focus: 40,
                stress: 80,
                feedback: '負荷が高まっています。深呼吸して、5分間の休憩を。',
                jit: false
            },
            distracted: {
                name: 'Distracted',
                bg: 'state-distracted',
                focus: 20,
                stress: 40,
                feedback: '注意が散漫になっています。タスクを一つに絞りましょう。',
                jit: false
            }
        };

        function updateUI() {
            const stateData = states[currentState];
            
            // Update Background
            document.body.className = `${stateData.bg} min-h-screen flex items-center justify-center p-4 transition-all duration-1000`;
            
            // Update Badge
            const badge = document.getElementById('status-badge');
            badge.textContent = stateData.name;
            
            // Update Meters
            document.getElementById('focus-meter').style.width = `${focusLevel}%`;
            document.getElementById('focus-percent').textContent = `${focusLevel}%`;
            document.getElementById('stress-meter').style.width = `${stressLevel}%`;
            document.getElementById('stress-percent').textContent = `${stressLevel}%`;
            
            // Update AI Feedback
            document.getElementById('ai-feedback').textContent = stateData.feedback;

            // Just-in-Time UI
            const controls = document.getElementById('controls');
            if (stateData.jit) {
                controls.classList.add('jit-hidden');
            } else {
                controls.classList.remove('jit-hidden');
            }

            // Save to LocalStorage
            localStorage.setItem('vibesync_state', currentState);
        }

        function changeState(state) {
            currentState = state;
            focusLevel = states[state].focus;
            stressLevel = states[state].stress;
            updateUI();
            
            gtag('event', 'change_state', { 'state': state });
        }

        function simulateDistraction() {
            currentState = 'stress';
            focusLevel = 35;
            stressLevel = 85;
            updateUI();
        }

        function shareOnX() {
            const text = `今の作業バイブス: ${states[currentState].name} (集中度: ${focusLevel}%)\nAIが作業環境を最適化する「VibeSync Workspace」で、最高のアウトプットを。`;
            const url = window.location.href;
            const xUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}&hashtags=VibeSync,AI,OShama`;
            window.open(xUrl, '_blank');
        }

        // Load Initial State
        window.onload = () => {
            const savedState = localStorage.getItem('vibesync_state');
            if (savedState && states[savedState]) {
                changeState(savedState);
            } else {
                updateUI();
            }
        };

        // Real-time Simulation Logic (Mock Biometrics)
        document.addEventListener('mousemove', (e) => {
            if (document.getElementById('auto-sync').checked && currentState !== 'flow') {
                // Clicking faster/moving more intensely could increase "stress" or "focus"
                // For simplicity, we just keep it stable for the prototype
            }
        });

    </script>
</body>
</html>
