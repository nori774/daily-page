<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Anime Pulse | HAMAtoChord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.26/Tone.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: #0a0a0c;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        canvas {
            display: block;
        }
        .controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .hint {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div class="hint text-sm font-bold uppercase tracking-widest">
        Click to create a pulse
    </div>

    <div class="controls flex gap-4">
        <button id="start-btn" class="glass text-white px-8 py-3 rounded-full font-bold hover:bg-white/10 transition-all flex items-center gap-2">
            <i data-lucide="play" class="w-5 h-5"></i>
            Initialize Soul Link
        </button>
    </div>

    <div class="absolute top-6 left-6 z-10">
        <h1 class="text-white text-2xl font-bold tracking-tighter">Celestial Anime Pulse</h1>
        <p class="text-white/40 text-xs mt-1">Experimental Audio-Visual Link #006</p>
    </div>

    <script>
        let pulses = [];
        let synth;
        let reverb;
        let initialized = false;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 1);
            
            reverb = new Tone.Reverb(2).toDestination();
            synth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "triangle" },
                envelope: {
                    attack: 0.05,
                    decay: 0.2,
                    sustain: 0.1,
                    release: 1
                }
            }).connect(reverb);
        }

        function draw() {
            background(240, 20, 5, 0.15); // Dark blue-ish trail

            for (let i = pulses.length - 1; i >= 0; i--) {
                pulses[i].update();
                pulses[i].display();
                if (pulses[i].isDead()) {
                    pulses.splice(i, 1);
                }
            }
        }

        function mousePressed() {
            if (!initialized) return;
            if (mouseY > height - 100) return;

            let hue = random(280, 340); // Pink to Purple
            if (random() > 0.7) hue = random(180, 220); // Cyan accent
            
            pulses.push(new Pulse(mouseX, mouseY, hue));
            
            // Musical interaction
            let notes = ["C4", "E4", "G4", "B4", "D5", "F#5"];
            let note = random(notes);
            synth.triggerAttackRelease(note, "8n");
        }

        class Pulse {
            constructor(x, y, h) {
                this.x = x;
                this.y = y;
                this.h = h;
                this.size = 0;
                this.maxSize = random(150, 400);
                this.life = 1.0;
                this.decay = random(0.015, 0.03);
                this.rotation = random(TWO_PI);
                this.lines = floor(random(8, 16));
            }

            update() {
                this.size += (this.maxSize - this.size) * 0.1;
                this.life -= this.decay;
            }

            display() {
                push();
                translate(this.x, this.y);
                rotate(this.rotation);
                
                noFill();
                strokeWeight(2);
                
                // Outer ring
                stroke(this.h, 60, 100, this.life);
                ellipse(0, 0, this.size);
                
                // Inner ring
                stroke(this.h, 80, 100, this.life * 0.5);
                ellipse(0, 0, this.size * 0.7);

                // Speed lines (Anime style)
                for (let i = 0; i < this.lines; i++) {
                    let angle = TWO_PI / this.lines * i;
                    let x1 = cos(angle) * (this.size * 0.3);
                    let y1 = sin(angle) * (this.size * 0.3);
                    let x2 = cos(angle) * (this.size * 1.2);
                    let y2 = sin(angle) * (this.size * 1.2);
                    
                    stroke(this.h, 40, 100, this.life * 0.3);
                    line(x1, y1, x2, y2);
                }

                // Center glow
                noStroke();
                fill(this.h, 10, 100, this.life * 0.8);
                ellipse(0, 0, this.size * 0.1);
                
                pop();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        // Initialize Audio
        document.getElementById('start-btn').addEventListener('click', async () => {
            await Tone.start();
            initialized = true;
            document.getElementById('start-btn').style.display = 'none';
            document.querySelector('.hint').textContent = 'Link Established. Click Anywhere.';
            lucide.createIcons();
        });

        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
