<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Melody Explorer | HAMAtoChord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            color: #fff;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        .control-panel {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }
        .top-info {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
        }
        .btn-play {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-play:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }
        .btn-play:active {
            transform: scale(0.95);
        }
        input[type=range] {
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .trigger-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.3), transparent);
            transform-origin: left center;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="top-info glass p-4 flex flex-col gap-1">
    <h1 class="text-xl font-bold tracking-tight">Orbit Melody Explorer</h1>
    <p class="text-xs opacity-70">Harmony of Celestial Bodies ✨</p>
</div>

<div class="control-panel glass grid grid-cols-1 md:grid-cols-3 gap-6 items-center">
    <div class="flex flex-col gap-2">
        <label class="text-xs font-bold uppercase tracking-widest opacity-60">Tempo</label>
        <div class="flex items-center gap-3">
            <i data-lucide="zap" class="w-4 h-4"></i>
            <input type="range" id="tempo" min="20" max="200" value="80" class="flex-grow">
        </div>
    </div>
    
    <div class="flex justify-center">
        <button id="start-btn" class="btn-play glass px-8 py-3 rounded-full font-bold flex items-center gap-2">
            <i data-lucide="play" class="w-5 h-5 fill-current"></i>
            <span>START RESONANCE</span>
        </button>
    </div>

    <div class="flex flex-col gap-2">
        <label class="text-xs font-bold uppercase tracking-widest opacity-60">Reverb</label>
        <div class="flex items-center gap-3">
            <i data-lucide="wind" class="w-4 h-4"></i>
            <input type="range" id="reverb" min="0" max="1" step="0.01" value="0.4" class="flex-grow">
        </div>
    </div>
</div>

<script>
    // Lucide Icons
    lucide.createIcons();

    // --- Three.js Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Stars
    const starGeometry = new THREE.BufferGeometry();
    const starMaterial = new THREE.PointsMaterial({ color: 0xFFFFFF, size: 0.1 });
    const starVertices = [];
    for (let i = 0; i < 5000; i++) {
        starVertices.push((Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100);
    }
    starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // Sun (Central Light)
    const sunGeometry = new THREE.SphereGeometry(0.5, 32, 32);
    const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xFFFFFF });
    const sun = new THREE.Mesh(sunGeometry, sunMaterial);
    scene.add(sun);

    const sunGlow = new THREE.PointLight(0xFFFFFF, 2, 20);
    scene.add(sunGlow);

    // Orbits and Planets
    const orbitCounts = 5;
    const planets = [];
    const orbitColors = [0xFF69B4, 0x00BFFF, 0xFFD700, 0x7FFF00, 0xFF4500];
    const notes = ["C3", "E3", "G3", "B3", "C4"];

    for (let i = 0; i < orbitCounts; i++) {
        const radius = (i + 1) * 2;
        
        // Orbit Circle
        const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, 2 * Math.PI, false, 0);
        const points = curve.getPoints(100);
        const orbitGeometry = new THREE.BufferGeometry().setFromPoints(points);
        const orbitMaterial = new THREE.LineBasicMaterial({ color: 0xFFFFFF, transparent: true, opacity: 0.1 });
        const orbit = new THREE.Line(orbitGeometry, orbitMaterial);
        orbit.rotation.x = Math.PI / 2;
        scene.add(orbit);

        // Planet
        const planetGeo = new THREE.SphereGeometry(0.15 + (i * 0.05), 16, 16);
        const planetMat = new THREE.MeshStandardMaterial({ 
            color: orbitColors[i],
            emissive: orbitColors[i],
            emissiveIntensity: 0.5,
            roughness: 0.3,
            metalness: 0.8
        });
        const planet = new THREE.Mesh(planetGeo, planetMat);
        
        const speed = (orbitCounts - i) * 0.01;
        planets.push({
            mesh: planet,
            radius: radius,
            angle: Math.random() * Math.PI * 2,
            speed: speed,
            note: notes[i],
            color: orbitColors[i]
        });
        scene.add(planet);
    }

    camera.position.z = 12;
    camera.position.y = 5;
    camera.lookAt(0, 0, 0);

    // --- Tone.js Setup ---
    let isStarted = false;
    const synth = new Tone.PolySynth(Tone.Synth).toDestination();
    const reverb = new Tone.Reverb(0.4).toDestination();
    synth.connect(reverb);
    
    // UI Elements
    const startBtn = document.getElementById('start-btn');
    const tempoSlider = document.getElementById('tempo');
    const reverbSlider = document.getElementById('reverb');

    startBtn.addEventListener('click', async () => {
        if (!isStarted) {
            await Tone.start();
            isStarted = true;
            startBtn.innerHTML = '<i data-lucide="pause" class="w-5 h-5 fill-current"></i><span>CEASE RESONANCE</span>';
            lucide.createIcons();
        } else {
            isStarted = false;
            startBtn.innerHTML = '<i data-lucide="play" class="w-5 h-5 fill-current"></i><span>START RESONANCE</span>';
            lucide.createIcons();
        }
    });

    tempoSlider.addEventListener('input', (e) => {
        const val = e.target.value;
        planets.forEach((p, i) => {
            p.speed = ((orbitCounts - i) * 0.01) * (val / 80);
        });
    });

    reverbSlider.addEventListener('input', (e) => {
        reverb.decay = parseFloat(e.target.value) * 10 + 0.1;
    });

    // --- Animation Loop ---
    function animate() {
        requestAnimationFrame(animate);

        planets.forEach((p) => {
            const prevAngle = p.angle;
            p.angle += p.speed;
            
            // Check if it crosses the "trigger line" (angle 0)
            if (isStarted && prevAngle % (Math.PI * 2) > p.angle % (Math.PI * 2)) {
                synth.triggerAttackRelease(p.note, "16n");
                
                // Visual Pulse
                p.mesh.scale.set(1.5, 1.5, 1.5);
                setTimeout(() => p.mesh.scale.set(1, 1, 1), 100);
            }

            p.mesh.position.x = Math.cos(p.angle) * p.radius;
            p.mesh.position.z = Math.sin(p.angle) * p.radius;
        });

        stars.rotation.y += 0.0005;
        renderer.render(scene, camera);
    }

    animate();

    // Handle Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>
