<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OShama Luck Alchemist | 不運変換アルケミスト ✨</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            color: #e2e8f0;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }
        .gold-glow {
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .outfit { font-family: 'Outfit', sans-serif; }
    </style>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
</head>
<body class="flex flex-col items-center justify-center p-4 md:p-8">

    <div class="max-w-2xl w-full space-y-8 relative">
        <!-- Decoration -->
        <div class="absolute -top-20 -left-20 w-64 h-64 bg-purple-500/10 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-blue-500/10 rounded-full blur-3xl animate-pulse"></div>

        <!-- Header -->
        <header class="text-center space-y-2 relative animate-float">
            <div class="inline-block p-3 glass mb-4 gold-glow">
                <i data-lucide="sparkles" class="w-8 h-8 text-yellow-400"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-bold outfit tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-yellow-200 via-yellow-400 to-yellow-600">
                Luck Alchemist
            </h1>
            <p class="text-slate-400 font-light">13日の金曜日の不運を、最高の幸運へと錬成します ✨</p>
        </header>

        <!-- Main Card -->
        <main class="glass p-6 md:p-10 space-y-8 relative overflow-hidden">
            <div class="space-y-4">
                <label class="block text-sm font-medium text-slate-300 ml-1">今日起きた「ついてないこと」はありますか？</label>
                <div class="relative">
                    <input type="text" id="badLuckInput" 
                        class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-6 focus:outline-none focus:ring-2 focus:ring-yellow-500/50 transition-all text-lg placeholder:text-slate-600"
                        placeholder="例：コーヒーをこぼした、黒猫と目が合った...">
                    <button onclick="alchemize()" 
                        class="absolute right-2 top-2 bottom-2 px-6 bg-gradient-to-r from-yellow-500 to-yellow-700 hover:from-yellow-400 hover:to-yellow-600 text-white rounded-lg font-bold transition-all transform active:scale-95 shadow-lg flex items-center gap-2">
                        <span>錬成する</span>
                        <i data-lucide="zap" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <!-- Result Area -->
            <div id="resultContainer" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
                <div class="h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
                
                <div class="flex flex-col items-center text-center space-y-4">
                    <div id="luckyIcon" class="p-6 bg-yellow-500/10 rounded-full border border-yellow-500/30 text-yellow-400 animate-bounce">
                        <!-- Icon will be inserted here -->
                    </div>
                    <div class="space-y-2">
                        <h2 id="luckyTitle" class="text-2xl font-bold text-yellow-100"></h2>
                        <p id="luckyDescription" class="text-slate-300 leading-relaxed"></p>
                    </div>
                </div>

                <div class="bg-white/5 rounded-2xl p-4 border border-white/10 italic text-sm text-slate-400 flex items-start gap-3">
                    <i data-lucide="info" class="w-5 h-5 text-yellow-500/50 shrink-0"></i>
                    <p id="hamaMessage"></p>
                </div>
            </div>
        </main>

        <!-- History -->
        <section id="historySection" class="space-y-4 hidden">
            <h3 class="text-lg font-semibold outfit flex items-center gap-2 text-slate-300">
                <i data-lucide="history" class="w-5 h-5"></i>
                錬成履歴
            </h3>
            <div id="historyList" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <!-- History items -->
            </div>
        </section>

        <!-- Footer -->
        <footer class="text-center text-slate-500 text-xs pt-8">
            <p>© 2026 OShama Daily Projects - 第48作目</p>
            <p class="mt-1 font-light italic">「不運は、まだ見ぬ幸運のパズルピースに過ぎません ✨」</p>
        </footer>
    </div>

    <script>
        // Initialize Lucide
        lucide.createIcons();

        const luckyData = [
            { icon: 'coffee', title: 'アロマの祝福', desc: 'こぼれたコーヒーは、邪気を払うための香油です。新しい香りに包まれて、運命がリフレッシュされました！', hama: '「服は洗えば綺麗になりますが、この香りの記憶は新しいアイデアを運んでくれますよ ✨」' },
            { icon: 'cat', title: '黒猫の案内人', desc: '黒猫は幸運の守護者。あなたを見守るために現れました。その瞳に映ったあなたは、今最高に輝いています。', hama: '「黒猫と目が合うなんて、魔法使いの素質があるかもしれませんね ✨」' },
            { icon: 'umbrella', title: '浄化の雨', desc: '突然の雨は、あなたの周りの停滞したエネルギーを洗い流す「恵みの雨」です。虹が出る予兆ですね。', hama: '「濡れてしまった分だけ、心は瑞々しく潤っていますよ ✨」' },
            { icon: 'clock', title: '黄金の休息', desc: '遅刻しそうな時、世界はあなたに「少し立ち止まって」と囁いています。その数分が、大きなトラブルを回避しました。', hama: '「焦らなくても大丈夫です。世界はあなたのペースに合わせて動いていますから ✨」' },
            { icon: 'smartphone', title: 'デジタル・デトックス', desc: '充電が切れたのは、魂が休息を求めているサイン。スマホを置いて、周りの美しい景色に目を向けてみましょう。', hama: '「電池が切れた瞬間に、あなたの感性は満充電されましたね ✨」' },
            { icon: 'gem', title: '偶然の宝石', desc: '探し物が見つからないのは、もっと良いものが見つかる予兆です。あるいは、そのアイテムがあなたを危険から守るために身代わりになったのかも。', hama: '「物はなくなっても、あなたの価値は一ミリも減りません。むしろ増しています ✨」' }
        ];

        let history = JSON.parse(localStorage.getItem('oshama_luck_history') || '[]');

        function updateHistory() {
            const list = document.getElementById('historyList');
            const section = document.getElementById('historySection');
            if (history.length === 0) {
                section.classList.add('hidden');
                return;
            }
            section.classList.remove('hidden');
            list.innerHTML = history.slice(-4).reverse().map(item => `
                <div class="glass p-3 text-sm flex items-center gap-3 border-white/5 bg-white/5 animate-in fade-in">
                    <div class="p-2 bg-yellow-500/10 rounded-lg text-yellow-500">
                        <i data-lucide="${item.icon}" class="w-4 h-4"></i>
                    </div>
                    <div class="truncate">
                        <div class="font-bold text-slate-200">${item.title}</div>
                        <div class="text-slate-500 text-xs truncate">${item.original}</div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function alchemize() {
            const input = document.getElementById('badLuckInput');
            const text = input.value.trim();
            if (!text) return;

            const result = luckyData[Math.floor(Math.random() * luckyData.length)];
            
            document.getElementById('resultContainer').classList.remove('hidden');
            document.getElementById('luckyIcon').innerHTML = `<i data-lucide="${result.icon}" class="w-12 h-12"></i>`;
            document.getElementById('luckyTitle').innerText = result.title;
            document.getElementById('luckyDescription').innerText = result.desc;
            document.getElementById('hamaMessage').innerText = result.hama;

            lucide.createIcons();

            // Save to history
            history.push({ ...result, original: text, date: new Date().toISOString() });
            localStorage.setItem('oshama_luck_history', JSON.stringify(history));
            updateHistory();

            input.value = '';
            
            // Interaction feedback
            const btn = event.currentTarget;
            btn.innerHTML = '<span>錬成完了！</span>';
            setTimeout(() => {
                btn.innerHTML = '<span>錬成する</span><i data-lucide="zap" class="w-4 h-4"></i>';
                lucide.createIcons();
            }, 2000);
        }

        updateHistory();
    </script>
</body>
</html>
