<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody Voyage - My Best Game Music Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --primary-pink: #d187a5; /* Mauve Pink */
            --accent-pink: #e4a1bb;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #2d3436;
            --text-sub: #636e72;
            --card-shadow: 0 8px 32px 0 rgba(209, 135, 165, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(209, 135, 165, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(228, 161, 187, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            color: var(--primary-pink);
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-sub);
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        main {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        /* Editor Section */
        .editor-section {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: var(--card-shadow);
        }

        .input-group {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px dashed rgba(209, 135, 165, 0.2);
        }

        .input-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        h3 {
            font-size: 1rem;
            color: var(--primary-pink);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
        }

        h3::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--primary-pink);
            border-radius: 50%;
            margin-right: 8px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: var(--text-sub);
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 1rem;
            background: rgba(255,255,255,0.8);
            font-family: inherit;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-pink);
            box-shadow: 0 0 0 3px rgba(209, 135, 165, 0.1);
        }

        /* Card Section */
        .preview-section {
            position: sticky;
            top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .memory-card-wrapper {
            padding: 1rem;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        #memory-card {
            width: 100%;
            aspect-ratio: 4 / 5;
            background: linear-gradient(135deg, #fff5f8 0%, #ffffff 100%);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border-radius: 0.5rem;
        }

        #memory-card::after {
            content: 'MELODY VOYAGE';
            position: absolute;
            bottom: -20px;
            right: -10px;
            font-family: 'Outfit', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            color: rgba(209, 135, 165, 0.03);
            pointer-events: none;
        }

        .card-header {
            border-bottom: 2px solid var(--primary-pink);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary-pink);
        }

        .card-date {
            font-size: 0.7rem;
            color: var(--text-sub);
        }

        .bento-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 1rem;
            flex-grow: 1;
        }

        .bento-item {
            background: white;
            border: 1px solid rgba(209, 135, 165, 0.1);
            border-radius: 1.2rem;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 12px rgba(209, 135, 165, 0.05);
        }

        .bento-item:nth-child(1) {
            grid-column: span 2;
        }

        .music-num {
            font-family: 'Outfit', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--primary-pink);
            margin-bottom: 0.3rem;
            opacity: 0.6;
        }

        .music-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.2rem;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .music-game {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-bottom: 0.8rem;
        }

        .music-comment {
            font-size: 0.8rem;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .actions {
            display: flex;
            gap: 1rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 1rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-download {
            background: var(--primary-pink);
            color: white;
            box-shadow: 0 4px 15px rgba(209, 135, 165, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 6px 20px rgba(209, 135, 165, 0.4);
        }

        .btn-reset {
            background: white;
            color: var(--text-sub);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .btn-reset:hover {
            background: #f1f2f6;
            color: var(--text-main);
        }

        footer {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .empty-state {
            color: #ddd;
            font-style: italic;
        }
    </style>
</head>
<body>

<header>
    <h1>Melody Voyage</h1>
    <p class="subtitle">MY BEST GAME MUSIC MEMORY CARD</p>
</header>

<main>
    <section class="editor-section">
        <div class="input-group">
            <h3>MUSIC #01 (BEST)</h3>
            <label>曲名 / TITLE</label>
            <input type="text" id="t1" placeholder="例: 風の憧憬" oninput="updateCard()">
            <label>ゲーム名 / GAME</label>
            <input type="text" id="g1" placeholder="例: クロノ・トリガー" oninput="updateCard()">
            <label>ひとこと思い出 / COMMENT</label>
            <textarea id="c1" placeholder="例: イントロを聴くだけで涙が出る..." rows="2" oninput="updateCard()"></textarea>
        </div>
        <div class="input-group">
            <h3>MUSIC #02</h3>
            <label>曲名 / TITLE</label>
            <input type="text" id="t2" placeholder="例: 片翼の天使" oninput="updateCard()">
            <label>ゲーム名 / GAME</label>
            <input type="text" id="g2" placeholder="例: ファイナルファンタジーVII" oninput="updateCard()">
            <label>ひとこと思い出 / COMMENT</label>
            <textarea id="c2" placeholder="例: ボス戦の緊張感が凄まじかった。" rows="2" oninput="updateCard()"></textarea>
        </div>
        <div class="input-group">
            <h3>MUSIC #03</h3>
            <label>曲名 / TITLE</label>
            <input type="text" id="t3" placeholder="例: 太陽は昇る" oninput="updateCard()">
            <label>ゲーム名 / GAME</label>
            <input type="text" id="g3" placeholder="例: 大神" oninput="updateCard()">
            <label>ひとこと思い出 / COMMENT</label>
            <textarea id="c3" placeholder="例: 演出と音楽の融合が完璧。" rows="2" oninput="updateCard()"></textarea>
        </div>
    </section>

    <section class="preview-section">
        <div class="memory-card-wrapper">
            <div id="memory-card">
                <div class="card-header">
                    <span class="card-title">Melody Voyage</span>
                    <span class="card-date" id="card-date">2026.03.12</span>
                </div>
                <div class="bento-grid">
                    <div class="bento-item">
                        <span class="music-num">#01 BEST</span>
                        <div class="music-title" id="pt1"><span class="empty-state">Music Title</span></div>
                        <div class="music-game" id="pg1">Game Name</div>
                        <div class="music-comment" id="pc1">Your nostalgic memory goes here...</div>
                    </div>
                    <div class="bento-item">
                        <span class="music-num">#02</span>
                        <div class="music-title" id="pt2"><span class="empty-state">Music Title</span></div>
                        <div class="music-game" id="pg2">Game Name</div>
                        <div class="music-comment" id="pc2">Memory...</div>
                    </div>
                    <div class="bento-item">
                        <span class="music-num">#03</span>
                        <div class="music-title" id="pt3"><span class="empty-state">Music Title</span></div>
                        <div class="music-game" id="pg3">Game Name</div>
                        <div class="music-comment" id="pc3">Memory...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn-download" onclick="downloadCard()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                カードを保存する
            </button>
            <button class="btn-reset" onclick="resetForm()">リセット</button>
        </div>
    </section>
</main>

<footer>
    <p>&copy; 2026 OShama Squad | Melody Voyage</p>
</footer>

<script>
    // Initialize
    document.getElementById('card-date').textContent = new Date().toLocaleDateString('ja-JP').replace(/\//g, '.');

    // Load from LocalStorage
    window.onload = () => {
        const fields = ['t1', 'g1', 'c1', 't2', 'g2', 'c2', 't3', 'g3', 'c3'];
        fields.forEach(f => {
            const val = localStorage.getItem('mv_' + f);
            if (val) {
                document.getElementById(f).value = val;
            }
        });
        updateCard();
    };

    function updateCard() {
        const fields = ['t1', 'g1', 'c1', 't2', 'g2', 'c2', 't3', 'g3', 'c3'];
        fields.forEach(f => {
            const val = document.getElementById(f).value;
            const preview = document.getElementById('p' + f);
            
            if (val.trim() === "") {
                if (f.startsWith('t')) preview.innerHTML = '<span class="empty-state">Music Title</span>';
                else if (f.startsWith('g')) preview.textContent = 'Game Name';
                else preview.textContent = 'Memory...';
            } else {
                preview.textContent = val;
            }
            
            localStorage.setItem('mv_' + f, val);
        });
    }

    function downloadCard() {
        // Track event in GA4
        gtag('event', 'download_card', {
            'event_category': 'engagement',
            'event_label': 'Melody Voyage Card'
        });

        const card = document.getElementById('memory-card');
        html2canvas(card, {
            scale: 2, // High resolution
            backgroundColor: null,
            useCORS: true
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'melody-voyage-card.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    function resetForm() {
        if (!confirm('入力をすべてリセットしますか？')) return;
        
        const fields = ['t1', 'g1', 'c1', 't2', 'g2', 'c2', 't3', 'g3', 'c3'];
        fields.forEach(f => {
            document.getElementById(f).value = '';
            localStorage.removeItem('mv_' + f);
        });
        updateCard();

        gtag('event', 'reset_form', {
            'event_category': 'engagement'
        });
    }
</script>

</body>
</html>
