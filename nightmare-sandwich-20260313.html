<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightmare Sandwich Maker | 13日の金曜日限定</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        night: '#0a0a0c',
                        cursed: '#ff2d55',
                        blessed: '#00f2ff',
                    },
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sandwich-stack { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .ingredient-item { transition: transform 0.2s; }
        .ingredient-item:hover { transform: scale(1.05); }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .floating { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-night text-white min-h-screen overflow-x-hidden">
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none opacity-20 bg-[radial-gradient(circle_at_50%_50%,_#ff2d55_0%,_transparent_50%)]"></div>
    
    <header class="p-6 md:p-10 flex justify-between items-center relative z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-cursed rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(255,45,85,0.5)]">
                <i data-lucide="skull" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tighter">NIGHTMARE<br><span class="text-cursed">SANDWICH</span></h1>
        </div>
        <div class="text-right">
            <p class="text-xs text-gray-400 font-medium">FRIDAY THE 13TH</p>
            <p class="text-lg font-bold">2026.03.13</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20 grid grid-cols-1 lg:grid-cols-2 gap-12 relative z-10">
        <!-- Left: Sandwich Builder -->
        <div class="flex flex-col gap-8">
            <section class="glass rounded-3xl p-8 relative overflow-hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <i data-lucide="layers" class="text-cursed w-5 h-5"></i>
                        BUILD YOUR CURSE
                    </h2>
                    <span id="cursed-meter" class="text-xs font-mono bg-cursed/20 text-cursed px-3 py-1 rounded-full border border-cursed/30">
                        CURSE LEVEL: 0%
                    </span>
                </div>

                <div class="grid grid-cols-3 sm:grid-cols-4 gap-4" id="ingredient-list">
                    <!-- Ingredients will be injected here -->
                </div>
            </section>

            <section class="glass rounded-3xl p-8">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i data-lucide="history" class="text-gray-400 w-5 h-5"></i>
                    RECENT NIGHTMARES
                </h2>
                <div id="history-list" class="flex flex-wrap gap-3">
                    <!-- History will be injected here -->
                    <p class="text-sm text-gray-500 italic">No nightmares yet...</p>
                </div>
            </section>
        </div>

        <!-- Right: Visualization -->
        <div class="flex flex-col items-center justify-center gap-10">
            <div class="relative w-full max-w-sm aspect-square flex flex-col-reverse items-center justify-center" id="sandwich-visual">
                <!-- Sandwich layers will appear here -->
                <div class="w-48 h-6 bg-amber-800/40 rounded-full blur-xl mb-[-10px]"></div>
                <div class="w-40 h-8 bg-amber-200 rounded-2xl border-b-4 border-amber-300 shadow-lg relative z-0"></div> <!-- Bottom Bread -->
            </div>

            <div id="result-card" class="glass rounded-3xl p-8 w-full max-w-md hidden transform transition-all duration-500 scale-95 opacity-0">
                <div class="text-center">
                    <div id="result-icon" class="w-16 h-16 bg-cursed/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-cursed/30">
                        <i data-lucide="zap" class="text-cursed w-8 h-8"></i>
                    </div>
                    <h3 id="result-title" class="text-2xl font-bold mb-2 uppercase tracking-widest">NIGHTMARE COMPLETE</h3>
                    <p id="result-desc" class="text-gray-400 mb-6 text-sm leading-relaxed"></p>
                    
                    <div class="flex gap-4">
                        <button onclick="shareResult()" class="flex-1 bg-cursed hover:bg-cursed/80 text-white font-bold py-3 px-6 rounded-2xl transition-all shadow-[0_0_30px_rgba(255,45,85,0.3)] flex items-center justify-center gap-2">
                            <i data-lucide="share-2" class="w-5 h-5"></i> SHARE
                        </button>
                        <button onclick="resetSandwich()" class="bg-white/10 hover:bg-white/20 text-white font-bold py-3 px-6 rounded-2xl transition-all border border-white/10">
                            <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-10 text-center text-gray-500 text-xs border-t border-white/5">
        <p>&copy; 2026 OShama Daily App. All rights reserved on Friday the 13th.</p>
    </footer>

    <script>
        const ingredients = [
            { id: 'lettuce', name: 'Fresh Lettuce', color: '#4ade80', curse: -5, icon: 'leaf' },
            { id: 'tomato', name: 'Blood Tomato', color: '#f87171', curse: 2, icon: 'circle' },
            { id: 'ghost-pepper', name: 'Ghost Pepper', color: '#fb923c', curse: 15, icon: 'flame' },
            { id: 'eye', name: 'Cursed Eye', color: '#e2e8f0', curse: 25, icon: 'eye' },
            { id: 'dark-meat', name: 'Mystery Meat', color: '#451a03', curse: 10, icon: 'beef' },
            { id: 'slime', name: 'Ectoplasm', color: '#d8b4fe', curse: 20, icon: 'droplets' },
            { id: 'bone', name: 'Crunchy Bone', color: '#f1f5f9', curse: 13, icon: 'bone' },
            { id: 'gold', name: 'Blessed Gold', color: '#facc15', curse: -20, icon: 'coins' }
        ];

        let currentStack = [];
        let curseLevel = 0;

        function init() {
            lucide.createIcons();
            renderIngredients();
            loadHistory();
        }

        function renderIngredients() {
            const list = document.getElementById('ingredient-list');
            ingredients.forEach(ing => {
                const btn = document.createElement('button');
                btn.className = 'ingredient-item glass rounded-2xl p-4 flex flex-col items-center gap-2 text-[10px] font-bold uppercase';
                btn.onclick = () => addIngredient(ing.id);
                btn.innerHTML = `
                    <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: ${ing.color}22">
                        <i data-lucide="${ing.icon}" style="color: ${ing.color}" class="w-5 h-5"></i>
                    </div>
                    ${ing.name}
                `;
                list.appendChild(btn);
            });
            lucide.createIcons();
        }

        function addIngredient(id) {
            if (currentStack.length >= 8) return;
            const ing = ingredients.find(i => i.id === id);
            currentStack.push(ing);
            updateUI();
        }

        function updateUI() {
            const visual = document.getElementById('sandwich-visual');
            // Remove existing layers except bottom bread and shadow
            const layers = visual.querySelectorAll('.sandwich-layer');
            layers.forEach(l => l.remove());

            curseLevel = currentStack.reduce((acc, curr) => acc + curr.curse, 0);
            if (curseLevel < 0) curseLevel = 0;
            if (curseLevel > 100) curseLevel = 100;

            document.getElementById('cursed-meter').innerText = `CURSE LEVEL: ${curseLevel}%`;

            currentStack.forEach((ing, index) => {
                const div = document.createElement('div');
                div.className = 'sandwich-layer w-44 h-4 rounded-xl shadow-md border-b-2 relative z-10 transition-all duration-300';
                div.style.backgroundColor = ing.color;
                div.style.borderColor = 'rgba(0,0,0,0.1)';
                div.style.marginBottom = '-10px';
                div.style.transform = `translateY(${-index * 2}px) rotate(${(Math.random() - 0.5) * 4}deg)`;
                visual.appendChild(div);
            });

            // Add top bread if 3+ items
            if (currentStack.length >= 3) {
                const topBread = document.createElement('div');
                topBread.className = 'sandwich-layer w-42 h-10 bg-amber-200 rounded-t-3xl border-b-4 border-amber-300 shadow-lg relative z-20 transition-all duration-500';
                topBread.style.marginBottom = '-15px';
                visual.appendChild(topBread);
                showResult();
            }
        }

        function showResult() {
            const card = document.getElementById('result-card');
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');
            const icon = document.getElementById('result-icon');

            card.classList.remove('hidden');
            setTimeout(() => {
                card.classList.add('scale-100', 'opacity-100');
            }, 100);

            if (curseLevel > 80) {
                title.innerText = "ULTIMATE NIGHTMARE";
                title.className = "text-2xl font-extrabold mb-2 tracking-widest text-cursed";
                desc.innerText = "13日の金曜日の呪いが最高潮に達しました。今日は家から一歩も出ないことをお勧めします。";
                icon.innerHTML = '<i data-lucide="skull" class="text-cursed w-8 h-8"></i>';
            } else if (curseLevel > 40) {
                title.innerText = "TWISTED LUCK";
                title.className = "text-2xl font-extrabold mb-2 tracking-widest text-orange-400";
                desc.innerText = "少し不気味なサンドイッチが完成。ラッキーとアンラッキーが交互に訪れる激動の1日になりそう。";
                icon.innerHTML = '<i data-lucide="ghost" class="text-orange-400 w-8 h-8"></i>';
            } else {
                title.innerText = "BLESSED BITE";
                title.className = "text-2xl font-extrabold mb-2 tracking-widest text-blessed";
                desc.innerText = "13日の金曜日とは思えないほど清らかなサンドイッチ。今日はあなたの幸運が呪いを打ち消します！";
                icon.innerHTML = '<i data-lucide="sparkles" class="text-blessed w-8 h-8"></i>';
            }
            lucide.createIcons();
            saveToHistory();
        }

        function resetSandwich() {
            currentStack = [];
            curseLevel = 0;
            document.getElementById('result-card').classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                document.getElementById('result-card').classList.add('hidden');
                updateUI();
            }, 300);
        }

        function saveToHistory() {
            const history = JSON.parse(localStorage.getItem('nightmare_history') || '[]');
            const entry = { date: new Date().toLocaleTimeString(), level: curseLevel, items: currentStack.length };
            history.unshift(entry);
            localStorage.setItem('nightmare_history', JSON.stringify(history.slice(0, 10)));
            loadHistory();
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('nightmare_history') || '[]');
            const list = document.getElementById('history-list');
            if (history.length === 0) return;
            
            list.innerHTML = '';
            history.forEach(item => {
                const badge = document.createElement('div');
                badge.className = 'text-[10px] font-mono glass px-3 py-1 rounded-full border border-white/10 flex items-center gap-2';
                badge.innerHTML = `<span class="w-2 h-2 rounded-full ${item.level > 50 ? 'bg-cursed' : 'bg-blessed'}"></span> ${item.level}% at ${item.date}`;
                list.appendChild(badge);
            });
        }

        function shareResult() {
            const text = `13日の金曜日に「呪いのサンドイッチ」を作りました。私の呪いレベルは【${curseLevel}%】です！ #DailyApp #13日の金曜日 #サンドイッチの日`;
            const url = window.location.href;
            const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
            window.open(twitterUrl, '_blank');
        }

        window.onload = init;
    </script>
</body>
</html>
