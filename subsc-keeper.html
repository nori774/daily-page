<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サブスク整理！おサイフ見守り番</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-pink: #fce4ec;
            --deep-pink: #d81b60;
            --accent-yellow: #fff176;
            --bg-color: #fff5f7;
            --text-color: #4a148c;
            --card-shadow: 0 4px 15px rgba(255, 133, 162, 0.2);
            --font-main: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            line-height: 1.6;
            padding-bottom: 40px;
        }

        header {
            background-color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary-pink);
            margin-bottom: 20px;
        }

        header h1 {
            color: var(--deep-pink);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* Bento Grid Layout */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            grid-auto-rows: minmax(150px, auto);
            gap: 15px;
        }

        .card {
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--card-shadow);
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-pink);
        }

        /* Specific card sizes */
        .card-large {
            grid-column: span 2;
        }

        @media (max-width: 600px) {
            .card-large {
                grid-column: span 1;
            }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--deep-pink);
        }

        .card-icon {
            font-size: 1.5rem;
        }

        /* Summary Card */
        .summary-box {
            background: linear-gradient(135deg, var(--primary-pink), var(--deep-pink));
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .summary-box .total-amount {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .summary-box .total-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* List Items */
        .subsc-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed var(--soft-pink);
        }

        .subsc-item:last-child {
            border-bottom: none;
        }

        .item-info .item-name {
            font-weight: bold;
            display: block;
        }

        .item-info .item-date {
            font-size: 0.8rem;
            color: #888;
        }

        .item-price {
            font-weight: bold;
            color: var(--deep-pink);
        }

        /* Form */
        .add-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        input {
            padding: 10px;
            border: 2px solid var(--soft-pink);
            border-radius: 10px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-pink);
        }

        .btn {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--deep-pink);
        }

        .btn-delete {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 5px;
        }

        .btn-delete:hover {
            color: var(--deep-pink);
        }

        /* Mascot character */
        .mascot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            cursor: pointer;
            z-index: 100;
            border: 2px solid var(--primary-pink);
        }

        .speech-bubble {
            position: fixed;
            bottom: 110px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 200px;
            font-size: 0.85rem;
            z-index: 100;
            display: none;
            border: 1px solid var(--soft-pink);
        }

        .speech-bubble::after {
            content: "";
            position: absolute;
            bottom: -10px;
            right: 30px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: white transparent transparent;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1><span>👛</span> サブスク整理！おサイフ見守り番</h1>
    </header>

    <div class="container">
        <div class="bento-grid">
            <!-- Summary Card -->
            <div class="card summary-box">
                <span class="total-label">毎月の合計支払い額</span>
                <div class="total-amount" id="totalDisplay">¥0</div>
                <span class="total-label">年間で ¥<span id="yearlyDisplay">0</span> の出費</span>
            </div>

            <!-- List Card -->
            <div class="card card-large">
                <div class="card-header">
                    <div class="card-title">整理中のサービス一覧</div>
                    <div class="card-icon">📋</div>
                </div>
                <div id="subscList">
                    <!-- Items will be injected here -->
                </div>
            </div>

            <!-- Add Form Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">新しく登録する</div>
                    <div class="card-icon">➕</div>
                </div>
                <form class="add-form" id="addForm">
                    <div class="input-group">
                        <label for="name">サービス名</label>
                        <input type="text" id="name" placeholder="例：動画配信サービス" required>
                    </div>
                    <div class="input-group">
                        <label for="price">月額料金 (円)</label>
                        <input type="number" id="price" placeholder="例：1000" required>
                    </div>
                    <div class="input-group">
                        <label for="date">次の支払日</label>
                        <input type="date" id="date" required>
                    </div>
                    <button type="submit" class="btn">見守りリストに追加</button>
                </form>
            </div>

            <!-- Tip Card -->
            <div class="card" style="background-color: var(--accent-yellow); border: none;">
                <div class="card-header">
                    <div class="card-title">節約のヒント</div>
                    <div class="card-icon">💡</div>
                </div>
                <p style="font-size: 0.9rem;">
                    1ヶ月以上使っていないサービスはありませんか？「あとで見る」は、意外と見ないものです。思い切って一度解約して、また見たくなった時に再契約するのが賢い節約術です！
                </p>
            </div>
        </div>

        <footer>
            &copy; 2026 OShama Squad - みんなの家計を守り隊
        </footer>
    </div>

    <div class="mascot" id="mascot" onclick="toggleMascot()">🐷</div>
    <div class="speech-bubble" id="speech">
        こんにちは！おサイフの中身、一緒にチェックしていきましょうね。
    </div>

    <script>
        let subscriptions = JSON.parse(localStorage.getItem('oshama_subsc')) || [
            { id: 1, name: '動画見放題プラン', price: 1078, date: '2026-03-15' },
            { id: 2, name: 'スマホ基本料金', price: 3278, date: '2026-03-25' }
        ];

        const subscList = document.getElementById('subscList');
        const totalDisplay = document.getElementById('totalDisplay');
        const yearlyDisplay = document.getElementById('yearlyDisplay');
        const addForm = document.getElementById('addForm');
        const speech = document.getElementById('speech');

        function render() {
            subscList.innerHTML = '';
            let total = 0;

            if (subscriptions.length === 0) {
                subscList.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">登録されたサービスはありません</p>';
            }

            subscriptions.forEach(sub => {
                total += parseInt(sub.price);
                const item = document.createElement('div');
                item.className = 'subsc-item';
                item.innerHTML = `
                    <div class="item-info">
                        <span class="item-name">${sub.name}</span>
                        <span class="item-date">次：${sub.date}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span class="item-price">¥${parseInt(sub.price).toLocaleString()}</span>
                        <button class="btn-delete" onclick="deleteItem(${sub.id})">×</button>
                    </div>
                `;
                subscList.appendChild(item);
            });

            totalDisplay.innerText = `¥${total.toLocaleString()}`;
            yearlyDisplay.innerText = (total * 12).toLocaleString();
            localStorage.setItem('oshama_subsc', JSON.stringify(subscriptions));
        }

        function deleteItem(id) {
            if (confirm('このサービスをリストから外しますか？')) {
                subscriptions = subscriptions.filter(s => s.id !== id);
                render();
                showSpeech('スッキリしましたね！');
            }
        }

        addForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const date = document.getElementById('date').value;

            const newSub = {
                id: Date.now(),
                name,
                price,
                date
            };

            subscriptions.push(newSub);
            render();
            addForm.reset();
            showSpeech('新しく追加しました！大切に管理しましょう。');
        });

        function showSpeech(text) {
            speech.innerText = text;
            speech.style.display = 'block';
            setTimeout(() => {
                speech.style.display = 'none';
            }, 3000);
        }

        function toggleMascot() {
            const current = speech.style.display;
            if (current === 'block') {
                speech.style.display = 'none';
            } else {
                speech.innerText = "毎月の固定費、意外とバカになりませんよね。一緒に賢く節約していきましょう！";
                speech.style.display = 'block';
            }
        }

        // Initial render
        render();

        // Show welcome message
        setTimeout(() => {
            speech.style.display = 'block';
        }, 1000);
        setTimeout(() => {
            speech.style.display = 'none';
        }, 5000);
    </script>
</body>
</html>
