<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OShama Luck-to-Sweet Converter | 13日の金曜日を甘い明日に</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #701a75 100%);
            min-height: 100vh;
            color: #f8fafc;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .sweet-glow {
            filter: drop-shadow(0 0 8px rgba(244, 114, 182, 0.6));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        .unlucky-pulse {
            animation: pulse-red 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-red {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .7; transform: scale(1.05); }
        }
    </style>
    <!-- Google Tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PS2DX1HNVL');
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const UNLUCKY_ITEMS = [
            { id: 'skull', icon: 'Skull', label: '不吉な予感', color: 'text-slate-400' },
            { id: 'ghost', icon: 'Ghost', label: '背後の気配', color: 'text-indigo-300' },
            { id: 'zap', icon: 'Zap', label: '不意の衝撃', color: 'text-yellow-500' },
            { id: 'cloud', icon: 'CloudLightning', label: '暗雲低迷', color: 'text-blue-400' },
            { id: 'cat', icon: 'Cat', label: '黒猫の横断', color: 'text-purple-400' },
        ];

        const SWEET_ITEMS = [
            { id: 'heart', icon: 'Heart', label: '極上ショコラ', msg: '想いが届く最高の明日になります。' },
            { id: 'candy', icon: 'Candy', label: '魔法のキャンディ', msg: '甘い言葉があなたを包み込みます。' },
            { id: 'cookie', icon: 'Cookie', label: '幸福のクッキー', msg: 'サクッと軽い足取りで進める予感。' },
            { id: 'cake', icon: 'CakeSlice', label: '祝福のケーキ', msg: '努力が報われ、甘い果実を手にします。' },
            { id: 'gift', icon: 'Gift', label: 'サプライズ', msg: '予想外の場所から喜びが舞い込みます。' },
        ];

        const Icon = ({ name, className }) => {
            const LucideIcon = lucide[name];
            return LucideIcon ? <LucideIcon className={className} /> : null;
        };

        const App = () => {
            const [selectedUnlucky, setSelectedUnlucky] = useState(null);
            const [isConverting, setIsConverting] = useState(false);
            const [resultSweet, setResultSweet] = useState(null);
            const [totalLuck, setTotalLuck] = useState(0);

            useEffect(() => {
                const saved = localStorage.getItem('oshama_luck_charge');
                if (saved) setTotalLuck(parseInt(saved));
            }, []);

            const handleConvert = () => {
                if (!selectedUnlucky || isConverting) return;
                
                setIsConverting(true);
                setResultSweet(null);

                setTimeout(() => {
                    const randomSweet = SWEET_ITEMS[Math.floor(Math.random() * SWEET_ITEMS.length)];
                    setResultSweet(randomSweet);
                    setIsConverting(false);
                    const newLuck = totalLuck + 13;
                    setTotalLuck(newLuck);
                    localStorage.setItem('oshama_luck_charge', newLuck.toString());
                    setSelectedUnlucky(null);
                }, 1500);
            };

            return (
                <div className="max-w-md mx-auto px-6 py-12 flex flex-col min-h-screen">
                    {/* Header */}
                    <header className="text-center mb-12">
                        <div className="inline-block glass rounded-full px-4 py-1 text-xs font-semibold mb-4 tracking-widest text-pink-300 uppercase">
                            2026.03.13 Friday the 13th
                        </div>
                        <h1 className="text-4xl font-bold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-indigo-300 to-pink-300 leading-tight">
                            Luck-to-Sweet<br/>Converter
                        </h1>
                        <p className="text-slate-400 text-sm">不運を浄化し、ホワイトデーの輝きへ</p>
                    </header>

                    {/* Main Content */}
                    <main className="flex-grow flex flex-col gap-8">
                        {/* Status Card */}
                        <div className="glass rounded-3xl p-6 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-pink-500/10 blur-3xl rounded-full -mr-16 -mt-16"></div>
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-xs text-slate-400 uppercase tracking-widest">Total Sweet Energy</span>
                                <span className="text-pink-400 font-bold">{totalLuck} pts</span>
                            </div>
                            <div className="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                                <div 
                                    className="h-full bg-gradient-to-r from-indigo-500 to-pink-500 transition-all duration-1000"
                                    style={{ width: `${Math.min(100, (totalLuck % 100))}%` }}
                                ></div>
                            </div>
                        </div>

                        {/* Converter Stage */}
                        <div className="flex justify-center items-center h-48 relative">
                            {isConverting ? (
                                <div className="flex flex-col items-center">
                                    <div className="w-24 h-24 rounded-full border-4 border-t-pink-400 border-indigo-900 animate-spin mb-4"></div>
                                    <p className="text-pink-300 animate-pulse text-sm">甘く浄化中...</p>
                                </div>
                            ) : resultSweet ? (
                                <div className="flex flex-col items-center animate-float">
                                    <Icon name={resultSweet.icon} className="w-24 h-24 text-pink-400 sweet-glow mb-4" />
                                    <div className="text-center">
                                        <h3 className="text-xl font-bold text-pink-200 mb-1">{resultSweet.label}</h3>
                                        <p className="text-xs text-slate-300 px-4">{resultSweet.msg}</p>
                                    </div>
                                    <button 
                                        onClick={() => setResultSweet(null)}
                                        className="mt-6 text-xs text-slate-500 hover:text-slate-300 underline underline-offset-4"
                                    >
                                        もう一度浄化する
                                    </button>
                                </div>
                            ) : selectedUnlucky ? (
                                <div className="flex flex-col items-center unlucky-pulse">
                                    <Icon name={selectedUnlucky.icon} className={`w-24 h-24 ${selectedUnlucky.color} mb-4`} />
                                    <p className="text-sm font-semibold">{selectedUnlucky.label}</p>
                                </div>
                            ) : (
                                <div className="text-center text-slate-500 italic text-sm">
                                    浄化したい不吉な事象を選んでください
                                </div>
                            )}
                        </div>

                        {/* Unlucky Selection */}
                        {!resultSweet && !isConverting && (
                            <div className="grid grid-cols-5 gap-3">
                                {UNLUCKY_ITEMS.map(item => (
                                    <button
                                        key={item.id}
                                        onClick={() => setSelectedUnlucky(item)}
                                        className={`glass p-3 rounded-2xl flex flex-col items-center transition-all duration-300 ${selectedUnlucky?.id === item.id ? 'ring-2 ring-indigo-500 bg-indigo-500/10 scale-105' : 'hover:bg-white/5 opacity-60 hover:opacity-100'}`}
                                    >
                                        <Icon name={item.icon} className={`w-6 h-6 ${item.color} mb-1`} />
                                        <span className="text-[10px] whitespace-nowrap">{item.id}</span>
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* Action Button */}
                        {!resultSweet && (
                            <button
                                onClick={handleConvert}
                                disabled={!selectedUnlucky || isConverting}
                                className={`w-full py-4 rounded-2xl font-bold transition-all duration-500 shadow-xl flex items-center justify-center gap-2 ${selectedUnlucky && !isConverting ? 'bg-gradient-to-r from-indigo-600 to-pink-600 hover:scale-[1.02] active:scale-95 text-white' : 'bg-slate-800 text-slate-600 cursor-not-allowed'}`}
                            >
                                <Icon name="Sparkles" className="w-5 h-5" />
                                <span>甘味へ変換して浄化する</span>
                            </button>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="mt-12 text-center">
                        <p className="text-[10px] text-slate-600 tracking-widest uppercase mb-4">
                            Produced by OShama Agent Nexus
                        </p>
                        <div className="flex justify-center gap-6 opacity-40 grayscale hover:opacity-100 hover:grayscale-0 transition-all">
                            <Icon name="Github" className="w-4 h-4" />
                            <Icon name="Twitter" className="w-4 h-4" />
                            <Icon name="Music" className="w-4 h-4" />
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
