<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ひるねエージェント・スウォーム | HAMAtoChord</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.26/Tone.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF69B4;
            --secondary: #FFB6C1;
            --accent: #FF1493;
            --bg: linear-gradient(135deg, #FFE4E1, #FFB6C1, #FF69B4);
        }
        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            border: 2px solid white;
        }
        h1 {
            color: var(--accent);
            margin-top: 0;
            font-size: 1.8rem;
        }
        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.3);
            margin: 5px;
        }
        .btn:hover {
            transform: scale(1.05);
            background: #ff007f;
        }
        .agent-info {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
            border: 1px dashed var(--primary);
        }
        #p5-canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        .tag {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="p5-canvas"></div>
    <div id="ui-layer">
        <div class="tag">GitHub: MiroFish & agency-agents Inspired</div>
        <h1>🐑 ひるねエージェント</h1>
        <p>群れ（スウォーム）のように動く「ひるね粒子」が、あなたの安眠をサポートします！</p>
        <button class="btn" onclick="startNap()">ひるねを開始する</button>
        <button class="btn" onclick="summonAgent()">エージェントを召喚</button>
        <div id="agent-info" class="agent-info"></div>
    </div>

    <script>
        let particles = [];
        let agentActive = false;
        let synth;
        let started = false;

        function setup() {
            let canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('p5-canvas');
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
            
            synth = new Tone.PolySynth(Tone.Synth).toDestination();
            synth.set({
                oscillator: { type: "sine" },
                envelope: { attack: 0.5, decay: 0.5, sustain: 0.5, release: 2 }
            });
        }

        function draw() {
            clear();
            particles.forEach(p => {
                p.update();
                p.display();
            });
        }

        class Particle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.vel = p5.Vector.random2D();
                this.acc = createVector();
                this.maxSpeed = 2;
                this.maxForce = 0.05;
                this.size = random(20, 40);
                this.text = random(['Zzz', '🐑', '☁️', '💖']);
            }

            update() {
                // Swarm behavior (simple cohesion/alignment)
                let mouse = createVector(mouseX, mouseY);
                let dir = p5.Vector.sub(mouse, this.pos);
                if (agentActive) {
                    dir.setMag(0.1);
                    this.acc.add(dir);
                }

                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);

                if (this.pos.x > width) this.pos.x = 0;
                if (this.pos.x < 0) this.pos.x = width;
                if (this.pos.y > height) this.pos.y = 0;
                if (this.pos.y < 0) this.pos.y = height;
            }

            display() {
                textSize(this.size);
                textAlign(CENTER, CENTER);
                fill(255, 105, 180, 150);
                text(this.text, this.pos.x, this.pos.y);
            }
        }

        async function startNap() {
            if (!started) {
                await Tone.start();
                started = true;
            }
            // HAMAtoChord Style: Relaxing M7 chord sequence
            const now = Tone.now();
            const chords = [
                ["C4", "E4", "G4", "B4"], // CM7
                ["F4", "A4", "C5", "E5"], // FM7
                ["G4", "B4", "D5", "F#5"], // GM7
                ["E4", "G4", "B4", "D5"]  // Em7
            ];
            
            let time = now;
            chords.forEach(chord => {
                synth.triggerAttackRelease(chord, "2n", time);
                time += 2;
            });
        }

        const agentMessages = [
            "【眠りの魔術師】あなたの昼寝は『SSSランク』です！",
            "【まくらソムリエ】ヒツジのいらない枕を使ってるみたいですね！",
            "【夢のエンジニア】リファクタリング済みの夢をデプロイしました。",
            "【エージェント・シープ】群れに加わって、深く沈みましょう...",
            "【昼寝マウンター】私の昼寝の方が5分長かったですね。ふふっ。"
        ];

        function summonAgent() {
            agentActive = !agentActive;
            const info = document.getElementById('agent-info');
            info.style.display = 'block';
            info.innerHTML = "<strong>エージェントからの伝言:</strong><br>" + agentMessages[Math.floor(Math.random() * agentMessages.length)];
            
            if (agentActive) {
                particles.forEach(p => p.maxSpeed = 5);
            } else {
                particles.forEach(p => p.maxSpeed = 2);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
