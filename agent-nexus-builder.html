<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent-Nexus: My 9 Prime Agents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Mega:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f0f0;
            background-image: 
                linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e5e7eb 75%), 
                linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .neubrutalism-card {
            background: white;
            border: 4px solid black;
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
            transition: all 0.2s ease;
        }
        .neubrutalism-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 12px 12px 0px 0px rgba(0,0,0,1);
        }
        .neubrutalism-btn {
            background: #7C3AED;
            color: white;
            border: 3px solid black;
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            font-weight: 800;
            transition: all 0.1s ease;
        }
        .neubrutalism-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .heading-font { font-family: 'Lexend Mega', sans-serif; }
        .grid-item {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .grid-item.empty {
            background: #fff;
            border: 2px dashed #ccc;
        }
        .badge {
            font-size: 0.65rem;
            padding: 2px 6px;
            border: 1px solid black;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-12 text-center">
            <h1 class="heading-font text-4xl md:text-6xl font-black mb-4 uppercase tracking-tighter">
                Agent<span class="text-[#7C3AED]">-</span>Nexus
            </h1>
            <p class="text-xl font-bold bg-[#84CC16] inline-block px-4 py-1 border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                私を構成する9つのエージェント
            </p>
        </header>

        <!-- Main Content Area -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left: Controls -->
            <div class="lg:col-span-1 space-y-6">
                <div class="neubrutalism-card p-6 glass-panel">
                    <h2 class="heading-font text-xl font-bold mb-4 flex items-center gap-2">
                        <i data-lucide="settings"></i> 設定
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block font-black text-sm mb-1 uppercase">表示名</label>
                            <input type="text" id="userName" placeholder="エージェント・マスター" class="w-full border-2 border-black p-2 font-bold focus:bg-yellow-50 outline-none">
                        </div>
                        <div>
                            <label class="block font-black text-sm mb-1 uppercase">テーマカラー</label>
                            <div class="flex gap-2">
                                <button onclick="setTheme('#7C3AED')" class="w-8 h-8 border-2 border-black bg-[#7C3AED]"></button>
                                <button onclick="setTheme('#06B6D4')" class="w-8 h-8 border-2 border-black bg-[#06B6D4]"></button>
                                <button onclick="setTheme('#84CC16')" class="w-8 h-8 border-2 border-black bg-[#84CC16]"></button>
                                <button onclick="setTheme('#EF4444')" class="w-8 h-8 border-2 border-black bg-[#EF4444]"></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="neubrutalism-card p-6 bg-[#06B6D4]">
                    <h3 class="font-black text-lg mb-2">シェアする</h3>
                    <p class="font-bold text-sm mb-4">あなたの構成エージェントをXで共有しましょう。</p>
                    <button onclick="shareToX()" class="neubrutalism-btn w-full py-3 flex items-center justify-center gap-2 bg-black hover:bg-gray-900">
                        <i data-lucide="twitter"></i> Xにポストする
                    </button>
                </div>
            </div>

            <!-- Right: 9x9 Grid -->
            <div id="nexus-grid" class="lg:col-span-2 grid grid-cols-3 gap-4 neubrutalism-card p-4 bg-white">
                <!-- Items 1-9 will be injected here -->
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center font-black text-sm uppercase tracking-widest">
            &copy; 2026 Agent-Nexus Builder // System-Agnostic Intelligence
        </footer>
    </div>

    <!-- Agent Selection Modal -->
    <div id="modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="neubrutalism-card bg-white w-full max-w-lg p-8 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 font-black text-2xl">&times;</button>
            <h2 class="heading-font text-2xl font-black mb-6 uppercase">エージェントを選択</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="block font-black text-sm mb-2 uppercase">エージェント名</label>
                    <select id="agentSelect" class="w-full border-2 border-black p-3 font-bold text-lg">
                        <option value="">-- 選択してください --</option>
                        <option value="Claude Code">Claude Code</option>
                        <option value="Cursor Composer">Cursor Composer</option>
                        <option value="OpenClaw">OpenClaw</option>
                        <option value="Aider">Aider</option>
                        <option value="GPT-4o Engineer">GPT-4o Engineer</option>
                        <option value="DeepSeek Coder">DeepSeek Coder</option>
                        <option value="Gemini CLI">Gemini CLI</option>
                        <option value="GitHub Copilot">GitHub Copilot</option>
                        <option value="Llama 3 Agent">Llama 3 Agent</option>
                        <option value="Custom">カスタム入力...</option>
                    </select>
                </div>

                <div id="customNameArea" class="hidden">
                    <label class="block font-black text-sm mb-2 uppercase">カスタム名</label>
                    <input type="text" id="customName" class="w-full border-2 border-black p-3 font-bold">
                </div>

                <div>
                    <label class="block font-black text-sm mb-2 uppercase">特化能力 (複数選択可)</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="flex items-center gap-2 font-bold cursor-pointer">
                            <input type="checkbox" value="WEB" class="capability-check w-5 h-5 border-2 border-black rounded-none"> WEB検索
                        </label>
                        <label class="flex items-center gap-2 font-bold cursor-pointer">
                            <input type="checkbox" value="CODE" class="capability-check w-5 h-5 border-2 border-black rounded-none"> コード実行
                        </label>
                        <label class="flex items-center gap-2 font-bold cursor-pointer">
                            <input type="checkbox" value="FILE" class="capability-check w-5 h-5 border-2 border-black rounded-none"> ファイル操作
                        </label>
                        <label class="flex items-center gap-2 font-bold cursor-pointer">
                            <input type="checkbox" value="VISION" class="capability-check w-5 h-5 border-2 border-black rounded-none"> 画像認識
                        </label>
                    </div>
                </div>

                <button onclick="saveAgent()" class="neubrutalism-btn w-full py-4 text-xl">決定</button>
            </div>
        </div>
    </div>

    <script>
        let currentSlot = null;
        let nexusData = JSON.parse(localStorage.getItem('nexusData')) || Array(9).fill(null);
        
        const agents = [
            { name: "Claude Code", color: "#F59E0B" },
            { name: "Cursor Composer", color: "#06B6D4" },
            { name: "OpenClaw", color: "#84CC16" },
            { name: "Aider", color: "#7C3AED" },
            { name: "GPT-4o Engineer", color: "#10B981" },
            { name: "DeepSeek Coder", color: "#3B82F6" },
            { name: "Gemini CLI", color: "#4F46E5" },
            { name: "GitHub Copilot", color: "#1F2937" },
            { name: "Llama 3 Agent", color: "#EC4899" }
        ];

        function initGrid() {
            const grid = document.getElementById('nexus-grid');
            grid.innerHTML = '';
            nexusData.forEach((data, index) => {
                const item = document.createElement('div');
                item.className = `grid-item neubrutalism-card ${data ? '' : 'empty'}`;
                item.onclick = () => openModal(index);
                
                if (data) {
                    item.style.backgroundColor = data.color || '#fff';
                    item.innerHTML = `
                        <span class="font-black text-xs absolute top-2 left-2 opacity-50">#${index + 1}</span>
                        <div class="text-center p-2">
                            <div class="font-black text-xs md:text-sm uppercase leading-tight mb-2">${data.name}</div>
                            <div class="flex flex-wrap justify-center gap-1">
                                ${data.caps.map(cap => `<span class="badge bg-white">${cap}</span>`).join('')}
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); removeAgent(${index})" class="absolute top-1 right-1 font-black text-xs hover:text-red-600">×</button>
                    `;
                } else {
                    item.innerHTML = `<i data-lucide="plus" class="text-gray-300"></i>`;
                }
                grid.appendChild(item);
            });
            lucide.createIcons();
        }

        function openModal(index) {
            currentSlot = index;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('agentSelect').value = '';
            document.getElementById('customNameArea').classList.add('hidden');
            document.querySelectorAll('.capability-check').forEach(c => c.checked = false);
        }

        document.getElementById('agentSelect').addEventListener('change', (e) => {
            if (e.target.value === 'Custom') {
                document.getElementById('customNameArea').classList.remove('hidden');
            } else {
                document.getElementById('customNameArea').classList.add('hidden');
            }
        });

        function saveAgent() {
            const select = document.getElementById('agentSelect');
            let name = select.value;
            if (name === 'Custom') name = document.getElementById('customName').value;
            
            if (!name) return alert('エージェント名を入力してください');

            const caps = Array.from(document.querySelectorAll('.capability-check:checked')).map(c => c.value);
            const agentInfo = agents.find(a => a.name === name) || { color: '#ffffff' };

            nexusData[currentSlot] = { name, caps, color: agentInfo.color };
            localStorage.setItem('nexusData', JSON.stringify(nexusData));
            initGrid();
            closeModal();
        }

        function removeAgent(index) {
            nexusData[index] = null;
            localStorage.setItem('nexusData', JSON.stringify(nexusData));
            initGrid();
        }

        function setTheme(color) {
            document.querySelector('h1 span').style.color = color;
            document.querySelectorAll('.neubrutalism-btn').forEach(b => b.style.backgroundColor = color);
        }

        function shareToX() {
            const userName = document.getElementById('userName').value || 'エージェント・マスター';
            const count = nexusData.filter(d => d !== null).length;
            const text = `${userName}を構成する${count}つのエージェント\n#AgentNexus #DailyApp #AIエージェント\n`;
            const url = window.location.href;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
        }

        initGrid();
    </script>
</body>
</html>
