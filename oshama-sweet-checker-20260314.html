<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OShama Sweetness Checker 🍭 | ホワイトデー限定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f6 50%, #f0f4ff 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .sugar-particle {
            position: absolute;
            pointer-events: none;
            z-index: 50;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .floating {
            animation: float 10s linear infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <!-- Floating Background Elements -->
    <div id="bg-elements" class="fixed inset-0 pointer-events-none"></div>

    <main class="w-full max-max-w-md z-10">
        <div class="glass rounded-3xl p-8 shadow-2xl text-center transform transition-all duration-500 hover:scale-[1.02]">
            <div class="flex justify-center mb-6">
                <div class="p-4 bg-pink-100 rounded-full text-pink-500 shadow-inner">
                    <i data-lucide="candy" class="w-12 h-12"></i>
                </div>
            </div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 tracking-tight">Sweetness Checker</h1>
            <p class="text-gray-500 mb-8 font-light">今日のあなたの「あま〜い指数」を測定します ✨</p>

            <div id="result-area" class="hidden mb-8 space-y-4">
                <div class="text-6xl font-bold text-pink-500 animate-bounce" id="sweet-score">0%</div>
                <div class="text-xl font-semibold text-gray-700" id="sweet-message">...</div>
                <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden shadow-inner">
                    <div id="progress-bar" class="bg-gradient-to-r from-pink-300 to-rose-400 h-full w-0 transition-all duration-1000 ease-out"></div>
                </div>
            </div>

            <div id="action-area">
                <button onclick="checkSweetness()" id="check-btn" class="w-full py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl font-semibold text-lg shadow-lg hover:shadow-pink-200 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                    測定をはじめる
                </button>
            </div>

            <p id="retry-hint" class="hidden mt-6 text-sm text-gray-400 animate-pulse">
                もう一度クリックして、もっと甘い自分へ 🤍
            </p>
        </div>

        <footer class="mt-8 text-center text-gray-400 text-sm font-light">
            <p>&copy; 2026 OShama Agent. Happy White Day!</p>
        </footer>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Create background floating elements
        const bgContainer = document.getElementById('bg-elements');
        const icons = ['heart', 'star', 'circle', 'smile'];
        for (let i = 0; i < 15; i++) {
            const el = document.createElement('div');
            el.className = 'absolute floating opacity-20 text-pink-300';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = Math.random() * 100 + 'vh';
            el.style.animationDelay = Math.random() * 10 + 's';
            el.style.animationDuration = (Math.random() * 10 + 10) + 's';
            el.innerHTML = `<i data-lucide="${icons[Math.floor(Math.random() * icons.length)]}" class="w-8 h-8"></i>`;
            bgContainer.appendChild(el);
        }
        lucide.createIcons({ attrs: { class: 'floating-icon' }, container: bgContainer });

        const messages = [
            "マシュマロ級の優しさ ☁️",
            "砂糖120%増量中！ 🍭",
            "甘酸っぱい初恋の味 🍓",
            "とろけるフォンダンショコラ 🍫",
            "キラキラ金平糖オーラ ✨",
            "ビター＆スウィートの黄金比 ⚖️",
            "無限おかわり確定！ 🍯"
        ];

        function createSugarBurst() {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'sugar-particle';
                const size = Math.random() * 10 + 5;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.backgroundColor = ['#fed7e2', '#fbb6ce', '#ffffff', '#fff5f5'][Math.floor(Math.random() * 4)];
                particle.style.borderRadius = '50%';
                particle.style.left = '50%';
                particle.style.top = '50%';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 10 + 5;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                document.body.appendChild(particle);
                
                let x = window.innerWidth / 2;
                let y = window.innerHeight / 2;
                let opacity = 1;
                
                const animate = () => {
                    x += vx;
                    y += vy;
                    opacity -= 0.02;
                    particle.style.transform = `translate(${x - window.innerWidth / 2}px, ${y - window.innerHeight / 2}px)`;
                    particle.style.opacity = opacity;
                    
                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        particle.remove();
                    }
                };
                requestAnimationFrame(animate);
            }
        }

        function checkSweetness() {
            const btn = document.getElementById('check-btn');
            const resultArea = document.getElementById('result-area');
            const scoreDisplay = document.getElementById('sweet-score');
            const messageDisplay = document.getElementById('sweet-message');
            const progressBar = document.getElementById('progress-bar');
            const retryHint = document.getElementById('retry-hint');

            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 糖分を抽出中...';
            lucide.createIcons();

            setTimeout(() => {
                resultArea.classList.remove('hidden');
                const score = Math.floor(Math.random() * 51) + 70; // 70-120%
                const message = messages[Math.floor(Math.random() * messages.length)];

                // Animate score
                let currentScore = 0;
                const interval = setInterval(() => {
                    currentScore++;
                    scoreDisplay.innerText = currentScore + '%';
                    progressBar.style.width = (currentScore / 120 * 100) + '%';
                    if (currentScore >= score) {
                        clearInterval(interval);
                        messageDisplay.innerText = message;
                        createSugarBurst();
                        btn.disabled = false;
                        btn.innerHTML = '<i data-lucide="refresh-cw" class="w-5 h-5"></i> もう一度測る';
                        retryHint.classList.remove('hidden');
                        lucide.createIcons();
                    }
                }, 20);
            }, 1000);
        }
    </script>
</body>
</html>
