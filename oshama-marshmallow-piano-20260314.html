<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OShama Marshmallow Pi-ano | ホワイトデー×円周率</title>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --marshmallow-white: #ffffff;
            --accent-pink: #ffdce5;
            --text-gray: #4a4a4a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-gray);
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }
        .marshmallow {
            width: 200px;
            height: 180px;
            background: var(--marshmallow-white);
            border-radius: 60px 60px 80px 80px;
            box-shadow: 
                inset 0 -10px 20px rgba(0,0,0,0.02),
                0 20px 40px rgba(0,0,0,0.05);
            position: relative;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .marshmallow::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 20px;
            background: rgba(0,0,0,0.03);
            border-radius: 50%;
            filter: blur(5px);
            z-index: -1;
        }
        .pi-digit {
            position: absolute;
            pointer-events: none;
            font-weight: 800;
            color: var(--accent-pink);
            z-index: 50;
            text-shadow: 0 4px 10px rgba(255, 220, 229, 0.5);
        }
        .face {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 15px;
        }
        .eyes {
            display: flex;
            gap: 40px;
        }
        .eye {
            width: 12px;
            height: 12px;
            background: #4a4a4a;
            border-radius: 50%;
        }
        .mouth {
            width: 20px;
            height: 10px;
            border: 3px solid #4a4a4a;
            border-top: 0;
            border-radius: 0 0 10px 10px;
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col items-center justify-between p-6">

    <!-- Header -->
    <header class="w-full flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-white/50">
                <i data-lucide="cookie" class="w-6 h-6 text-pink-300"></i>
            </div>
            <div>
                <h2 class="text-sm font-semibold tracking-tight">OShama Marshmallow</h2>
                <p class="text-[10px] opacity-40 uppercase tracking-widest">Pi-ano Edition</p>
            </div>
        </div>
        <div class="glass px-4 py-1.5 rounded-full text-[10px] font-medium tracking-wider text-pink-400">
            MARCH 14 [WHITE DAY & PI DAY]
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 w-full flex flex-col items-center justify-center relative overflow-hidden" id="stage">
        
        <!-- Score / PI Sequence -->
        <div class="absolute top-0 text-center pointer-events-none">
            <div class="flex items-center justify-center gap-1 mb-1">
                <span class="text-xs opacity-30 font-bold uppercase tracking-widest">The Value of Love:</span>
                <span id="pi-sequence" class="text-xl font-bold text-pink-300 tracking-tighter">3.14</span>
            </div>
            <p id="pi-info" class="text-[10px] opacity-20">Click or Slap the Marshmallow to reveal Pi</p>
        </div>

        <!-- The Marshmallow -->
        <div id="marshmallow" class="marshmallow select-none">
            <div class="face">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="mouth"></div>
            </div>
        </div>

        <!-- Float Info -->
        <div class="absolute bottom-20 text-center pointer-events-none">
            <div id="digit-pop" class="text-8xl font-black text-white/40 select-none"></div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="w-full flex flex-col items-center gap-6 z-50">
        <div class="glass p-5 rounded-[2rem] w-full max-w-sm text-center">
            <p class="text-xs text-gray-500 leading-relaxed font-medium">
                マシュマロを叩くと、円周率の音が鳴る。<br>
                ホワイトデーと円周率（3.14）が重なる今日、<br>
                無限に続く愛の数値を、その手で奏でて。
            </p>
        </div>
        <div class="flex gap-6 mb-4">
            <a href="index.html" class="group flex items-center gap-2 text-[10px] uppercase tracking-[0.2em] opacity-30 hover:opacity-100 transition-all">
                <i data-lucide="arrow-left" class="w-3 h-3 group-hover:-translate-x-1 transition-transform"></i>
                Nexus Archive
            </a>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        const PI_DIGITS = "31415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679";
        let piIndex = 0;
        let isProcessing = false;

        const marshmallow = document.getElementById('marshmallow');
        const piSequence = document.getElementById('pi-sequence');
        const stage = document.getElementById('stage');
        const digitPop = document.getElementById('digit-pop');

        // Audio Context Setup
        let audioCtx = null;

        function playTone(digit) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // Frequency based on digit (Minor Pentatonic-ish)
            const baseFreq = 261.63; // C4
            const intervals = [0, 2, 4, 7, 9, 12, 14, 16, 19, 21]; // C, D, E, G, A, C5...
            const freq = baseFreq * Math.pow(2, intervals[digit] / 12);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        function handleSlap(e) {
            if (isProcessing) return;
            isProcessing = true;

            const digit = parseInt(PI_DIGITS[piIndex]);
            
            // Visual feedback
            gsap.to(marshmallow, {
                scaleX: 1.3,
                scaleY: 0.7,
                duration: 0.1,
                yoyo: true,
                repeat: 1,
                onComplete: () => { isProcessing = false; }
            });

            // Update sequence
            if (piIndex === 0) {
                piSequence.innerText = "3.";
            } else if (piIndex > 0) {
                piSequence.innerText += PI_DIGITS[piIndex];
            }
            
            // Pop large digit
            digitPop.innerText = PI_DIGITS[piIndex];
            gsap.fromTo(digitPop, 
                { scale: 0.5, opacity: 1, y: 0 },
                { scale: 2, opacity: 0, y: -100, duration: 0.8, ease: "power2.out" }
            );

            // Create particles
            createParticles(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2);

            playTone(digit);
            
            piIndex = (piIndex + 1) % PI_DIGITS.length;

            // Haptic
            if (window.navigator.vibrate) window.navigator.vibrate(20);
        }

        function createParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'pi-digit text-sm';
                p.innerText = PI_DIGITS[Math.floor(Math.random() * PI_DIGITS.length)];
                stage.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const dist = 60 + Math.random() * 80;

                gsap.set(p, { x: x - stage.offsetLeft, y: y - stage.offsetTop });
                gsap.to(p, {
                    x: (x - stage.offsetLeft) + Math.cos(angle) * dist,
                    y: (y - stage.offsetTop) + Math.sin(angle) * dist,
                    opacity: 0,
                    duration: 0.6,
                    onComplete: () => p.remove()
                });
            }
        }

        marshmallow.addEventListener('pointerdown', handleSlap);

        // Floating animation
        gsap.to(marshmallow, {
            y: -15,
            rotation: 2,
            duration: 2.5,
            repeat: -1,
            yoyo: true,
            ease: "power1.inOut"
        });

        // Mouse delta slap detection (Optional but fun)
        let lastX = 0;
        window.addEventListener('pointermove', (e) => {
            const dx = Math.abs(e.clientX - lastX);
            const mRect = marshmallow.getBoundingClientRect();
            
            if (dx > 30 && 
                e.clientX > mRect.left && e.clientX < mRect.right &&
                e.clientY > mRect.top && e.clientY < mRect.bottom) {
                handleSlap(e);
            }
            lastX = e.clientX;
        });

    </script>
</body>
</html>
