<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OShama Shinsengumi: Duty of the Day | おしゃま新選組：今日の誠</title>
    <!-- Google Fonts: Outfit for modern look, Noto Serif JP for samurai feel -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        :root {
            --shinsengumi-cyan: #00a3af;
            --shinsengumi-red: #e60012;
        }
        body {
            font-family: 'Outfit', 'Noto Serif JP', sans-serif;
            background-color: #050505;
            color: #e5e5e5;
            overflow-x: hidden;
        }
        .shinsengumi-border {
            border: 1px solid rgba(0, 163, 175, 0.3);
            box-shadow: 0 0 20px rgba(0, 163, 175, 0.1);
        }
        .mountain-pattern {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0, 163, 175, 0.05) 10px, rgba(0, 163, 175, 0.05) 20px);
        }
        .slash-animation {
            position: relative;
            overflow: hidden;
        }
        .slash-animation::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -100%;
            width: 200%;
            height: 2px;
            background: var(--shinsengumi-cyan);
            transform: rotate(-5deg);
            transition: left 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .task-completed .slash-animation::after {
            left: 100%;
        }
        .makoto-glow {
            text-shadow: 0 0 15px rgba(0, 163, 175, 0.8);
        }
        @keyframes pulse-cyan {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .animate-pulse-cyan {
            animation: pulse-cyan 3s infinite ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 mountain-pattern">

    <!-- Header / Makoto Emblem -->
    <div class="max-w-md w-full text-center mb-10">
        <div class="relative inline-block mb-4">
            <div class="w-24 h-24 rounded-full border-4 border-[#00a3af] flex items-center justify-center animate-pulse-cyan bg-black/50 backdrop-blur-sm">
                <span class="text-5xl font-black text-[#00a3af] makoto-glow select-none">誠</span>
            </div>
            <div class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">1863-2026</div>
        </div>
        <h1 class="text-3xl font-black tracking-tighter mb-2 italic">SHINSENGUMI DUTY</h1>
        <p class="text-gray-400 text-sm mb-6 font-light">1863年3月13日、新選組が歩み始めた日。<br>現代の隊士であるあなたの「誠」をここに記せ。</p>
        
        <!-- Hama's Message -->
        <div class="bg-[#00a3af]/10 border border-[#00a3af]/30 rounded-2xl p-4 text-sm leading-relaxed text-[#00a3af] flex items-start gap-3 mb-8">
            <i data-lucide="message-circle" class="w-5 h-5 mt-1 flex-shrink-0"></i>
            <p id="hama-message">
                隊士の皆さん、お疲れ様です！✨ 今日は新選組の発足記念日ですね。規律を重んじつつ、ワクワクする目標を「局中法度」として掲げてみましょう！
            </p>
        </div>
    </div>

    <!-- Main App Card -->
    <div class="max-w-md w-full shinsengumi-border bg-zinc-900/80 backdrop-blur-xl rounded-3xl p-6 mb-8">
        <!-- Input Section -->
        <div class="mb-8">
            <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-2 ml-1">New Hatto (Rule / Task)</label>
            <div class="flex gap-2">
                <input type="text" id="hatto-input" placeholder="例：本を10ページ読む" 
                    class="flex-1 bg-black/50 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#00a3af] transition-colors placeholder:text-zinc-700">
                <button onclick="addHatto()" class="bg-[#00a3af] hover:bg-[#00c2d1] text-black w-12 h-12 rounded-xl flex items-center justify-center transition-all active:scale-95 shadow-lg shadow-[#00a3af]/20">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </button>
            </div>
        </div>

        <!-- List Section -->
        <div id="hatto-list" class="space-y-3">
            <!-- Items injected by JS -->
        </div>

        <!-- Stats -->
        <div class="mt-10 pt-6 border-t border-zinc-800 flex justify-between items-center text-[10px] uppercase tracking-widest text-gray-500">
            <div>Achievement: <span id="progress-text" class="text-[#00a3af] font-bold">0%</span></div>
            <div id="status-badge" class="px-2 py-0.5 rounded border border-zinc-700">Standby</div>
        </div>
    </div>

    <!-- Footer -->
    <div class="max-w-md w-full text-center text-[10px] text-gray-600 space-y-2">
        <p>OShama Shinsengumi Agent v1.0.313</p>
        <div class="flex justify-center gap-4">
            <a href="index.html" class="hover:text-gray-400 transition-colors">GALLERY</a>
            <span class="opacity-30">|</span>
            <button onclick="clearAll()" class="hover:text-red-500 transition-colors uppercase">Reset Duty</button>
        </div>
    </div>

    <script>
        let hattos = JSON.parse(localStorage.getItem('oshama_shinsengumi_hatto') || '[]');

        const messages = [
            "素晴らしい規律です！誠の道を進んでいますね ✨",
            "一閃！タスクが片付きました。この調子ですよ！",
            "新選組の誇りを感じます。次はどれに挑みますか？",
            "無理は禁物ですが、あなたの「誠」は本物です！",
            "今日という記念日を、最高の結果で彩りましょう！✨"
        ];

        function save() {
            localStorage.setItem('oshama_shinsengumi_hatto', JSON.stringify(hattos));
            render();
        }

        function addHatto() {
            const input = document.getElementById('hatto-input');
            const text = input.value.trim();
            if (!text) return;
            
            hattos.push({ id: Date.now(), text, completed: false });
            input.value = '';
            save();
            updateHamaMessage("新しい法度が加わりましたね。成し遂げるのが楽しみです！✨");
        }

        function toggleHatto(id) {
            const index = hattos.findIndex(h => h.id === id);
            if (index === -1) return;
            
            hattos[index].completed = !hattos[index].completed;
            if (hattos[index].completed) {
                updateHamaMessage(messages[Math.floor(Math.random() * messages.length)]);
            }
            save();
        }

        function deleteHatto(id) {
            hattos = hattos.filter(h => h.id !== id);
            save();
        }

        function updateHamaMessage(msg) {
            const el = document.getElementById('hama-message');
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerText = msg;
                el.style.opacity = 1;
            }, 200);
        }

        function clearAll() {
            if (confirm('全ての任務をリセットしますか？')) {
                hattos = [];
                save();
                updateHamaMessage("仕切り直しですね。新しい「誠」を刻みましょう！✨");
            }
        }

        function render() {
            const list = document.getElementById('hatto-list');
            list.innerHTML = '';

            if (hattos.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-10 text-zinc-600 border-2 border-dashed border-zinc-800 rounded-2xl">
                        <i data-lucide="scroll" class="w-8 h-8 mx-auto mb-2 opacity-20"></i>
                        <p class="text-xs">法度が登録されていません</p>
                    </div>
                `;
            }

            hattos.forEach(hatto => {
                const item = document.createElement('div');
                item.className = `group flex items-center gap-3 p-4 bg-black/40 rounded-2xl border border-zinc-800/50 hover:border-[#00a3af]/30 transition-all ${hatto.completed ? 'task-completed opacity-60' : ''}`;
                
                item.innerHTML = `
                    <button onclick="toggleHatto(${hatto.id})" class="w-6 h-6 rounded-full border-2 transition-all flex items-center justify-center ${hatto.completed ? 'bg-[#00a3af] border-[#00a3af]' : 'border-zinc-700 hover:border-[#00a3af]'}">
                        ${hatto.completed ? '<i data-lucide="check" class="w-4 h-4 text-black"></i>' : ''}
                    </button>
                    <div class="flex-1 text-sm slash-animation select-none cursor-pointer" onclick="toggleHatto(${hatto.id})">
                        ${hatto.text}
                    </div>
                    <button onclick="deleteHatto(${hatto.id})" class="opacity-0 group-hover:opacity-100 p-2 text-zinc-600 hover:text-red-500 transition-all">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                list.appendChild(item);
            });

            // Update Stats
            const completedCount = hattos.filter(h => h.completed).length;
            const totalCount = hattos.length;
            const progress = totalCount === 0 ? 0 : Math.round((completedCount / totalCount) * 100);
            
            document.getElementById('progress-text').innerText = `${progress}%`;
            
            const badge = document.getElementById('status-badge');
            if (progress === 100 && totalCount > 0) {
                badge.innerText = 'MISSION ACCOMPLISHED';
                badge.className = 'px-2 py-0.5 rounded border border-[#00a3af] text-[#00a3af] bg-[#00a3af]/10 font-bold';
            } else {
                badge.innerText = totalCount > 0 ? 'ON DUTY' : 'STANDBY';
                badge.className = 'px-2 py-0.5 rounded border border-zinc-700 text-gray-500';
            }

            lucide.createIcons();
        }

        // Initial render
        render();
    </script>
</body>
</html>
