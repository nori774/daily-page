<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OShama Celestial Discovery | 天王星の導き ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PS2DX1HNVL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PS2DX1HNVL');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap');
        body {
            font-family: 'Noto Sans Sans JP', sans-serif;
            background: radial-gradient(circle at center, #020617 0%, #0f172a 100%);
            min-height: 100vh;
            color: #f8fafc;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .orbit-container {
            position: relative;
            width: 300px;
            height: 300px;
        }
        .planet {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #0ea5e9, #020617);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.4);
            z-index: 10;
        }
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }
        .orbit-1 { width: 160px; height: 160px; animation: spin 10s linear infinite; }
        .orbit-2 { width: 240px; height: 240px; animation: spin 15s linear reverse infinite; }
        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
        }
        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .glowing-text {
            text-shadow: 0 0 10px rgba(14, 165, 233, 0.8);
        }
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 md:p-8">

    <!-- Header -->
    <header class="w-full max-w-2xl mb-12 text-center fade-in">
        <div class="inline-flex items-center gap-2 px-4 py-1 mb-4 rounded-full glass text-sky-400 text-sm border-sky-500/30">
            <i data-lucide="sparkles" class="w-4 h-4"></i>
            <span>2026.03.13 | Celestial Discovery</span>
        </div>
        <h1 class="text-4xl md:text-5xl font-bold mb-4 glowing-text tracking-tight">OShama Celestial Discovery</h1>
        <p class="text-slate-400 text-lg">
            1781年3月13日、天王星は発見されました。<br>
            今日は「見えないもの」に光を当てる日。あなたの創造性の銀河をスキャンしましょう ✨
        </p>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-2xl flex flex-col items-center gap-8">
        
        <!-- Interactive Visual -->
        <div class="orbit-container flex items-center justify-center mb-8 fade-in" style="animation-delay: 0.2s;">
            <div class="planet"></div>
            <div class="orbit orbit-1">
                <div class="star" style="top: 0; left: 50%;"></div>
            </div>
            <div class="orbit orbit-2">
                <div class="star" style="top: 10%; left: 20%;"></div>
            </div>
            <div class="absolute inset-0 flex items-center justify-center opacity-20 pointer-events-none">
                <i data-lucide="telescope" class="w-48 h-48 text-sky-500"></i>
            </div>
        </div>

        <!-- Action Section -->
        <div id="action-section" class="w-full glass p-8 rounded-3xl text-center fade-in" style="animation-delay: 0.4s;">
            <p class="text-slate-300 mb-6">
                あなたの「今の気分」や「作りたい曲のイメージ」を、銀河に投げかけてください。<br>
                天王星の導きが、隠れたハーモニーを教えてくれます。
            </p>
            <div class="flex flex-col gap-4">
                <input type="text" id="user-vibe" placeholder="例：静かな夜、サイバーパンク、春の訪れ..." 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-6 py-4 focus:outline-none focus:border-sky-500 transition-all text-white">
                <button onclick="discover()" id="discover-btn"
                    class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-sky-900/20 flex items-center justify-center gap-2">
                    <i data-lucide="search" class="w-5 h-5"></i>
                    銀河をスキャンする
                </button>
            </div>
        </div>

        <!-- Result Section (Hidden by default) -->
        <div id="result-section" class="hidden w-full space-y-4 fade-in">
            <div class="glass p-8 rounded-3xl border-sky-500/20">
                <div class="flex items-center gap-3 mb-6 text-sky-400">
                    <i data-lucide="compass" class="w-6 h-6"></i>
                    <h2 class="text-xl font-bold">発見されたハーモニー</h2>
                </div>
                
                <div class="space-y-6">
                    <div>
                        <p class="text-sm text-slate-500 uppercase tracking-widest mb-2">Hidden Treasure</p>
                        <p id="res-treasure" class="text-2xl font-bold text-white"></p>
                    </div>
                    <div>
                        <p class="text-sm text-slate-500 uppercase tracking-widest mb-2">DTM Insight</p>
                        <p id="res-insight" class="text-lg text-slate-300"></p>
                    </div>
                    <div class="p-4 bg-sky-500/10 rounded-2xl border border-sky-500/20">
                        <p class="text-sm text-sky-400 mb-1">Celestial Advice</p>
                        <p id="res-advice" class="italic text-sky-100"></p>
                    </div>
                </div>

                <button onclick="reset()" class="mt-8 text-slate-500 hover:text-sky-400 text-sm transition-all underline decoration-dotted">
                    別の銀河を探検する
                </button>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="w-full max-w-2xl mt-16 pb-12 text-center fade-in" style="animation-delay: 0.6s;">
        <div class="border-t border-slate-800 pt-8 flex flex-col items-center gap-4">
            <div class="flex items-center gap-2 text-slate-400">
                <span>Created by</span>
                <span class="font-bold text-sky-400">OShama Agent ✨</span>
            </div>
            <a href="index.html" class="text-sm text-slate-500 hover:text-sky-400 transition-all flex items-center gap-1">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                デイリーアプリ一覧へ
            </a>
        </div>
    </footer>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const treasures = [
            "リディアン・スケール (F#)", "11thコードの響き", "90年代風のLo-Fiテクスチャ", 
            "変拍子 (5/4拍子) のリズム", "グリッチ・ディレイの残響", "FMシンセの金属的な倍音",
            "環境音（雨の音）を混ぜたパッド", "リバース・リバーブの導入"
        ];

        const insights = [
            "パッドに薄くフェイザーをかけると、銀河のような揺らぎが生まれます。",
            "ベースラインを10msほど後ろにずらして、独特の『溜め』を作ってみましょう。",
            "メインメロディの一部をオクターブ上げて、星の輝きを表現してください。",
            "あえてEQでハイをカットすることで、天王星のような遠い存在感を演出できます。",
            "サイドチェインを強めにかけて、呼吸するようなリズムを生み出しましょう。",
            "ボーカルチョップに深いリバーブをかけ、空間の広がりを作ります。"
        ];

        const advices = [
            "イノベーションは、他人が見向きもしない場所に隠されています。",
            "未知の領域へ踏み出す勇気が、最高のハーモニーを生みます。",
            "常識を疑うことで、新しい銀河が発見されるでしょう。",
            "失敗は、発見へのプロセスに過ぎません。スキャンを続けてください。",
            "あなたの直感は、宇宙の法則よりも鋭いことがあります。"
        ];

        function discover() {
            const vibe = document.getElementById('user-vibe').value;
            const btn = document.getElementById('discover-btn');
            const actionSection = document.getElementById('action-section');
            const resultSection = document.getElementById('result-section');

            // Animation state
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> スキャン中...';
            lucide.createIcons();
            btn.disabled = true;

            setTimeout(() => {
                // Randomly pick results
                document.getElementById('res-treasure').innerText = treasures[Math.floor(Math.random() * treasures.length)];
                document.getElementById('res-insight').innerText = insights[Math.floor(Math.random() * insights.length)];
                document.getElementById('res-advice').innerText = advices[Math.floor(Math.random() * advices.length)];

                actionSection.classList.add('hidden');
                resultSection.classList.remove('hidden');
                
                // Track with GA4
                gtag('event', 'discovery', {
                    'event_category': 'engagement',
                    'event_label': vibe || 'random'
                });

                // Scroll to result
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 1500);
        }

        function reset() {
            document.getElementById('action-section').classList.remove('hidden');
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('discover-btn').innerHTML = '<i data-lucide="search" class="w-5 h-5"></i> 銀河をスキャンする';
            document.getElementById('user-vibe').value = '';
            lucide.createIcons();
            document.getElementById('discover-btn').disabled = false;
        }

        // Add some random stars in background
        const body = document.body;
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star opacity-20';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animation = `pulse ${2 + Math.random() * 3}s infinite ease-in-out`;
            body.appendChild(star);
        }

        // CSS for pulsing stars
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0%, 100% { opacity: 0.1; transform: scale(0.8); }
                50% { opacity: 0.5; transform: scale(1.2); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
